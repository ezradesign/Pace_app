<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PACE · Foco · Cuerpo — v0.28.2</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3E5A3A">
  <link rel="stylesheet" href="app/tokens.css" />
  <style id="pace-paths-css">
    .path-runner-overlay {
      position: fixed; inset: 0;
      background: var(--paper);
      z-index: 80;
      display: flex; flex-direction: column;
    }
    .path-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .path-dots { display: flex; gap: 6px; }
    .path-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); transition: background 200ms; }
    .path-dot.active { background: var(--ink); }
    .path-dot.done   { background: var(--ink-3); }
    .path-step-body  { flex: 1; overflow: auto; display: flex; flex-direction: column; }
    .path-modal-back { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 90; display: flex; align-items: center; justify-content: center; }
    /* PathStats -- sesion 54 / compactado sesion 61 para que la pestana
       Caminos del modal Stats no necesite scroll vertical en 1080p. */
    .path-stats { display:flex; flex-direction:column; gap:14px; padding:8px 0; }
    .path-stats-summary { display:flex; gap:12px; flex-wrap:wrap; }
    .path-stat-card { flex:1; min-width:140px; padding:10px 14px; border:1px solid var(--line); border-radius:var(--r-md); }
    .path-stat-label { font-size:.8em; opacity:.7; }
    .path-stat-value { font-size:1.4em; font-weight:600; margin-top:2px; font-family:var(--font-display); font-style:italic; line-height:1.1; }
    .path-stats-table table { width:100%; border-collapse:collapse; }
    .path-stats-table th, .path-stats-table td { padding:5px 12px; border-bottom:1px solid var(--line); text-align:left; font-size:.9em; }
    .path-stats-table th { font-size:.78em; font-weight:600; letter-spacing:.4px; color:var(--ink-3); }
    .path-stats-empty { opacity:.6; padding:8px 0; }
    /* Mobile responsive -- sesion 55 */
    @media (max-width: 480px) {
      .path-topbar { padding: 12px 14px; }
      .path-topbar button { min-height: 44px; min-width: 44px; }
      .path-modal-back > div { padding: 24px 18px; }
      .path-modal-back button { min-height: 44px; }
      .path-stat-card { min-width: 100%; }
      .path-stats-summary { flex-direction: column; gap: 10px; }
      /* NOTA: el responsive de SuggestedPathCard (dual + single) vive ahora
         en su propio fichero (pace-spc-responsive-css), inyectado por
         app/paths/SuggestedPathCard.jsx. La regla previa aqui hacia que
         tambien la card unica se apilara vertical, lo que infla el modulo
         en movil. Sesion 61 / v0.28.2. */
    }
  </style>
</head>
<body>
  <!-- Logo oficial pre-cargado aquí para que super_inline_html lo inline
       como data URI en el bundle standalone. CowLogo.jsx lee el src
       resuelto de este elemento (id="pace-logo-src"). -->
  <img id="pace-logo-src" src="app/ui/pace-logo.png" style="display:none" alt="" />

  <!-- Splash placeholder requerido por el bundler super_inline_html.
       Se muestra brevemente mientras los assets se descomprimen
       y como fallback no-JS. Paleta crema PACE. -->
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" data-bg-color="#F2EDE0"
         viewBox="0 0 1200 800" width="100%" height="100%"
         preserveAspectRatio="xMidYMid meet">
      <rect width="1200" height="800" fill="#F2EDE0"/>
      <text x="600" y="410" text-anchor="middle"
            font-family="'EB Garamond', Georgia, serif"
            font-style="italic" font-size="96" fill="#1F1C17">Pace</text>
      <text x="600" y="470" text-anchor="middle"
            font-family="'Inter Tight', sans-serif"
            font-size="14" letter-spacing="6" fill="#7a7367">FOCO · CUERPO</text>
    </svg>
  </template>

  <div id="root"></div>

  <!-- React + Babel (pinned, no tocar) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- ORDEN DE CARGA
       0. i18n/*         → strings.js (catálogo ES/EN) + useT.jsx (hook + detectInitialLang)
                           Deben ir ANTES de state-core.jsx: loadState() llama a detectInitialLang().
       1. state-core.jsx → store, loadState, rollover, history helpers, toast
       2. state-timer.jsx       → addFocusMinutes, completePomodoro
       3. state-hydrate.jsx     → addWaterGlass
       4. state-achievements.jsx → unlockAchievement, complete*Session, updateStreak
       5. state-paths.jsx       → paths CRUD, stats
       6. state-settings.jsx    → setLang
       7. state.jsx      → índice — re-export consolidado del API pública
       8. ui/*           → primitivos visuales (Modal, Card, Tag, Button, CowLogo, Toast)
       9. shell/*        → layout (Sidebar)
      10. módulos        → focus, breathe, move, extra, hydrate, breakmenu, achievements, stats, tweaks
      11. main.jsx       → monta <PaceApp/> en #root
       Split sesion 57 / v0.27.5.
  -->
  <script type="text/babel" src="app/i18n/strings.js"></script>
  <script type="text/babel" src="app/i18n/strings-content.js"></script>
  <script type="text/babel" src="app/i18n/useT.jsx"></script>
  <script type="text/babel" src="app/state-core.jsx"></script>
  <script type="text/babel" src="app/state-timer.jsx"></script>
  <script type="text/babel" src="app/state-hydrate.jsx"></script>
  <script type="text/babel" src="app/state-achievements.jsx"></script>
  <script type="text/babel" src="app/state-paths.jsx"></script>
  <script type="text/babel" src="app/state-settings.jsx"></script>
  <script type="text/babel" src="app/state.jsx"></script>

  <script type="text/babel" src="app/ui/Primitives.jsx"></script>
  <script type="text/babel" src="app/ui/SessionShell.jsx"></script>
  <script type="text/babel" src="app/ui/CowLogo.jsx"></script>
  <script type="text/babel" src="app/ui/Sound.jsx"></script>
  <script type="text/babel" src="app/ui/Toast.jsx"></script>

  <!-- Apoya el proyecto (Buy Me a Coffee) — se carga antes que Sidebar
       porque Sidebar importa <SupportButton/> en su StatusBar. -->
  <script type="text/babel" src="app/support/SupportModule.jsx"></script>

  <!-- Bienvenida de primera vez (sesión 17 / v0.12.0).
       Se carga antes que main.jsx porque este la monta. -->
  <script type="text/babel" src="app/welcome/WelcomeModule.jsx"></script>

  <script type="text/babel" src="app/shell/Sidebar.jsx"></script>

  <!-- Glifos canónicos de ejercicio (sesión 59) — debe cargarse antes de MoveModule, BreatheSession y PathRunner -->
  <script type="text/babel" data-presets="env,react" src="app/glyphs/exercise-glyphs.jsx"></script>

  <script type="text/babel" src="app/focus/FocusTimer.jsx"></script>
  <script type="text/babel" src="app/breathe/BreatheVisual.jsx"></script>
  <script type="text/babel" src="app/breathe/BreatheLibrary.jsx"></script>
  <script type="text/babel" src="app/breathe/BreatheSession.jsx"></script>
  <script type="text/babel" src="app/move/MoveModule.jsx"></script>
  <script type="text/babel" src="app/extra/ExtraModule.jsx"></script>
  <!-- Caminos - catalogo y resolvers (sesion 49) -->
  <script type="text/babel" data-presets="env,react" src="app/paths/registry.js"></script>
  <script type="text/babel" src="app/hydrate/HydrateModule.jsx"></script>
  <script type="text/babel" src="app/breakmenu/BreakMenu.jsx"></script>
  <script type="text/babel" src="app/achievements/Achievements.jsx"></script>
  <script type="text/babel" src="app/stats/YearView.jsx"></script>
  <script type="text/babel" src="app/stats/PathYearView.jsx"></script>
  <script type="text/babel" src="app/stats/PathStats.jsx"></script>
  <script type="text/babel" src="app/stats/StatsPanel.jsx"></script>
  <script type="text/babel" src="app/tweaks/TweakSecretsWatcher.jsx"></script>
  <script type="text/babel" src="app/tweaks/TweaksPanel.jsx"></script>

  <!-- Caminos - SuggestedPathCard UI (sesion 53) -->
  <script type="text/babel" data-presets="env,react" src="app/paths/SuggestedPathCard.jsx"></script>
  <!-- Caminos - PathsLibrary overlay (sesion 53) -->
  <script type="text/babel" data-presets="env,react" src="app/paths/PathsLibrary.jsx"></script>
  <!-- Caminos - PathRunner UI (sesion 50) -->
  <script type="text/babel" data-presets="env,react" src="app/paths/PathRunner.jsx"></script>

  <script type="text/babel" src="app/main.jsx"></script>

  <!-- Monta la app
       Los <script type="text/babel" src> se fetchean y compilan async,
       así que esperamos al evento `DOMContentLoaded` de Babel antes de montar.
  -->
  <script type="text/babel" data-presets="env,react">
    /* Mount loop — espera a que TODOS los scripts Babel estén compilados.
       Los <script type="text/babel" src> se fetchean en paralelo y pueden
       evaluar en orden no garantizado: PaceApp puede estar lista antes que
       BreakMenu, TweaksPanel o BreatheSession, provocando crashes en la
       primera apertura de esas pantallas ("Element type is invalid: undefined").
       Fix sesion 38b: comprobar los componentes criticos del arbol completo,
       no solo PaceApp. Timeout ampliado a 5 s para cargas lentas / CDN frio. */
    function mount(tries) {
      tries = tries || 0;
      var container = document.getElementById('root');
      var allReady = (
        typeof PaceApp          === 'function' &&
        typeof BreakMenu        === 'function' &&
        typeof TweaksPanel      === 'function' &&
        typeof BreatheSession   === 'function' &&
        typeof MoveSession      === 'function' &&
        typeof ToastHost        === 'function'
      );
      if (container && allReady) {
        var root = ReactDOM.createRoot(container);
        root.render(<PaceApp />);
      } else if (tries < 100) {
        setTimeout(function() { mount(tries + 1); }, 50);
      } else {
        console.error('PACE - Componentes no cargaron en 5 s. Comprueba la red.');
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() { mount(); });
    } else {
      mount();
    }
  </script>

  <!-- PWA · Service Worker (sesión 37 · v0.19.0) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function() {});
      });
    }
  </script>
</body>
</html>
