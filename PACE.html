  <style id="pace-paths-css">
    .path-runner-overlay {
      position: fixed; inset: 0;
      background: var(--paper);
      z-index: 80;
      display: flex; flex-direction: column;
    }
    .path-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .path-dots { display: flex; gap: 6px; }
    .path-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); transition: background 200ms; }
    .path-dot.active { background: var(--ink); }
    .path-dot.done   { background: var(--ink-3); }
    .path-step-body  { flex: 1; overflow: auto; display: flex; flex-direction: column; }
    .path-modal-back { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 90; display: flex; align-items: center; justify-content: center; }
    /* PathStats -- sesion 54 / compactado sesion 61+62+63 para que la pestana
       Caminos del modal Stats no necesite scroll vertical en 1080p. */
    .path-stats { display:flex; flex-direction:column; gap:6px; padding:8px 0; }
    .path-stats-summary { display:flex; gap:12px; flex-wrap:wrap; }
    .path-stat-card { flex:1; min-width:140px; padding:8px 12px; border:1px solid var(--line); border-radius:var(--r-md); }
    .path-stat-label { font-size:.8em; opacity:.7; }
    .path-stat-value { font-size:1.3em; font-weight:600; margin-top:2px; font-family:var(--font-display); font-style:italic; line-height:1.1; }
    .path-stats-table table { width:100%; border-collapse:collapse; }
    .path-stats-table th, .path-stats-table td { padding:4px 10px; border-bottom:1px solid var(--line); text-align:left; font-size:.9em; }
    .path-stats-table th { font-size:.78em; font-weight:600; letter-spacing:.4px; color:var(--ink-3); }
    .path-stats-empty { opacity:.6; padding:8px 0; }
    /* Mobile responsive -- sesion 55 / actualizado sesion 63 */
    @media (max-width: 640px) {
      /* Summary cards: 3 columnas horizontales en movil (s63) */
      .path-stats-summary { display:grid !important; grid-template-columns:repeat(3, 1fr) !important; gap:8px !important; }
      .path-stat-card { min-width:0 !important; padding:6px 8px !important; }
      .path-stat-label { font-size:.72em !important; }
      .path-stat-value { font-size:1.05em !important; }
    }
    @media (max-width: 480px) {
      .path-topbar { padding: 12px 14px; }
      .path-topbar button { min-height: 44px; min-width: 44px; }
      .path-modal-back > div { padding: 24px 18px; }
      .path-modal-back button { min-height: 44px; }
      /* NOTA: el responsive de SuggestedPathCard (dual + single) vive ahora
         en su propio fichero (pace-spc-responsive-css), inyectado por
         app/paths/SuggestedPathCard.jsx. La regla previa aqui hacia que
         tambien la card unica se apilara vertical, lo que infla el modulo
         en movil. Sesion 61 / v0.28.2. */
    }
  </style>

  <!-- Monta la app
       Los <script type="text/babel" src> se fetchean y compilan async,
       así que esperamos al evento `DOMContentLoaded` de Babel antes de montar.
  -->
  <script type="text/babel" data-presets="env,react">
    /* Mount loop — espera a que TODOS los scripts Babel estén compilados.
       Los <script type="text/babel" src> se fetchean en paralelo y pueden
       evaluar en orden no garantizado: PaceApp puede estar lista antes que
       BreakMenu, TweaksPanel o BreatheSession, provocando crashes en la
       primera apertura de esas pantallas ("Element type is invalid: undefined").
       Fix sesion 38b: comprobar los componentes criticos del arbol completo,
       no solo PaceApp. Timeout ampliado a 5 s para cargas lentas / CDN frio. */
    function mount(tries) {
      tries = tries || 0;
      var container = document.getElementById('root');
      var allReady = (
        typeof PaceApp          === 'function' &&
        typeof BreakMenu        === 'function' &&
        typeof TweaksPanel      === 'function' &&
        typeof BreatheSession   === 'function' &&
        typeof MoveSession      === 'function' &&
        typeof ToastHost        === 'function'
      );
      if (container && allReady) {
        var root = ReactDOM.createRoot(container);
        root.render(<PaceApp />);
      } else if (tries < 100) {
        setTimeout(function() { mount(tries + 1); }, 50);
      } else {
        console.error('PACE - Componentes no cargaron en 5 s. Comprueba la red.');
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() { mount(); });
    } else {
      mount();
    }
  </script>

  <!-- PWA · Service Worker (sesión 37 · v0.19.0) -->
  <script>
