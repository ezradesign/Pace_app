<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PACE · Foco · Cuerpo — v0.20.0</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3E5A3A">
  <link rel="stylesheet" href="app/tokens.css" />
</head>
<body>
  <!-- Logo oficial pre-cargado aquí para que super_inline_html lo inline
       como data URI en el bundle standalone. CowLogo.jsx lee el src
       resuelto de este elemento (id="pace-logo-src"). -->
  <img id="pace-logo-src" src="app/ui/pace-logo.png" style="display:none" alt="" />

  <!-- Splash placeholder requerido por el bundler super_inline_html.
       Se muestra brevemente mientras los assets se descomprimen
       y como fallback no-JS. Paleta crema PACE. -->
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" data-bg-color="#F2EDE0"
         viewBox="0 0 1200 800" width="100%" height="100%"
         preserveAspectRatio="xMidYMid meet">
      <rect width="1200" height="800" fill="#F2EDE0"/>
      <text x="600" y="410" text-anchor="middle"
            font-family="'EB Garamond', Georgia, serif"
            font-style="italic" font-size="96" fill="#1F1C17">Pace</text>
      <text x="600" y="470" text-anchor="middle"
            font-family="'Inter Tight', sans-serif"
            font-size="14" letter-spacing="6" fill="#7a7367">FOCO · CUERPO</text>
    </svg>
  </template>

  <div id="root"></div>

  <!-- React + Babel (pinned, no tocar) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- ORDEN DE CARGA
       0. i18n/*    → strings.js (catálogo ES/EN) + useT.jsx (hook + detectInitialLang)
                      Deben ir ANTES de state.jsx: loadState() llama a detectInitialLang().
       1. state.jsx → store global (usePace, acciones, setLang)
       2. ui/*      → primitivos visuales (Modal, Card, Tag, Button, CowLogo, Toast)
       3. shell/*   → layout (Sidebar)
       4. módulos   → focus, breathe, move, extra, hydrate, breakmenu, achievements, stats, tweaks
       5. main.jsx  → monta <PaceApp/> en #root
  -->
  <script type="text/babel" src="app/i18n/strings.js"></script>
  <script type="text/babel" src="app/i18n/strings-content.js"></script>
  <script type="text/babel" src="app/i18n/useT.jsx"></script>
  <script type="text/babel" src="app/state.jsx"></script>

  <script type="text/babel" src="app/ui/Primitives.jsx"></script>
  <script type="text/babel" src="app/ui/SessionShell.jsx"></script>
  <script type="text/babel" src="app/ui/CowLogo.jsx"></script>
  <script type="text/babel" src="app/ui/Sound.jsx"></script>
  <script type="text/babel" src="app/ui/Toast.jsx"></script>

  <!-- Apoya el proyecto (Buy Me a Coffee) — se carga antes que Sidebar
       porque Sidebar importa <SupportButton/> en su StatusBar. -->
  <script type="text/babel" src="app/support/SupportModule.jsx"></script>

  <!-- Bienvenida de primera vez (sesión 17 / v0.12.0).
       Se carga antes que main.jsx porque este la monta. -->
  <script type="text/babel" src="app/welcome/WelcomeModule.jsx"></script>

  <script type="text/babel" src="app/shell/Sidebar.jsx"></script>

  <script type="text/babel" src="app/focus/FocusTimer.jsx"></script>
  <script type="text/babel" src="app/breathe/BreatheVisual.jsx"></script>
  <script type="text/babel" src="app/breathe/BreatheLibrary.jsx"></script>
  <script type="text/babel" src="app/breathe/BreatheSession.jsx"></script>
  <script type="text/babel" src="app/move/MoveModule.jsx"></script>
  <script type="text/babel" src="app/extra/ExtraModule.jsx"></script>
  <script type="text/babel" src="app/hydrate/HydrateModule.jsx"></script>
  <script type="text/babel" src="app/breakmenu/BreakMenu.jsx"></script>
  <script type="text/babel" src="app/achievements/Achievements.jsx"></script>
  <script type="text/babel" src="app/stats/WeeklyStats.jsx"></script>
  <script type="text/babel" src="app/tweaks/TweaksPanel.jsx"></script>

  <script type="text/babel" src="app/main.jsx"></script>

  <!-- Monta la app
       Los <script type="text/babel" src> se fetchean y compilan async,
       así que esperamos al evento `DOMContentLoaded` de Babel antes de montar.
  -->
  <script type="text/babel" data-presets="env,react">
    // Pequeño retry por si PaceApp aún no está en window cuando este script corre
    function mount(tries = 0) {
      const container = document.getElementById('root');
      if (container && typeof PaceApp === 'function') {
        const root = ReactDOM.createRoot(container);
        root.render(<PaceApp />);
      } else if (tries < 40) {
        setTimeout(() => mount(tries + 1), 50);
      } else {
        console.error('PACE · PaceApp o #root no se cargaron tras 2s.');
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => mount());
    } else {
      mount();
    }
  </script>

  <!-- PWA · Service Worker (sesión 37 · v0.19.0) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
