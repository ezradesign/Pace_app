<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PACE · Toast de logro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,500&family=Inter+Tight:wght@400;500&display=swap');
  :root{ --paper:#F2EDE0; --ink:#1F1C17; --ink-3:#8A8372;
    --achievement:#B8934A; --r-md:12px; --sh-card:0 1px 3px rgba(31,28,23,.05),0 8px 24px rgba(31,28,23,.06); }
  body { margin:0; background:var(--paper); font-family:'Inter Tight',system-ui,sans-serif; padding:28px; display:grid; place-items:center; min-height:200px; }
  .toast { display:flex; align-items:center; gap:14px; padding:12px 20px; background:var(--paper);
    border:1px solid var(--achievement); border-radius:var(--r-md); box-shadow:var(--sh-card); min-width:280px; }
  .glyph { width:40px; height:40px; border-radius:50%; border:1px solid var(--achievement); display:grid; place-items:center; color:var(--achievement); }
  .kicker { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--achievement); }
  .title { font-family:'EB Garamond',serif; font-style:italic; font-size:18px; font-weight:500; line-height:1.2; }
  .desc { font-size:11px; color:var(--ink-3); }
</style>
</head>
<body>
  <div class="toast">
    <div class="glyph">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3c1.6 3 1.6 6 0 9-1.6-3-1.6-6 0-9z"/><path d="M12 12c3-1.6 6-1.6 9 0-3 1.6-6 1.6-9 0z"/><circle cx="12" cy="12" r="1"/>
      </svg>
    </div>
    <div>
      <div class="kicker">Nuevo logro</div>
      <div class="title">Primer aliento</div>
      <div class="desc">Completaste tu primera sesión de respiración</div>
    </div>
  </div>
</body>
</html>
