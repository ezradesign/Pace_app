<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PACE · Button</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500&display=swap');
  :root{ --paper:#F2EDE0; --ink:#1F1C17; --ink-2:#4A453C; --line-2:#B8AD8E;
    --focus:#3E5A3A; --focus-2:#2A3E27; --breathe:#C97A5D; --r-md:12px; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:'Inter Tight',system-ui,sans-serif; padding:28px; }
  .label { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#8A8372; font-weight:500; margin:0 0 14px; }
  .col-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#8A8372; margin:18px 0 8px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .btn { border:1px solid transparent; border-radius:var(--r-md); font-weight:500; letter-spacing:.2px;
    font-family:inherit; display:inline-flex; align-items:center; gap:8px; cursor:pointer; }
  .sm { padding:6px 14px; font-size:13px; height:32px; }
  .md { padding:10px 22px; font-size:14px; height:42px; }
  .lg { padding:14px 28px; font-size:15px; height:52px; }
  .primary   { background:var(--focus); color:var(--paper); border-color:var(--focus); }
  .secondary { background:transparent; color:var(--ink); border-color:var(--line-2); }
  .ghost     { background:transparent; color:var(--ink-2); border-color:transparent; }
  .terracota { background:var(--breathe); color:var(--paper); border-color:var(--breathe); }
</style>
</head>
<body>
  <div class="label">PACE · Button — 4 variantes × 3 tamaños</div>

  <div class="col-label">Variantes (md)</div>
  <div class="row">
    <button class="btn md primary">Comenzar</button>
    <button class="btn md secondary">Ver todos</button>
    <button class="btn md ghost">prefiero saltarlo</button>
    <button class="btn md terracota">Empezar</button>
  </div>

  <div class="col-label">Tamaños (primary)</div>
  <div class="row">
    <button class="btn sm primary">Small</button>
    <button class="btn md primary">Medium</button>
    <button class="btn lg primary">Large</button>
  </div>

  <div class="col-label">Disabled</div>
  <div class="row">
    <button class="btn md primary" style="opacity:.4;cursor:not-allowed;">Comenzar</button>
    <button class="btn md terracota" style="opacity:.4;cursor:not-allowed;">Empezar</button>
  </div>
</body>
</html>
