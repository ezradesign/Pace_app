<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PACE · SuggestedPathCard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,500&family=Inter+Tight:wght@400;500&display=swap');
  :root{ --paper:#F2EDE0; --paper-2:#EAE4D4; --ink:#1F1C17; --ink-3:#8A8372; --line:#C9C0A8;
    --focus:#3E5A3A; --focus-cta:#50624D; --r-sm:8px; --r-md:12px; --r-pill:999px;
    --sh-soft:0 1px 2px rgba(31,28,23,.06),0 4px 16px rgba(31,28,23,.04); }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:'Inter Tight',system-ui,sans-serif; padding:28px; }
  .label { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); font-weight:500; margin:0 0 14px; }
  .dual { display:flex; gap:10px; }
  .card { display:flex; align-items:center; gap:16px; padding:14px 20px; background:var(--paper); border:1px solid var(--line);
    border-radius:var(--r-md); box-shadow:var(--sh-soft); flex:1; min-width:0; }
  .bar { width:3px; height:40px; background:var(--focus); border-radius:2px; flex-shrink:0; }
  .meta { font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); margin-bottom:4px; }
  .name { font-family:'EB Garamond',serif; font-style:italic; font-size:17px; font-weight:500; line-height:1.1; }
  .tagline { font-family:'EB Garamond',serif; font-style:italic; font-size:12px; color:var(--ink-3); margin-top:2px; }
  .steps { display:flex; gap:6px; margin-top:8px; color:var(--ink-3); }
  .cta { padding:8px 16px; font-size:12px; letter-spacing:.1em; font-family:'EB Garamond',serif; font-style:italic;
    background:var(--focus-cta); color:var(--paper); border:none; border-radius:var(--r-sm); cursor:pointer; flex-shrink:0; }
  .done-tag { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); padding:2px 6px; border:1px solid var(--line); border-radius:var(--r-pill); }
  .viewall { text-align:right; margin-top:6px; }
  .viewall button { background:none; border:none; cursor:pointer; font-size:11px; letter-spacing:.1em; color:var(--ink-3);
    font-family:'EB Garamond',serif; font-style:italic; text-decoration:underline; text-underline-offset:3px; }
</style>
</head>
<body>
  <div class="label">PACE · SuggestedPathCard — favorito + sugerido (home)</div>
  <div class="dual">

    <div class="card">
      <div class="bar"></div>
      <div style="flex:1;min-width:0;">
        <div class="meta">Tu favorito</div>
        <div style="display:flex;align-items:center;gap:8px;"><span class="name">Despertar suave</span></div>
        <div class="tagline">empieza el día con calma</div>
        <div class="steps">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"><path d="M8 2.5v7"/><path d="M5 7.5C3.6 7.8 2.5 8.8 2.2 10.2c-.4 1.7.2 3.4 1.8 3.5.9.1 1.4-.5 1.6-1.3.3-1.3.4-2.9.4-4.5z"/><path d="M11 7.5c1.4.3 2.5 1.3 2.8 2.7.4 1.7-.2 3.4-1.8 3.5-.9.1-1.4-.5-1.6-1.3-.3-1.3-.4-2.9-.4-4.5z"/></svg>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"><circle cx="8" cy="8" r="5.5"/><circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"/></svg>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"><path d="M2.5 12c1.8-4.5 4-7 5.5-7s3.7 2.5 5.5 7"/><circle cx="8" cy="4" r="1.2"/></svg>
        </div>
      </div>
      <button class="cta">Comenzar</button>
    </div>

    <div class="card" style="background:var(--paper-2);">
      <div class="bar"></div>
      <div style="flex:1;min-width:0;">
        <div class="meta">Sugerido ahora</div>
        <div style="display:flex;align-items:center;gap:8px;"><span class="name">Reset de mediodía</span><span class="done-tag">Hecho hoy</span></div>
        <div class="tagline">suelta la tensión acumulada</div>
        <div class="steps">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"><path d="M2.5 12c1.8-4.5 4-7 5.5-7s3.7 2.5 5.5 7"/><circle cx="8" cy="4" r="1.2"/></svg>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"><path d="M8 1.5c-2 3-4.5 4.8-4.5 7.5a4.5 4.5 0 0 0 9 0c0-2.7-2.5-4.5-4.5-7.5z"/></svg>
        </div>
      </div>
      <span style="font-family:Georgia,serif;font-size:18px;color:var(--focus);">*</span>
    </div>

  </div>
  <div class="viewall"><button>Ver todos</button></div>
</body>
</html>
