<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PACE · Seal de logro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400;1,500&family=Inter+Tight:wght@400;500&display=swap');
  :root{ --paper:#F2EDE0; --ink:#1F1C17; --ink-3:#8A8372; --line:#C9C0A8; --line-2:#B8AD8E;
    --achievement:#B8934A; --r-md:12px; }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:'Inter Tight',system-ui,sans-serif; padding:28px; }
  .label { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); font-weight:500; margin:0 0 16px; }
  .grid { display:grid; grid-template-columns:repeat(4,140px); gap:12px; }
  .seal { aspect-ratio:1/1.15; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:14px 8px; border-radius:var(--r-md); text-align:center; position:relative; }
  .ring { width:56px; height:56px; border-radius:50%; display:grid; place-items:center; margin-bottom:10px; position:relative; }
  .ring .halo { position:absolute; inset:-4px; border-radius:50%; opacity:.4; }
  .nm { font-family:'EB Garamond',serif; font-style:italic; font-size:13px; font-weight:500; line-height:1.15; margin-bottom:4px; }
  .ds { font-size:9.5px; letter-spacing:.05em; color:var(--ink-3); line-height:1.3; }
  .badge { position:absolute; top:6px; right:6px; font-size:7.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3);
    border:.5px solid var(--line-2); border-radius:999px; padding:2px 6px; }
  /* Estados */
  .unlocked { border:1px solid var(--achievement); background:var(--paper); }
  .unlocked .ring { border:1.2px solid var(--achievement); color:var(--achievement); }
  .unlocked .ring .halo { border:.5px solid var(--achievement); }
  .unlocked .nm { color:var(--ink); }
  .locked { border:1px dashed var(--line); opacity:.55; }
  .locked .ring { border:1.2px solid var(--line-2); color:var(--ink-3); }
  .locked .ring .halo { border:.5px solid var(--line); }
  .locked .nm { color:var(--ink-3); }
  .soon { border:1px dotted var(--line); opacity:.38; }
  .soon .ring { border:1.2px solid var(--line-2); color:var(--ink-3); }
  .soon .ring > span { opacity:.25; }
  .soon .ring .halo { border:.5px solid var(--line); }
  .soon .nm { color:var(--ink-3); }
  .g { width:100%; height:100%; display:grid; place-items:center; }
</style>
</head>
<body>
  <div class="label">PACE · Seal — 3 estados (desbloqueado / por cazar / pronto / secreto)</div>
  <div class="grid">

    <div class="seal unlocked">
      <div class="ring"><span class="g">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M12 3c1.7 3.2 1.7 6.8 0 10-1.7-3.2-1.7-6.8 0-10z"/><path d="M12 13v8"/></svg>
      </span><div class="halo"></div></div>
      <div class="nm">Primer aliento</div>
      <div class="ds">Una sesión de respiración</div>
    </div>

    <div class="seal locked">
      <div class="ring"><span class="g">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="12" cy="12" r="7"/><path d="M12 12v-4"/></svg>
      </span><div class="halo"></div></div>
      <div class="nm">Constancia</div>
      <div class="ds">7 días seguidos</div>
    </div>

    <div class="seal soon">
      <div class="badge">Pronto</div>
      <div class="ring"><span class="g">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M5 19c4-9 10-9 14 0"/><circle cx="12" cy="7" r="2"/></svg>
      </span><div class="halo"></div></div>
      <div class="nm">Movilidad maestra</div>
      <div class="ds">Pronto</div>
    </div>

    <div class="seal locked">
      <div class="ring"><span class="g"><span style="font-family:'EB Garamond',serif;font-style:italic;font-size:22px;">?</span></span><div class="halo"></div></div>
      <div class="nm">Secreto</div>
      <div class="ds">?????</div>
    </div>

  </div>
</body>
</html>
