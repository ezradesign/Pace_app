/* ============================================
   PACE · Design Tokens
   Cambios aquí se reflejan en toda la app.
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter+Tight:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* PALETA · Crema día (default) */
  --paper: #F2EDE0;
  --paper-2: #EAE4D4;
  --paper-3: #DFD8C4;
  --ink: #1F1C17;
  --ink-2: #4A453C;
  --ink-3: #8A8372;
  --line: #C9C0A8;
  --line-2: #B8AD8E;

  --focus: #3E5A3A;
  --focus-2: #2A3E27;
  --focus-soft: rgba(62, 90, 58, 0.10);
  /* CTAs "Comenzar" principales (s77b): Pomodoro home + Camino sugerido
     + cada Camino en la biblioteca. Verde apagado equilibrado, mas gris
     que el --focus (que es verde puro). Refuerza el caracter artesanal
     y discreto del producto. NO usar para acciones secundarias. */
  --focus-cta: #50624D;

  --breathe: #C97A5D;
  --breathe-2: #A85E43;
  --breathe-soft: rgba(201, 122, 93, 0.12);

  --move: #9A7B4F;
  --move-soft: rgba(154, 123, 79, 0.12);

  --extra: #6B7A8F;
  --extra-soft: rgba(107, 122, 143, 0.12);

  --hydrate: #5F8A9B;
  --hydrate-soft: rgba(95, 138, 155, 0.12);

  --achievement: #B8934A;
  --achievement-soft: rgba(184, 147, 74, 0.12);

  /* Premium / gating de contenido (s87 · bloque Contenido+Premium F3a).
     Bronce profundo y saturado, deliberadamente MÁS oscuro que el oro
     --achievement (#B8934A) y que el tan --move (#9A7B4F) para que el
     sello PREMIUM no se confunda con ninguno a simple vista. Tono tierra,
     sin dorado brillante ni gradiente — coherente con el carácter artesanal. */
  --premium: #9C6B2E;
  --premium-soft: rgba(156, 107, 46, 0.12);

  /* TIPOGRAFÍA */
  --font-display: 'EB Garamond', 'Cormorant Garamond', Georgia, serif;
  --font-ui: 'Inter Tight', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  --size-hero: clamp(96px, 12vw, 180px);
  --size-h1: 40px;
  --size-h2: 28px;
  --size-h3: 20px;
  --size-body: 15px;
  --size-sm: 13px;
  --size-meta: 11px;

  --lh-tight: 1.1;
  --lh-normal: 1.45;
  --lh-relaxed: 1.65;

  --track-meta: 0.14em;
  --track-tag: 0.08em;

  /* ESPACIADO */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --s-7: 48px;
  --s-8: 64px;
  --s-9: 96px;

  /* RADIUS */
  --r-xs: 4px;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 20px;
  --r-pill: 999px;

  /* SHADOWS */
  --sh-soft: 0 1px 2px rgba(31, 28, 23, 0.06), 0 4px 16px rgba(31, 28, 23, 0.04);
  --sh-card: 0 1px 3px rgba(31, 28, 23, 0.05), 0 8px 24px rgba(31, 28, 23, 0.06);
  --sh-modal: 0 8px 40px rgba(31, 28, 23, 0.18);

  /* MISC */
  --dur-quick: 180ms;
  --dur-normal: 320ms;
  --dur-slow: 640ms;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);

  /* Transiciones entre pantallas del Camino (s77).
     IntroCard al abrir, StepIntro entre pasos, OutroCard antes de
     CompletionScreen. PathTransitions.jsx lee estos tokens via
     getComputedStyle: tweakearlos cambia el ritmo de las cards. */
  --path-intro-ms: 2500ms;
  --path-step-ms: 2000ms;
  --path-outro-ms: 1500ms;
  --path-card-fade-ms: 200ms;
  --path-card-scale-from: 0.96;
}

/* PALETA · Oscuro noche
   s79: recalibrado +10% luminosidad en superficies y bordes (paper*,
   line*). --ink-* sin cambios para mantener el contraste y la calidez
   nocturna; el ajuste solo libera la base lo justo para que el texto
   secundario (--ink-2, --ink-3) respire mejor sin perder el tono. */
[data-palette="oscuro"] {
  --paper: #1d1a14;
  --paper-2: #26211a;
  --paper-3: #2f2920;
  --ink: #EDE5D3;
  --ink-2: #c0b49e;
  --ink-3: #756D5D;
  --line: #3d362b;
  --line-2: #4a4238;
  --focus: #7A9A6D;
  --focus-2: #98B58B;
  --focus-soft: rgba(122, 154, 109, 0.12);
  /* CTAs "Comenzar" (s77b). Misma logica que la paleta clara:
     verde apagado equilibrado, derivado coherentemente para oscuro. */
  --focus-cta: #8E9D88;
  --breathe: #D99477;
  --breathe-2: #E8A98F;
  --breathe-soft: rgba(217, 148, 119, 0.14);
}

/* TIPOGRAFÍAS ALT */
[data-font="cormorant"] {
  --font-display: 'Cormorant Garamond', Georgia, serif;
}
[data-font="mono"] {
  --font-display: 'JetBrains Mono', ui-monospace, monospace;
  --font-ui: 'JetBrains Mono', ui-monospace, monospace;
}

/* RESET MÍNIMO */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  font-size: var(--size-body);
  line-height: var(--lh-normal);
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  transition: background-color var(--dur-normal) var(--ease), color var(--dur-normal) var(--ease);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, textarea { font-family: inherit; color: inherit; }

/* UTILIDADES */
.pace-display { font-family: var(--font-display); }
.pace-display-italic { font-family: var(--font-display); font-style: italic; }
.pace-meta {
  font-size: var(--size-meta);
  letter-spacing: var(--track-meta);
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.pace-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  font-size: 10px;
  letter-spacing: var(--track-tag);
  text-transform: uppercase;
  border-radius: var(--r-pill);
  border: 1px solid currentColor;
  font-weight: 500;
}

/* SCROLLBAR SUTIL */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; border: 3px solid var(--paper); }
::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

/* FOCUS ACCESIBLE */
:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
  border-radius: var(--r-xs);
}

/* REDUCED MOTION (recalibrado s89 · A-reduced de la auditoria v0.34.4).
   El kill global anterior tambien congelaba la guia visual de respiracion
   (BreathVisual anima con transitions de 1800ms sobre transform): con
   reduced-motion activo el circulo saltaba en vez de expandirse y el
   breathwork guiado perdia su funcion. WCAG 2.3.3 exime el motion ESENCIAL
   a la funcionalidad. Convencion: un subtree marcado data-pace-essential
   queda exento del kill; todo lo decorativo (fades, slide-ups, pulsos,
   anillos de timer) sigue congelado. */
@media (prefers-reduced-motion: reduce) {
  *:not([data-pace-essential], [data-pace-essential] *),
  *:not([data-pace-essential], [data-pace-essential] *)::before,
  *:not([data-pace-essential], [data-pace-essential] *)::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ============================================================
   SENDERO BAR (sesion 75 / v0.29.0)
   Progreso visual de un Camino: curva organica + hitos con halo.
   currentColor hereda del tema (claro / oscuro). No introduce
   variables nuevas: deriva todo de --ink / --ink-2 / --ink-3.
   ============================================================ */
.sendero-bar {
  color: var(--ink);
  width: 100%;
  flex-shrink: 0;
  padding: 14px 20px 0;
}
.sendero-bar .sendero-wrap {
  position: relative;
  width: 100%;
  max-width: 640px;
  margin: 4px auto 6px;
}
.sendero-bar .sendero-svg {
  display: block;
  width: 100%;
  height: 100px;
  overflow: visible;
}
.sendero-bar .hito-labels {
  position: relative;
  width: 100%;
  max-width: 640px;
  height: 38px;
  margin: 2px auto 28px;
}
.sendero-bar .hito-label {
  position: absolute;
  transform: translateX(-50%);
  font-family: var(--font-ui);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-3);
  white-space: nowrap;
  text-align: center;
}
.sendero-bar .hito-label.done    { color: var(--ink-2); }
.sendero-bar .hito-label.current { color: var(--ink); font-weight: 500; }
.sendero-bar .hito-label.pending { color: var(--ink-3); opacity: 0.45; }
.sendero-bar .hito-roman {
  display: block;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 9.5px;
  letter-spacing: 0.12em;
  opacity: 0.30;
  margin-top: 2px;
  text-transform: none;
}
.sendero-bar .path-line {
  fill: none;
  stroke: currentColor;
  stroke-width: 1.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.sendero-bar .path-line.pending {
  stroke-dasharray: 3 5;
  opacity: 0.55;
}
.sendero-bar .dot-fill { fill: currentColor; }

/* ============================================================
   Variante lg (s77 / v0.31.0; ajustes labels en s77b)
   SenderoBar grande para las TransitionCards (Intro/StepIntro/Outro).
   Altura mayor: la curva se siente como un "sendero" que recorre la
   parte alta de la card. Posicion estatica en el flujo (no fixed).
   Las hito-labels muestran SOLO los hitos done (filtro en JSX), asi
   que en IntroCard no se ve ninguna y crece segun avanza el Camino.
   ============================================================ */
.sendero-bar.lg {
  width: 100%;
  padding: 0;
}
.sendero-bar.lg .sendero-wrap {
  margin: 0 auto;
  max-width: 720px;
  padding: 0 4px;
}
.sendero-bar.lg .sendero-svg {
  height: clamp(140px, 22vh, 220px);
}
/* Labels en .lg: alinear max-width con el wrap (720) para que el
   calculo left: (xs[i] / 640) * 100% caiga sobre los hitos del SVG.
   Tamano ligeramente mayor (12 vs 10.5px base) para legibilidad en la
   card grande. */
.sendero-bar.lg .hito-labels {
  max-width: 720px;
}
.sendero-bar.lg .hito-label { font-size: 12px; }
.sendero-bar.lg .hito-roman { font-size: 11px; }

/* Orbe viajero (s77).
   Solo se monta dentro de .sendero-bar cuando el padre pasa orbVisible.
   Animacion via <animateMotion> SMIL en el JSX (dur=2s). El keyframe
   path-orb-travel queda reservado para una futura migracion a
   offset-path / CSS scroll-driven (Safari ya soporta offset-path en
   elementos HTML; en SVG circle el soporte es desigual y por eso
   mantenemos SMIL por ahora). */
.sendero-bar .sendero-orb { pointer-events: none; }
@keyframes path-orb-travel {
  0%   { offset-distance: 0%; }
  100% { offset-distance: 100%; }
}

  <style id="pace-paths-css">
    .path-runner-overlay {
      position: fixed; inset: 0;
      background: var(--paper);
      z-index: 80;
      display: flex; flex-direction: column;
    }
    .path-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .path-dots { display: flex; gap: 6px; }
    .path-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); transition: background 200ms; }
    .path-dot.active { background: var(--ink); }
    .path-dot.done   { background: var(--ink-3); }
    .path-step-body  { flex: 1; overflow: auto; display: flex; flex-direction: column; }
    .path-modal-back { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 90; display: flex; align-items: center; justify-content: center; }
    /* PathStats -- sesion 54 / compactado sesion 61+62+63 para que la pestana
       Caminos del modal Stats no necesite scroll vertical en 1080p. */
    .path-stats { display:flex; flex-direction:column; gap:6px; padding:8px 0; }
    .path-stats-summary { display:flex; gap:12px; flex-wrap:wrap; }
    .path-stat-card { flex:1; min-width:140px; padding:8px 12px; border:1px solid var(--line); border-radius:var(--r-md); }
    .path-stat-label { font-size:.8em; opacity:.7; }
    .path-stat-value { font-size:1.3em; font-weight:600; margin-top:2px; font-family:var(--font-display); font-style:italic; line-height:1.1; }
    .path-stats-table table { width:100%; border-collapse:collapse; }
    .path-stats-table th, .path-stats-table td { padding:4px 10px; border-bottom:1px solid var(--line); text-align:left; font-size:.9em; }
    .path-stats-table th { font-size:.78em; font-weight:600; letter-spacing:.4px; color:var(--ink-3); }
    .path-stats-empty { opacity:.6; padding:8px 0; }
    /* Mobile responsive -- sesion 55 / actualizado sesion 63 */
    @media (max-width: 640px) {
      /* Summary cards: 3 columnas horizontales en movil (s63) */
      .path-stats-summary { display:grid !important; grid-template-columns:repeat(3, 1fr) !important; gap:8px !important; }
      .path-stat-card { min-width:0 !important; padding:6px 8px !important; }
      .path-stat-label { font-size:.72em !important; }
      .path-stat-value { font-size:1.05em !important; }
    }
    @media (max-width: 480px) {
      .path-topbar { padding: 12px 14px; }
      .path-topbar button { min-height: 44px; min-width: 44px; }
      .path-modal-back > div { padding: 24px 18px; }
      .path-modal-back button { min-height: 44px; }
      /* NOTA: el responsive de SuggestedPathCard (dual + single) vive ahora
         en su propio fichero (pace-spc-responsive-css), inyectado por
         app/paths/SuggestedPathCard.jsx. La regla previa aqui hacia que
         tambien la card unica se apilara vertical, lo que infla el modulo
         en movil. Sesion 61 / v0.28.2. */
    }
  </style>

/* PACE · i18n helper — useT + detectInitialLang
   Sesión 35 · v0.17.0

   DEBE cargarse DESPUÉS de strings.js y ANTES de state.jsx,
   porque state.jsx llama a detectInitialLang() al evaluar loadState().
*/

function detectInitialLang() {
  const nav = (navigator.language || 'en').slice(0, 2).toLowerCase();
  return nav === 'es' ? 'es' : 'en';
}

/* isDev: true en localhost, 127.0.0.1 o file:// — activa console.warn
   para claves faltantes. En producción (dominio real) es silencioso. */
const _i18nIsDev = (
  ['localhost', '127.0.0.1'].includes(location.hostname) ||
  location.protocol === 'file:'
);

/* useT — hook reactivo que lee state.lang y devuelve las funciones
   de traducción t() y tn() (con variables {key}).

   Depende de usePace (state.jsx) y PACE_STRINGS (strings.js).
   Ambos deben estar cargados antes de que cualquier componente
   que use useT() se monte. */
function useT() {
  const [state] = usePace();
  const lang = state.lang || 'en';

  function t(key) {
    const strings = window.PACE_STRINGS;
    if (!strings) return key;
    if (strings[lang] && strings[lang][key] !== undefined) return strings[lang][key];
    if (strings.en && strings.en[key] !== undefined) {
      if (_i18nIsDev) console.warn(`[i18n] missing ${lang}: ${key}`);
      return strings.en[key];
    }
    if (_i18nIsDev) console.warn(`[i18n] missing key: ${key}`);
    return key;
  }

  function tn(key, vars) {
    let str = t(key);
    if (vars) {
      Object.keys(vars).forEach(k => {
        str = str.split(`{${k}}`).join(String(vars[k]));
      });
    }
    return str;
  }

  return { t, tn, lang };
}

Object.assign(window, { useT, detectInitialLang });

    breathMinutes: (weeklyStats.breathMinutes || [])[idx] || 0,
    moveMinutes:   (weeklyStats.moveMinutes   || [])[idx] || 0,
    waterGlasses:  (weeklyStats.waterGlasses  || [])[idx] || 0,
  };
  const hasData = Object.values(delta).some(v => v > 0);
  if (!hasData) return history;

  const isoDate = toISODate(dateStr);
  const days = { ...(history.days || {}), [isoDate]: delta };
  const monthKey = isoDate.slice(0, 7);
  const yearKey  = isoDate.slice(0, 4);
  return {
    days,
    months: { ...(history.months || {}), [monthKey]: recomputeMonthFromDays(days, monthKey) },
    years:  { ...(history.years  || {}), [yearKey]:  recomputeYearFromDays(days, yearKey)  },
  };
}

/* Migration guard (sesion 43): copia weeklyStats → history.days en el primer
   rollover post-upgrade. Solo se ejecuta una vez (_historyMigrated === false). */
function migrateWeeklyStatsToHistory(state) {
  if (state._historyMigrated) return state;
  if (!state.lastActiveDay) return { ...state, _historyMigrated: true };
  let h = state.history || { days: {}, months: {}, years: {} };
  const lastDate = new Date(state.lastActiveDay);
  for (let offset = 0; offset < 7; offset++) {
    const d = new Date(lastDate.getTime() - offset * 86400000);
    h = archiveDayToHistory(h, d.toDateString(), state.weeklyStats);
  }
  return { ...state, history: h, _historyMigrated: true };
}

/* Sesion 69 / v0.28.8: re-indexa weeklyStats de la convencion vieja
   (0=domingo, 1=lunes ... 6=sabado, indexado por getDay()) a la nueva
   (0=lunes, 1=martes ... 6=domingo). Mapping: nuevo[i] = viejo[(i+1)%7]. */
function reindexWeeklyStatsMondayFirst(ws) {
  const rot = (arr) => Array.isArray(arr) && arr.length === 7
    ? [arr[1], arr[2], arr[3], arr[4], arr[5], arr[6], arr[0]]
    : [0,0,0,0,0,0,0];
  return {
    focusMinutes:  rot(ws && ws.focusMinutes),
    breathMinutes: rot(ws && ws.breathMinutes),
    moveMinutes:   rot(ws && ws.moveMinutes),
    waterGlasses:  rot(ws && ws.waterGlasses),
  };
}

/* ============================
   ROLLOVER
   ============================ */

function rolloverIfNeeded(state) {
  const today = new Date();
  const todayStr = today.toDateString();
  if (state.lastActiveDay === todayStr) return state;

  /* Detectar si la migracion s43 esta por ejecutarse en esta llamada.
     Si _historyMigrated era false al entrar, migrateWeeklyStatsToHistory
     ya archivara lastActiveDay y NO debemos volver a archivarlo aqui (C2). */
  const wasAlreadyMigrated = !!state._historyMigrated;
  let migratedState = migrateWeeklyStatsToHistory(state);
  let nextHistory = migratedState.history || { days: {}, months: {}, years: {} };

  /* Archivar el dia previo solo si NO acaba de migrar (la migracion ya lo cubrio). */
  if (migratedState.lastActiveDay && wasAlreadyMigrated) {
    nextHistory = archiveDayToHistory(
      nextHistory, migratedState.lastActiveDay, migratedState.weeklyStats
    );
  }

  /* FIX C1 (sesion 69): si entramos en una nueva semana lunes-domingo,
     resetear weeklyStats por completo. */
  let nextWeekly = migratedState.weeklyStats;
  if (migratedState.lastActiveDay) {
    const prevMonday  = getMondayOf(new Date(migratedState.lastActiveDay)).getTime();
    const todayMonday = getMondayOf(today).getTime();
    if (todayMonday !== prevMonday) {
      nextWeekly = {
        focusMinutes:  [0,0,0,0,0,0,0],
        breathMinutes: [0,0,0,0,0,0,0],
        moveMinutes:   [0,0,0,0,0,0,0],
        waterGlasses:  [0,0,0,0,0,0,0],
      };
    }
  }

  /* FIX A2 (sesion 69): rotura proactiva del streak. Si la ultima sesion
     fue antes de ayer, current=0 inmediatamente (sin esperar a la siguiente). */
  let nextStreak = migratedState.streak;
  if (nextStreak && nextStreak.lastActiveDate) {
    const lastActive = new Date(nextStreak.lastActiveDate);
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    yesterday.setHours(0, 0, 0, 0);
    lastActive.setHours(0, 0, 0, 0);
    if (lastActive.getTime() < yesterday.getTime()) {
      nextStreak = { ...nextStreak, current: 0 };
    }
  }

  /* Trigger first.return — abrir la app un dia distinto al ultimo.
     Deferred via setTimeout para no llamar a unlockAchievement desde
     dentro de loadState (achievements aun no cargado en este punto). */
  if (migratedState.lastActiveDay) {
    setTimeout(() => {
      try { unlockAchievement('first.return'); } catch (e) {}
    }, 0);
  }
  return {
    ...migratedState,
    history: nextHistory,
    weeklyStats: nextWeekly,
    streak: nextStreak,
    cycle: 0,
    plan: { muevete: false, respira: false, extra: false, hidratate: false },
    water: { ...migratedState.water, today: 0, lastReset: todayStr },
    lastActiveDay: todayStr,
  };
}

/* ============================
   STORE PRIMITIVO
   ============================ */

function loadState() {

  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) {
      return {
        ...defaultState,
        lang: _detectLang(),
        palette: detectInitialPalette(),
        lastActiveDay: new Date().toDateString(),
        _weeklyStatsReindexed_v0_28_8: true,
        _historyRecalculated_v0_28_8: true,
        ...(isMobileViewport() ? { sidebarCollapsed: true } : {}),
      };
    }
    const parsed = JSON.parse(raw);
    if (!parsed.lang) parsed.lang = _detectLang();
    /* Migracion defensiva s49: paths ausente en instalaciones pre-v0.26. */
    if (!parsed.paths) parsed.paths = defaultState.paths;
    /* Migracion defensiva s54: paths.history ausente. */
    if (parsed.paths && !parsed.paths.history) {
      const hist = [];
      for (const id in (parsed.paths.completed || {})) {
        const e = parsed.paths.completed[id];
        if (e && e.lastDoneAt && e.count) {
          for (let i = 0; i < e.count; i++) hist.push(e.lastDoneAt);
        }
      }
      parsed.paths.history = hist;
    }
    /* Migracion defensiva s75: paths.lastViewed ausente. */
    if (parsed.paths && parsed.paths.lastViewed === undefined) {
      parsed.paths.lastViewed = null;
    }

    /* Sesion 69 / v0.28.8: re-indexar weeklyStats de getDay() a lunes-primero.
       Idempotente via guard. Debe ocurrir ANTES de cualquier escritura/lectura
       que asuma la nueva convencion (incluyendo el rollover). */
    if (!parsed._weeklyStatsReindexed_v0_28_8 && parsed.weeklyStats) {
      parsed.weeklyStats = reindexWeeklyStatsMondayFirst(parsed.weeklyStats);
      parsed._weeklyStatsReindexed_v0_28_8 = true;
    }

    /* Sesion 69 / v0.28.8: migracion compensatoria de history.months/years.

       recalcular months/years desde days es 100% seguro y arregla cualquier

      parsed._historyRecalculated_v0_28_8 = true;
    }

    /* Sesion 71 / v0.28.9: paleta 'envejecido' retirada; migrar a 'crema'. */
    if (parsed.palette === 'envejecido') {
      parsed.palette = 'crema';
    }

    const merged = rolloverIfNeeded({ ...defaultState, ...parsed });
    if (parsed.sidebarCollapsed === undefined && isMobileViewport()) {
      return { ...merged, sidebarCollapsed: true };
    }
    return merged;
  } catch (e) {
    return {
      ...defaultState,
      lang: _detectLang(),
      palette: detectInitialPalette(),
      lastActiveDay: new Date().toDateString(),
      _weeklyStatsReindexed_v0_28_8: true,
      _historyRecalculated_v0_28_8: true,
      ...(isMobileViewport() ? { sidebarCollapsed: true } : {}),
    };
  }
}

let _state = loadState();
const _listeners = new Set();

function persistState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(_state)); } catch (e) {}
}

function getState() { return _state; }

function setState(patch) {
  const prev = _state;
  _state = typeof patch === 'function' ? patch(_state) : { ...(_state), ...patch };
  persistState();
  _listeners.forEach(l => l());
  /* Aplicar tokens visuales solo cuando palette o font cambian realmente. */
  if (prev.palette !== _state.palette || prev.font !== _state.font) {
    applyTheme();
  }
}

function subscribe(listener) {
  _listeners.add(listener);
  return () => _listeners.delete(listener);
}

function applyTheme() {
  const root = document.documentElement;
  root.setAttribute('data-palette', _state.palette);
  root.setAttribute('data-font', _state.font);
}

function usePace() {
  const state = useSyncExternalStore(subscribe, getState);
  return [state, setState];
}

function ensureDayFresh() {
  const next = rolloverIfNeeded(_state);
  if (next !== _state) {
    _state = next;
    persistState();
    _listeners.forEach(l => l());
    try { checkStatsAchievements(); } catch (e) {}
  }
}

/* ============================
   TOAST (buffer pre-mount)
   ============================ */

const _toastListeners = new Set();
const _pendingToasts = [];

function showToast(toast) {
  const t = { ...toast, _id: Date.now() + Math.random() };
  if (_toastListeners.size === 0) {
    _pendingToasts.push(t);
    return;
  }
  _toastListeners.forEach(l => l(t));
}

function onToast(listener) {
  const wasEmpty = _toastListeners.size === 0;
  _toastListeners.add(listener);
  /* Vaciar buffer pendiente en cuanto hay al menos un listener (fix StrictMode). */
  if (wasEmpty && _pendingToasts.length > 0) {
    const drained = _pendingToasts.splice(0);
    setTimeout(() => { drained.forEach(t => listener(t)); }, 0);
  }
  return () => _toastListeners.delete(listener);
}

// Aplicar tema al cargar
applyTheme();

Object.assign(window, {
  LS_KEY, PACE_VERSION, TOAST_DURATION_MS, defaultState,
  detectInitialPalette,
  getState, setState, subscribe, usePace, ensureDayFresh,
  showToast, onToast,
  zeroEntry, toISODate, todayISO,
  getDayIndexMondayFirst, getMondayOf,
  archiveDayToHistory,
  recomputeMonthFromDays, recomputeYearFromDays, recomputeAllHistoryAggregates,
});

function addFocusMinutes(mins) {
  ensureDayFresh();
  setState(prev => {
    const day = getDayIndexMondayFirst(new Date());
    const week = [...prev.weeklyStats.focusMinutes];

/* hydrate.week.perfect — 7 dias consecutivos alcanzando water.goal.
   Ordena waterGoalDates numericamente y verifica 7 entradas seguidas
   separadas exactamente 1 dia (86400000 ms). */
function checkHydrateWeekPerfect() {
  const dates = (getState().waterGoalDates || [])
    .map(d => new Date(d).getTime())
    .sort((a, b) => a - b);
  if (dates.length < 7) return;
  for (let i = dates.length - 1; i >= dates.length - 6; i--) {
    if (dates[i] - dates[i - 1] !== 86400000) return;
  }
  unlockAchievement('hydrate.week.perfect');
}

function addWaterGlass(delta) {
  if (delta === undefined) delta = 1;
  ensureDayFresh();
  const s = getState();
  const day = getDayIndexMondayFirst(new Date());
  const week = [...s.weeklyStats.waterGlasses];
  week[day] = Math.max(0, (week[day] || 0) + delta);
  const next = Math.max(0, s.water.today + delta);
  setState({
    water: { ...s.water, today: next },
    plan: { ...s.plan, hidratate: next > 0 ? true : s.plan.hidratate },
    weeklyStats: { ...s.weeklyStats, waterGlasses: week },
  });
  if (delta > 0) {
    unlockAchievement('first.sip');
    checkPlanAchievements();
    checkSilentDayAchievement();
    if (getState().water.today >= getState().water.goal) {
      const today = new Date().toDateString();
      const goalDates = Array.isArray(getState().waterGoalDates) ? getState().waterGoalDates : [];
      if (!goalDates.includes(today)) {
        setState({ waterGoalDates: [...goalDates, today].slice(-14) });
        checkHydrateWeekPerfect();

    }
  }
}

/* master.dawn / master.dusk / morning.5 */
function checkTimeOfDayAchievements() {
  const now = new Date();

  if (h < 7)  unlockAchievement('master.dawn');
  if (h >= 21) unlockAchievement('master.dusk');
  if (h < 9) {

function checkSilentDayAchievement() {

  if (category === 'coherent' && (c.coherent || 0) >= 10) unlockAchievement('master.coherent.10');

  const monthDayCounts = {};
  Object.keys(days).forEach(d => {

  if (current >= 7)   unlockAchievement('streak.7');

/* PACE · state-paths.jsx
   Caminos: CRUD, stats, favoritos.

function startPath(pathId) {
  const path = window.getPath && window.getPath(pathId);
  if (!path) return;
  setState(s => ({
    ...s,
    paths: {
      ...s.paths,
      lastViewed: pathId, // s75: rastrea el ultimo Camino abierto
      current: {
        id: pathId,
        stepIndex: 0,
        startedAt: Date.now(),
        skippedSteps: [],
      },
    },
  }));
}

function setLastViewedPath(pathId) {
  setState(s => ({ ...s, paths: { ...s.paths, lastViewed: pathId } }));
}

function advancePathStep(reason) {
  if (reason === undefined) reason = 'done';
  setState(s => {
    const c = s.paths.current;
    if (!c) return s;
    const path = window.getPath && window.getPath(c.id);
    if (!path) return s;
    const newSkipped = reason === 'skip'
      ? [...c.skippedSteps, c.stepIndex]
      : c.skippedSteps;
    const nextIndex = c.stepIndex + 1;
    if (nextIndex >= path.steps.length) {
      const prev = s.paths.completed[c.id] || { count: 0 };
      /* s78: tras cerrar un Camino, comprobar si el usuario ha completado
         ya los 7 -> desbloquea master.path.all7. Se llama fuera del setState
         para evitar re-entradas (lo dispara el setTimeout(0) de abajo). */
      if (typeof window.checkAllPathsCompleted === 'function') {
        setTimeout(function () {
          try { window.checkAllPathsCompleted(); } catch (e) {}
        }, 0);
      }
      return {
        ...s,
        paths: {
          ...s.paths,
          current: null,
          completed: {
            ...s.paths.completed,
            [c.id]: {
              count: prev.count + 1,
              lastDoneAt: todayISO(),
            },
          },
          history: [...(s.paths.history || []), todayISO()],
        },
      };
    }
    return {
      ...s,
      paths: {
        ...s.paths,
        current: { ...c, stepIndex: nextIndex, skippedSteps: newSkipped },
      },
    };
  });
}

function completePath(pathId) {
  setState(s => {
    const prev = s.paths.completed[pathId] || { count: 0 };
    return {
      ...s,
      paths: {
        ...s.paths,
        current: null,
        completed: {
          ...s.paths.completed,
          [pathId]: { count: prev.count + 1, lastDoneAt: todayISO() },
        },
        history: [...(s.paths.history || []), todayISO()],
      },
    };
  });
}

function abandonPath() {
  setState(s => ({
    ...s,
    paths: { ...s.paths, current: null },
  }));
}

/* Jerarquia de seleccion (s78):
     1. lastViewed (s75)    -- la preferencia del usuario manda siempre que
                               siga apuntando a un Camino del catalogo vigente.
     2. timeOfDay match     -- en cuanto el usuario nunca abrio uno, sugerir
                               el slot horario actual (morning/midday/afternoon/
                               evening + weekend). Para el sabado/domingo, el
                               slot 'weekend' gana sobre cualquier slot horario.
     3. 'anytime' (s78)     -- fallback que SIEMPRE entra antes del catalog[0]
                               (p.ej. path.breath, sin hora fija).
     4. catalog[0]          -- ultimo recurso, mantiene la garantia de no
                               devolver null si hay al menos un Camino. */
function getSuggestedPath() {
  const s = getState && getState();
  const lv = s && s.paths && s.paths.lastViewed;
  const catalog = (typeof window !== 'undefined' && window.PATH_CATALOG) || [];
  if (!catalog.length) return null;

  // 1. lastViewed
  if (lv) {
    for (let i = 0; i < catalog.length; i++) {
      if (catalog[i].id === lv) return lv;
    }
  }

  // 2. slot horario actual
  const now = new Date();
  const dow = now.getDay(); // 0 = domingo, 6 = sabado
  const isWeekend = dow === 0 || dow === 6;
  if (isWeekend) {
    for (let i = 0; i < catalog.length; i++) {
      if (catalog[i].timeOfDay === 'weekend') return catalog[i].id;
    }
  }
  const h = now.getHours();
  let slot;
  if (h < 9)       slot = 'morning';
  else if (h < 13) slot = 'midday';
  else if (h < 17) slot = 'afternoon';
  else if (h < 21) slot = 'evening';
  else             slot = 'evening';
  for (let i = 0; i < catalog.length; i++) {
    if (catalog[i].timeOfDay === slot) return catalog[i].id;
  }

  // 3. 'anytime'
  for (let i = 0; i < catalog.length; i++) {
    if (catalog[i].timeOfDay === 'anytime') return catalog[i].id;
  }

  // 4. catalog[0]
  return catalog[0].id;
}

/* ============================
   PATH STATS (sesion 54)
   ============================ */

function computePathStreaks(history) {
  if (!history || history.length === 0) return { currentStreak: 0, bestStreak: 0 };
  const days = new Set(history);
  const sorted = Array.from(days).sort();
  let best = 1, cur = 1;
  for (let i = 1; i < sorted.length; i++) {
    const prev = new Date(sorted[i - 1]);
    const curr = new Date(sorted[i]);
    const diff = Math.round((curr - prev) / 86400000);
    if (diff === 1) {
      cur++;
      if (cur > best) best = cur;
    } else if (diff > 1) {
      cur = 1;
    }
  }
  const today = todayISO();
  let cs = 0;
  let check = today;
  while (days.has(check)) {
    cs++;
    const d = new Date(check);
    d.setDate(d.getDate() - 1);
    check = d.toISOString().slice(0, 10);
  }
  return { currentStreak: cs, bestStreak: best };
}

function getPathStats() {
  const s = getState().paths;
  const hist = s.history || [];
  const total = hist.length;
  const byPath = {};
  for (const id in (s.completed || {})) {
    byPath[id] = {
      count: s.completed[id].count || 0,
      lastDoneAt: s.completed[id].lastDoneAt || null,
    };
  }
  const streaks = computePathStreaks(hist);
  return { total, byPath, ...streaks };
}

function setFavoritePath(pathId) {
  setState(s => ({ ...s, paths: { ...s.paths, favorite: pathId } }));
}

function clearFavoritePath() {
  setState(s => ({ ...s, paths: { ...s.paths, favorite: null } }));
}

function toggleFavoritePath(pathId) {
  const current = getState().paths && getState().paths.favorite;
  if (current === pathId) clearFavoritePath();
  else setFavoritePath(pathId);
}

Object.assign(window, {
  startPath, advancePathStep, completePath, abandonPath, getSuggestedPath,
  setFavoritePath, clearFavoritePath, toggleFavoritePath, setLastViewedPath,
  getPathStats,
});

/* PACE · Foco · Cuerpo

   Shape de rutina custom:
     { id: 'custom.<Date.now()>', name, steps: [{ name, dur, cue }],
       min, createdAt, updatedAt }
   `steps` usa el mismo shape que las rutinas de catálogo — el runner
   (MoveSession) no distingue. `min` se deriva al guardar (ceil de la
   suma de dur). El prefijo `custom.` nunca colisiona con los ids
   blindados `extra.*` / `move.*`, y al no estar en ningún mapa de
   logros (exploreMap, BREATH_ROUTINE_CATEGORIES) una sesión custom
   solo acredita lo genérico de completeMoveSession. */

const CUSTOM_LIMITS = {
  maxRoutines: 10,
  minSteps: 1,
  maxSteps: 12,
  minDur: 10,   // segundos por paso
  maxDur: 120,
  durStep: 5,
  maxNameLen: 40,
};

/* Lectura defensiva: instalaciones previas a v0.38.0 no tienen la key
   (loadState la cubre via defaultState, pero un import de JSON viejo
   podría reintroducir un estado sin ella o corrupto). */
function getCustomRoutines() {
  const list = getState().customRoutines;
  return Array.isArray(list) ? list : [];
}

function getCustomRoutine(id) {
  return getCustomRoutines().find(r => r.id === id) || null;
}

/* Normaliza el borrador del constructor a los límites. */
function sanitizeCustomRoutine(draft) {
  const name = String(draft.name || '').trim().slice(0, CUSTOM_LIMITS.maxNameLen) || 'Rutina propia';
  const steps = (Array.isArray(draft.steps) ? draft.steps : [])
    .slice(0, CUSTOM_LIMITS.maxSteps)
    .map(s => ({
      name: String(s.name || ''),
      dur: Math.min(CUSTOM_LIMITS.maxDur, Math.max(CUSTOM_LIMITS.minDur,
        Math.round((Number(s.dur) || 30) / CUSTOM_LIMITS.durStep) * CUSTOM_LIMITS.durStep)),
      cue: String(s.cue || ''),
    }));
  const totalSec = steps.reduce((acc, s) => acc + s.dur, 0);
  const min = Math.max(1, Math.ceil(totalSec / 60));
  return { name, steps, min };
}

/* Crea una rutina. Devuelve la rutina o null si no pasa los límites. */
function addCustomRoutine(draft) {
  if (getCustomRoutines().length >= CUSTOM_LIMITS.maxRoutines) return null;
  const clean = sanitizeCustomRoutine(draft);
  if (clean.steps.length < CUSTOM_LIMITS.minSteps) return null;
  const now = Date.now();
  const routine = { id: `custom.${now}`, ...clean, createdAt: now, updatedAt: now };
  setState(s => ({
    ...s,
    customRoutines: [...(Array.isArray(s.customRoutines) ? s.customRoutines : []), routine],
  }));
  return routine;
}

/* Edita una rutina existente. Devuelve la rutina o null. */
function updateCustomRoutine(id, draft) {
  const clean = sanitizeCustomRoutine(draft);
  if (clean.steps.length < CUSTOM_LIMITS.minSteps) return null;
  if (!getCustomRoutine(id)) return null;
  let updated = null;
  setState(s => ({
    ...s,
    customRoutines: (Array.isArray(s.customRoutines) ? s.customRoutines : []).map(r => {
      if (r.id !== id) return r;
      updated = { ...r, ...clean, updatedAt: Date.now() };
      return updated;
    }),
  }));
  return updated;
}

function deleteCustomRoutine(id) {
  setState(s => ({
    ...s,
    customRoutines: (Array.isArray(s.customRoutines) ? s.customRoutines : []).filter(r => r.id !== id),
  }));
}

  getCustomRoutines, getCustomRoutine,
  addCustomRoutine, updateCustomRoutine, deleteCustomRoutine,

  <script type="text/babel">
/* PACE · Foco · Cuerpo
   Copyright © 2026 ezradesign
   Licensed under the Elastic License 2.0 — see LICENSE

   Sonidos sutiles vía Web Audio API — refactor 432 Hz (sesión 38a · v0.20.0).

   Cambios respecto a v0.13.0 (sesión 28):
     - Afinación A=432 Hz (constante BASE_A) + helper note() para nota→Hz.
     - Primitivas componibles: tone, glide, chord, bell, breathNoise.
     - breathNoise: ruido blanco filtrado lowpass (200↔800 Hz) para
       respiración realista — no tonos puros. Parámetro dur sincroniza
       el sonido con la duración real de la fase visual.
     - Catálogo ampliado: pomodoro.start/end, breathe.inhale/exhale,
       breathe.session.start/end.
     - Hold de respiración = silencio intencional (decisión meditativa).
     - Alias legacy (tick, complete, sip, breath) conservados para
       compatibilidad con módulos no migrados.

     playSound(name, ...args) — función plana
     useSound()               → { play(name, ...args) }

const { useCallback: useCallbackSound } = React;

/* === AFINACIÓN 432 Hz === */
const BASE_A = 432;

/* Convierte nombre de nota a Hz con A4=432. Temperamento igual 2^(1/12).
   Ejemplos: note('A4')===432, note('C5')≈513.7, note('G5')≈769.3. */
function note(name) {
  const MAP = {
    C:0, 'C#':1, Db:1, D:2, 'D#':3, Eb:3,
    E:4, F:5, 'F#':6, Gb:6, G:7, 'G#':8, Ab:8,
    A:9, 'A#':10, Bb:10, B:11,
  };
  const m = name.match(/^([A-G][#b]?)(\d)$/);
  if (!m) return BASE_A;
  const semi = MAP[m[1]] !== undefined ? MAP[m[1]] : 9;
  const oct  = parseInt(m[2]);
  return BASE_A * Math.pow(2, ((oct - 4) * 12 + (semi - 9)) / 12);
}

/* === SINGLETON AudioContext === */
let _audioCtx = null;
function getCtx() {
  if (_audioCtx) return _audioCtx;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    _audioCtx = new Ctx();
    return _audioCtx;
  } catch (e) { return null; }
}

function ensureRunning(ctx) {

/* === ENVOLVENTE ADSR mínima === */
function envelope(ctx, dest, t0, peak, attack, release) {

  g.gain.linearRampToValueAtTime(peak, t0 + attack);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + attack + release);
  g.connect(dest);
  return g;
}

/* === PRIMITIVA 1: tone — oscilador puro === */
function tone(ctx, dest, freq, t0, dur, peak, type) {
  if (peak === undefined) peak = 0.06;
  if (type === undefined) type = 'sine';
  const o = ctx.createOscillator();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  const g = envelope(ctx, dest, t0, peak, 0.012, dur);
  o.connect(g);
  o.start(t0);
  o.stop(t0 + dur + 0.05);
}

/* === PRIMITIVA 2: glide — barrido exponencial de frecuencia === */
function glide(ctx, dest, freqStart, freqEnd, t0, dur, peak, type) {
  if (peak === undefined) peak = 0.06;
  if (type === undefined) type = 'sine';
  const o = ctx.createOscillator();
  o.type = type;
  o.frequency.setValueAtTime(freqStart, t0);
  o.frequency.exponentialRampToValueAtTime(freqEnd, t0 + dur);
  const g = envelope(ctx, dest, t0, peak, 0.012, dur);
  o.connect(g);
  o.start(t0);
  o.stop(t0 + dur + 0.05);
}

/* === PRIMITIVA 3: chord — varios osciladores simultáneos === */
function chord(ctx, dest, freqs, t0, dur, peak, type) {
  if (peak === undefined) peak = 0.08;
  if (type === undefined) type = 'sine';
  const perVoice = (peak / freqs.length) * 1.4;
  freqs.forEach(function(freq) { tone(ctx, dest, freq, t0, dur, perVoice, type); });

/* === PRIMITIVA 4: bell — campana con overtones (timbre metálico suave) === */
function bell(ctx, dest, freq, t0, dur, peak) {
  if (peak === undefined) peak = 0.10;
  tone(ctx, dest, freq,       t0,        dur,        peak * 0.70, 'sine');
  tone(ctx, dest, freq * 2.8, t0 + 0.01, dur * 0.60, peak * 0.20, 'sine');
  tone(ctx, dest, freq * 5.4, t0 + 0.02, dur * 0.35, peak * 0.10, 'sine');

/* === PRIMITIVA 5: breathNoise — ruido blanco filtrado para respiracion ===

   direction 'out': filtro 800Hz→200Hz  (exhalar: tono baja)

   Resultado: shhhhh que sube (inhala) o haaaaa que baja (exhala). */

  var frames = Math.ceil(dur * sr);

  var data   = buf.getChannelData(0);

  src.buffer = buf;

  filt.Q.value = 1.5;

    filt.frequency.linearRampToValueAtTime(fHigh, t0 + dur);
  } else {
    filt.frequency.setValueAtTime(fHigh, t0);
    filt.frequency.linearRampToValueAtTime(fLow,  t0 + dur);
  }

  var g = ctx.createGain();
  g.gain.setValueAtTime(0,         t0);
  g.gain.linearRampToValueAtTime(peak, t0 + dur * 0.15);
  g.gain.setValueAtTime(peak,           t0 + dur * 0.65);
  g.gain.linearRampToValueAtTime(0.0001, t0 + dur);

  src.connect(filt);
  filt.connect(g);
  g.connect(dest);
  src.start(t0);
  src.stop(t0 + dur + 0.05);
}

/* === CATÁLOGO DE SONIDOS === */
var SOUND_RECIPES = {

  /* --- LEGACY ALIASES (compat con módulos no migrados) --- */
  tick: function(ctx, t0) {
    tone(ctx, ctx.destination, 800, t0, 0.03, 0.05, 'sine');
  },
  complete: function(ctx, t0) {
    tone(ctx, ctx.destination, note('C5'), t0,        0.55, 0.10, 'sine');
    tone(ctx, ctx.destination, note('G5'), t0 + 0.04, 0.50, 0.07, 'sine');
    tone(ctx, ctx.destination, note('C6'), t0 + 0.10, 0.35, 0.03, 'sine');
  },
  sip: function(ctx, t0) {
    glide(ctx, ctx.destination, note('G5'), note('F#4'), t0, 0.22, 0.09, 'sine');
  },
  breath: function(ctx, t0) {

  },

  /* --- POMODORO --- */
  'pomodoro.start': function(ctx, t0) {
    glide(ctx, ctx.destination, note('C5'), note('G5'), t0, 0.20, 0.06, 'sine');
  },
  'pomodoro.end': function(ctx, t0) {
    SOUND_RECIPES.complete(ctx, t0);
  },

    if (dur === undefined) dur = 4.0;
    breathNoise(ctx, ctx.destination, 'in', t0, dur, 0.06);
  },
  'breathe.exhale': function(ctx, t0, dur) {

    breathNoise(ctx, ctx.destination, 'out', t0, dur, 0.07);

  'breathe.session.end': function(ctx, t0) {
    chord(ctx, ctx.destination, [note('C5'), note('E5'), note('G5')], t0, 0.70, 0.10, 'sine');
  },

  /* --- MUEVE --- */
  'move.start': function(ctx, t0) {
    glide(ctx, ctx.destination, note('C4'), note('G4'), t0, 0.22, 0.07, 'sine');
  },
  'move.step': function(ctx, t0) {
    tone(ctx, ctx.destination, note('A4'), t0, 0.06, 0.04, 'triangle');
  },
  'move.end': function(ctx, t0) {
    chord(ctx, ctx.destination, [note('C5'), note('E5'), note('G5')], t0, 0.60, 0.09, 'sine');
  },

  /* --- HIDRÁTATE --- */
  'hydrate.sip': function(ctx, t0) {
    glide(ctx, ctx.destination, note('G5'), note('D5'), t0, 0.18, 0.07, 'sine');
  },
  'hydrate.goal': function(ctx, t0) {
    tone(ctx, ctx.destination, note('C5'), t0,        0.65, 0.06, 'sine');
    tone(ctx, ctx.destination, note('E5'), t0 + 0.05, 0.55, 0.05, 'sine');
    tone(ctx, ctx.destination, note('G5'), t0 + 0.10, 0.45, 0.04, 'sine');
    tone(ctx, ctx.destination, note('C6'), t0 + 0.15, 0.35, 0.03, 'sine');
  },

  /* --- LOGROS --- */
  'achievement.unlock': function(ctx, t0) {
    bell(ctx, ctx.destination, note('A5'), t0, 0.90, 0.08);
  },
  'achievement.secret': function(ctx, t0) {

  },

/* === API PÚBLICA ===
   playSound(name, ...args): args extra se pasan a la receta
   (ej. dur en breathe.inhale/exhale). */
function playSound(name) {
  var args = Array.prototype.slice.call(arguments, 1);
  try {
    var s = (typeof getState === 'function') ? getState() : null;
    if (!s || !s.soundOn) return;
    var ctx = getCtx();
    if (!ctx) return;

    if (!recipe) return;

    var args = Array.prototype.slice.call(arguments);

/* === DRONE AMBIENTE (capa 2 opt-in) ===
   Singleton. G2 ≈ 96.7 Hz · sine · peak 0.02.
   LFO senoidal 0.1 Hz · ±0.002 para movimiento orgánico.
   Arranca solo si soundOn && ambientOn en el momento de llamar start().
   start(force) — F4/s90, Coherente 432: fuerza el arranque aunque
   ambientOn esté apagado; soundOn (master) manda siempre. El flag se
   recuerda para que resume() tras una pausa no mate el drone forzado.
   Activar ambientOn mid-sesión NO arranca el drone retroactivamente;
   solo arranca al inicio de una sesión nueva (decisión de producto). */

  let osc = null, gainNode = null, lfo = null, lfoGain = null;
  let isPaused = false;
  let forced = false;

      return !!(s && s.soundOn && (forced || s.ambientOn));
    } catch(e) { return false; }

    forced = !!force;
    if (!shouldPlay()) { forced = false; return; }

    osc.type = 'sine';
    osc.frequency.setValueAtTime(note('G2'), t0);
    gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0, t0);
    gainNode.gain.linearRampToValueAtTime(0.02, t0 + 1.2);
    lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.setValueAtTime(0.1, t0);
    lfoGain = ctx.createGain();
    lfoGain.gain.setValueAtTime(0.002, t0);
    lfo.connect(lfoGain);
    lfoGain.connect(gainNode.gain);
    osc.connect(gainNode);
    gainNode.connect(ctx.destination);
    osc.start(t0); lfo.start(t0);
    isPaused = false;
  }

  function stop(fadeMs) {
    if (fadeMs === undefined) fadeMs = 800;
    if (!osc || !gainNode) return;
    const ctx = getCtx(); if (!ctx) return;
    const t0 = ctx.currentTime;
    const fade = Math.max(0.1, fadeMs / 1000);
    try {
      gainNode.gain.cancelScheduledValues(t0);
      gainNode.gain.setValueAtTime(gainNode.gain.value, t0);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, t0 + fade);
    } catch(e) {}
    const oscRef = osc, lfoRef = lfo;
    setTimeout(function() {
      try { oscRef && oscRef.stop(); } catch(e) {}
      try { lfoRef && lfoRef.stop(); } catch(e) {}
    }, (fade + 0.1) * 1000);
    osc = null; lfo = null; gainNode = null; lfoGain = null;
    isPaused = false;
    forced = false;
  }

  function pause() {
    if (!gainNode || isPaused) return;
    const ctx = getCtx(); if (!ctx) return;
    const t0 = ctx.currentTime;
    try {
      gainNode.gain.cancelScheduledValues(t0);
      gainNode.gain.setValueAtTime(gainNode.gain.value, t0);
      gainNode.gain.linearRampToValueAtTime(0, t0 + 0.4);
    } catch(e) {}
    isPaused = true;
  }

  function resume() {
    if (!gainNode || !isPaused) return;
    if (!shouldPlay()) { stop(400); return; }
    const ctx = getCtx(); if (!ctx) return;
    const t0 = ctx.currentTime;
    try {
      gainNode.gain.cancelScheduledValues(t0);
      gainNode.gain.setValueAtTime(gainNode.gain.value, t0);
      gainNode.gain.linearRampToValueAtTime(0.02, t0 + 0.6);
    } catch(e) {}
    isPaused = false;
  }

  function isActive() { return osc !== null; }
  return { start: start, stop: stop, pause: pause, resume: resume, isActive: isActive };
})();

/* PACE - TimerDial (sesion 76 / v0.30.0)
   Anillo circular compartido entre FocusTimer (Pomodoro home) y
   PathFocusStep (Pomodoro dentro de un Camino). Extraido de
   FocusTimer.TimerAro para eliminar la divergencia visual entre
   ambos sitios (auditoria s75, captura 3).

   Puramente presentacional. El padre controla running/setRunning y
   provee los controles via el slot `inner` (FocusTimer los inyecta
   dentro del aro; PathFocusStep los deja fuera y pasa inner=null).

   Pixel-equivalente al TimerAro previo:
     viewBox 100 / radio 47.5 / strokeWidth base 0.35 / arco 0.7
     strokeOpacity 0.7 / strokeLinecap round
*/

/* interpolateRingColor - gradiente terracota -> ocre -> oliva en modo
   foco. Estable en pausas (breathe) y larga (focus). Extraido de
   FocusTimer en s76. */
function interpolateRingColor(progress, mode) {
  if (mode === 'pausa') return 'var(--breathe)';
  if (mode === 'larga') return 'var(--focus)';
  const styles = getComputedStyle(document.documentElement);
  const read = (name, fb) => (styles.getPropertyValue(name).trim() || fb);
  const c1 = read('--breathe', '#C97A5D');
  const c2 = read('--move',    '#9A7B4F');
  const c3 = read('--focus',   '#6e7a4e');
  const hexToRgb = (h) => {
    const m = h.replace('#', '');
    return [parseInt(m.slice(0,2),16), parseInt(m.slice(2,4),16), parseInt(m.slice(4,6),16)];
  };
  const lerp = (a, b, t) => Math.round(a + (b - a) * t);
  const blend = (r1, r2, t) => [lerp(r1[0],r2[0],t), lerp(r1[1],r2[1],t), lerp(r1[2],r2[2],t)];
  const r1 = hexToRgb(c1), r2 = hexToRgb(c2), r3 = hexToRgb(c3);
  const t = Math.max(0, Math.min(1, progress));
  const rgb = t < 0.5 ? blend(r1, r2, t * 2) : blend(r2, r3, (t - 0.5) * 2);
  return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
}

function TimerDial({ mins, secs, progress, mode, modeLabel, subtitle, inner }) {
  const R = 47.5;
  const C = 2 * Math.PI * R;

  return (
    <div style={timerDialStyles.frame}>
      <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', transform: 'rotate(-90deg)' }}>
        <circle cx="50" cy="50" r={R} fill="none" stroke="var(--line)" strokeWidth="0.35" />
        <circle cx="50" cy="50" r={R} fill="none"
          stroke={interpolateRingColor(progress, mode)} strokeWidth="0.7"
          strokeOpacity="0.7"
          strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={C * (1 - progress)}
          style={{ transition: 'stroke-dashoffset 1s linear, stroke 1s linear' }} />
      </svg>

      <div style={timerDialStyles.inner}>
        <div style={timerDialStyles.modeLabel}>{modeLabel}</div>
        <div style={timerDialStyles.numberHuge}>
          {String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}
        </div>
        {subtitle ? <div style={timerDialStyles.subtitleItalic}>{subtitle}</div> : null}
        {inner ? <div style={timerDialStyles.innerDivider} /> : null}
        {inner}
      </div>
    </div>
  );
}

const timerDialStyles = {
  frame: {
    position: 'relative',
    height: 'min(56vh, 86vw, 520px)',
    width: 'min(56vh, 86vw, 520px)',
    aspectRatio: '1 / 1',
    flexShrink: 0,
    display: 'grid',
    placeItems: 'center',
  },
  inner: {
    position: 'relative',
    textAlign: 'center',
    zIndex: 1,
    display: 'flex',
    flexDirection: 'column',
    alignItems: 'center',
    maxWidth: '70%',
  },
  modeLabel: {
    fontSize: 11,
    letterSpacing: '0.26em',
    textTransform: 'uppercase',
    color: 'var(--ink-3)',
    marginBottom: 10,
    fontWeight: 500,
  },
  numberHuge: {
    fontFamily: 'var(--font-display)',
    fontStyle: 'italic',
    fontWeight: 400,
    lineHeight: 0.9,
    fontVariantNumeric: 'tabular-nums',
    letterSpacing: '-0.03em',
    color: 'var(--ink)',
    fontSize: 'clamp(64px, 7vw, 104px)',
  },
  subtitleItalic: {
    fontStyle: 'italic',
    fontFamily: 'var(--font-display)',
    fontSize: 14,
    color: 'var(--ink-3)',
    marginTop: 30,
    letterSpacing: 0.2,
  },
  innerDivider: {
    width: 110,
    height: 1,
    background: 'var(--line-2)',
    opacity: 0.55,
    margin: '12px 0 10px',
  },
};

Object.assign(window, { TimerDial, interpolateRingColor });

</script>

  <script type="text/babel">
/* PACE · Apoya el proyecto (Buy Me a Coffee)
   ============================================================
   FILOSOFÍA (no negociable) — sesión 16 · v0.11.11

   PACE se vende por valores, no por escasez:
     - Todo local (localStorage, sin backend).
     - Sin tracking, sin analytics, sin cookies.
     - Gratis y lo seguirá siendo.

   Por tanto:
   - NO es freemium. Donar no desbloquea nada funcional.
   - La donación es voluntaria y se comunica desde valores, no
     desde urgencia ("apóyame que si no cierro"), no desde fomo.
   - Presencia calmada: pill discreto en el footer del sidebar.
     Nada parpadea, nada es amarillo fosforito.
   - Auto-trigger único: tras 7 días de racha. Se muestra una
     sola vez (flag `supportSeenAt`), nunca bloquea flujos.
   - Hay un logro secreto `secret.supporter` activable sólo por
     honor — un botón "Ya doné" dentro del modal. No hay
     verificación (no hay backend); confiar en el usuario es el
     punto. Alinea con el resto del tono del producto.

   USERNAME BMC: ezradesign → https://buymeacoffee.com/ezradesign

   API expuesta a `window`:
     - openSupportModal()  → función imperativa para abrir
     - SupportButton       → pill para usar en el sidebar
     - SupportModal        → host del modal (montar 1 vez en main.jsx)
     - supportCopy(v)      → devuelve { label, title } según variante
*/

const { useEffect: useEffectSUP, useState: useStateSUP } = React;

const BMC_USERNAME = 'ezradesign';
const BMC_URL = `https://buymeacoffee.com/${BMC_USERNAME}`;

/* Copy único — decidido en sesión de diseño post-v0.12.1: se descartan
   las 4 variantes ('cafe', 'pasto', 'vaca', 'come') y se consolida en
   una sola que abraza la metáfora central del proyecto (la vaca que
   pace = PACE). El icono siempre es la vaca.

   Sesión 26 (v0.12.8, audit §2.1): se eliminan los callsites que
   pasaban `state.supportCopyVariant` como argumento y los helpers
   `CupIcon`/`BigCup` muertos. El campo del state se conserva por
   compat localStorage (ver state.jsx: DEPRECADO) pero este módulo
   ya no lo consume en absoluto.

   La función `supportCopy()` y el helper `SupportIcon()` se conservan
   exportados a window sin parámetros — futuros callers que quieran
   re-bifurcar tendrán una API neutra a la que volver. */
const SUPPORT_COPY_DEFAULT = {
  icon: 'cow',
  label: 'Da de pastar a la vaca',
  short: 'Da de pastar a la vaca',
  title: 'Da de pastar a la vaca',
  subtitle: 'Un gesto para que siga paciendo a su ritmo.',
};

function supportCopy() {
  return SUPPORT_COPY_DEFAULT;
}

function SupportIcon({ size = 13 }) {
  return <CowIcon size={size} />;
}

/* ============================================================
   SupportButton — pill del sidebar
   ------------------------------------------------------------
   Diseño: pill paper-2 con borde fino, texto pequeño + icono
   de taza (stroke currentColor). Hover suave a paper-3.
   Sin animación permanente. Sin gradiente. Sin color llamativo.
   ============================================================ */
function SupportButton({ onOpen }) {
  const { t } = useT();
  const [hover, setHover] = useStateSUP(false);

  return (
    <button
      onClick={onOpen}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      title={t('support.sidebar.title')}
      aria-label={t('support.sidebar.label')}
      style={{
        ...displayItalic,
        display: 'inline-flex',
        alignItems: 'center',
        justifyContent: 'center',
        gap: 8,
        width: '100%',
        padding: '9px 14px',
        fontSize: 12,
        color: hover ? 'var(--ink)' : 'var(--ink-2)',
        background: hover ? 'var(--paper-3)' : 'var(--paper)',
        border: `1px solid ${hover ? 'var(--line-2)' : 'var(--line)'}`,
        borderRadius: 'var(--r-pill)',
        letterSpacing: 0.15,
        transition: 'all 220ms var(--ease)',
        cursor: 'pointer',
      }}
    >
      <span>{t('support.sidebar.label')}</span>
      <SupportIcon />
    </button>
  );
}

/* CupIcon eliminado en sesión 26 (audit §2.1 — dead code alta confianza):
   tras la consolidación a una sola variante de copy en v0.12.2, SupportIcon
   siempre devuelve <CowIcon/>, y CupIcon quedó definido sin callsites. */

/* Cabeza de vaca — silueta inspirada en el lockup del logo (cara
   alargada, cuernos cortos hacia arriba, mancha frontal asimétrica).
   Trazo fino en currentColor, 16×16. La pieza crítica que la
   diferencia de un cerdo: los CUERNOS (no las orejas hacia los lados)
   y la CARA ALARGADA hacia abajo (no redonda). */
function CowIcon({ size = 13 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none"
         stroke="currentColor" strokeWidth="1.2"
         strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      {/* Cuernos cortos hacia arriba — clave para distinguir de cerdo */}
      <path d="M5.5 3.5c-.3-.6-.6-1.1-.2-1.6" />
      <path d="M10.5 3.5c.3-.6.6-1.1.2-1.6" />
      {/* Orejas laterales (salen entre cuerno y cara) */}
      <path d="M4 5c-.8.1-1.6.5-2 1.2" />
      <path d="M12 5c.8.1 1.6.5 2 1.2" />
      {/* Cara alargada: frente ancha, morro más estrecho hacia abajo */}
      <path d="M4.5 5c-.3 2 .1 4.5 1 6 .7 1 1.7 1.5 2.5 1.5s1.8-.5 2.5-1.5c.9-1.5 1.3-4 1-6" />
      {/* Morro — pequeño óvalo en la base */}
      <ellipse cx="8" cy="11.8" rx="1.6" ry="1.1" opacity="0.7" />
      {/* Fosas nasales */}
      <circle cx="7.2" cy="11.8" r="0.25" fill="currentColor" stroke="none" />
      <circle cx="8.8" cy="11.8" r="0.25" fill="currentColor" stroke="none" />
      {/* Ojitos */}
      <circle cx="6.3" cy="8" r="0.35" fill="currentColor" stroke="none" />
      <circle cx="9.7" cy="8" r="0.35" fill="currentColor" stroke="none" />
      {/* Mancha frontal asimétrica — guiño al logo */}
      <path d="M6.2 5.5c-.5.5-.7 1.2-.5 1.8" opacity="0.5" />
    </svg>
  );
}

/* ============================================================
   SupportModal — explica la filosofía + ofrece donar
   ------------------------------------------------------------
   Estructura:
     1. Tagline: "PACE es gratis. Y lo seguirá siendo."
     2. 3 valores con línea fina (todo local · sin tracking · open)
     3. Botón primario → abre BMC en nueva pestaña
     4. Botón secundario → "Ya doné" (activa secret.supporter)
     5. Micro-link → copiar URL (por si el usuario prefiere compartir)

   Al abrirlo se marca `supportSeenAt` (timestamp) para que el
   auto-trigger no vuelva a dispararse. El usuario puede re-abrirlo
   manualmente las veces que quiera desde el botón del sidebar.
   ============================================================ */
function SupportModal({ open, onClose }) {
  const [state, set] = usePace();
  const { t } = useT();
  const [copied, setCopied] = useStateSUP(false);
  const [thanked, setThanked] = useStateSUP(false);

  // Al abrir por primera vez, marcar supportSeenAt (inhibe auto-trigger futuros).
  useEffectSUP(() => {
    if (open && !state.supportSeenAt) {
      set({ supportSeenAt: Date.now() });
    }
  }, [open]);

  if (!open) return null;

  const goToBMC = () => {
    window.open(BMC_URL, '_blank', 'noopener,noreferrer');
  };

  const copyLink = async () => {
    try {
      await navigator.clipboard.writeText(BMC_URL);
      setCopied(true);
      setTimeout(() => setCopied(false), 1600);
    } catch (e) {
      // Fallback silencioso: algunos entornos (iframe restringido) bloquean
      // clipboard. Abrimos BMC como plan B.
      goToBMC();
    }
  };

  const markAsDonated = () => {
    // Logro de honor — no hay verificación, es una promesa al usuario
    // ("eres de los que lo quisieron hacer bien"). Encaja con el tono.
    const wasNew = unlockAchievement('secret.supporter');
    setThanked(true);
    // Si ya estaba desbloqueado, el toast no aparece — mostramos feedback inline.
    if (!wasNew) {
      setTimeout(() => setThanked(false), 2400);
    }
  };

  return (
    <Modal open={open} onClose={onClose} maxWidth={540}>
      <div style={supportStyles.inner}>
        {/* Ícono grande de vaca — no emoji, trazo a mano */}
        <div style={supportStyles.heroIcon}>
          <SupportHero />
        </div>

        <Meta style={{ textAlign: 'center', marginBottom: 10 }}>{t('support.meta')}</Meta>

        <h2 style={supportStyles.title}>
          {t('support.title.main')}<br/>
          <span style={{ color: 'var(--ink-3)', fontStyle: 'italic' }}>{t('support.title.sub')}</span>
        </h2>

        <p style={supportStyles.lede}>
          {t('support.lede')}
        </p>

        {/* 3 valores en línea fina */}
        <div style={supportStyles.values}>
          <Value label={t('support.value.local.label')} sub={t('support.value.local.sub')} />
          <Divider style={{ width: 1, height: 28, background: 'var(--line)' }} />
          <Value label={t('support.value.tracking.label')} sub={t('support.value.tracking.sub')} />
          <Divider style={{ width: 1, height: 28, background: 'var(--line)' }} />
          <Value label={t('support.value.forever.label')} sub={t('support.value.forever.sub')} />
        </div>

        <p style={supportStyles.cta}>
          {t('support.cta')}<br/>
          <span style={{ color: 'var(--ink-3)' }}>
            {t('support.cta.sub')}
          </span>
        </p>

        {/* Botones de acción */}
        <div style={supportStyles.actions}>
          <Button variant="terracota" size="lg" onClick={goToBMC}>
            <span style={{ marginRight: 2 }}>{t('support.btn.label')}</span>
            <SupportIcon />
          </Button>
          <Button variant="secondary" size="md" onClick={copyLink}>
            {copied ? t('support.btn.copied') : t('support.btn.copy')}
          </Button>
        </div>

        {/* Enlace en texto + "ya doné" */}
        <div style={supportStyles.footer}>
          <div style={{ fontSize: 11, color: 'var(--ink-3)', fontFamily: 'var(--font-ui)' }}>
            buymeacoffee.com/{BMC_USERNAME}
          </div>

          <button
            onClick={markAsDonated}
            style={supportStyles.alreadyLink}
            title="Marca un sello privado — confía en ti"
          >
            {thanked ? (
              state.achievements['secret.supporter']
                ? t('support.thanks.saved')
                : t('support.thanks')
            ) : t('support.donated')}
          </button>
        </div>
      </div>
    </Modal>
  );
}

function Value({ label, sub }) {
  return (
    <div style={{ flex: 1, textAlign: 'center', padding: '0 6px' }}>
      <div style={{
        ...displayItalic,
        fontSize: 14,
        color: 'var(--ink)',
        lineHeight: 1.1,
      }}>{label}</div>
      <div style={{
        fontSize: 10,
        color: 'var(--ink-3)',
        marginTop: 3,
        letterSpacing: 0.1,
      }}>{sub}</div>
    </div>
  );
}

/* BigCup eliminado en sesión 26 (audit §2.1). Tras la consolidación a
   una sola variante de copy, SupportHero siempre devuelve <BigCow/>. */

/* Cabeza de vaca grande para el hero del modal — mismo diseño que
   CowIcon pero a 48×48. Cuernos cortos arriba, cara alargada,
   morro diferenciado, mancha frontal y briznas de pasto debajo
   para reforzar la metáfora de "pacer" (pace). */
function BigCow() {
  return (
    <svg width="58" height="58" viewBox="0 0 48 48" fill="none"
         stroke="var(--breathe)" strokeWidth="1.4"
         strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      {/* Cuernos cortos — la pieza crítica para distinguir de cerdo */}
      <path d="M17 9c-.9-1.8-1.9-3.3-.6-4.8" />
      <path d="M31 9c.9-1.8 1.9-3.3.6-4.8" />
      {/* Orejas laterales (salen más abajo que los cuernos) */}
      <path d="M12 14c-2.3.3-4.6 1.4-5.8 3.4" />
      <path d="M36 14c2.3.3 4.6 1.4 5.8 3.4" />
      {/* Cara alargada: ancha arriba, estrecha hacia el morro */}
      <path d="M13.5 14c-1 6 .3 13.5 3 18 2 3 5 4.5 7.5 4.5s5.5-1.5 7.5-4.5c2.7-4.5 4-12 3-18" />
      {/* Morro — óvalo diferenciado en la base */}
      <ellipse cx="24" cy="34" rx="5" ry="3.5" opacity="0.7" />
      {/* Fosas nasales */}
      <ellipse cx="21.5" cy="34" rx="0.7" ry="0.9" fill="var(--breathe)" stroke="none" opacity="0.8" />
      <ellipse cx="26.5" cy="34" rx="0.7" ry="0.9" fill="var(--breathe)" stroke="none" opacity="0.8" />
      {/* Ojitos */}
      <circle cx="19" cy="22" r="1.2" fill="var(--breathe)" stroke="none" />
      <circle cx="29" cy="22" r="1.2" fill="var(--breathe)" stroke="none" />
      {/* Mancha frontal asimétrica — guiño al logo */}
      <path d="M18 16c-1.5 1.5-2 3.5-1.5 5.5" opacity="0.5" />
      <path d="M17 18.5c-.3 1-.2 2 .3 2.8" opacity="0.5" />
      {/* Briznas de pasto bajo la cabeza — refuerza la metáfora "pacer" */}
      <path d="M12 44c.6-1 1-2 1-3" opacity="0.45" />
      <path d="M18 44c.4-1.2.4-2.5 0-3.5" opacity="0.6" />
      <path d="M30 44c-.4-1.2-.4-2.5 0-3.5" opacity="0.6" />
      <path d="M36 44c-.6-1-1-2-1-3" opacity="0.45" />
    </svg>
  );
}

/* Hero del modal — siempre la vaca grande tras la consolidación de
   copy en v0.12.2. Firma saneada en sesión 26 (audit §2.1). */
function SupportHero() {
  return <BigCow />;
}

/* ============================================================
   Helper — auto-trigger a los 7 días de racha (una sola vez)
   ------------------------------------------------------------
   Se llama desde main.jsx con setOpen. Revisa en cada mount y
   cuando cambia el streak. La condición "primera vez" se apoya
   en el flag `supportSeenAt` (null al principio, timestamp tras
   ver el modal).
   ============================================================ */
function useSupportAutoTrigger(setOpen) {
  const [state] = usePace();
  useEffectSUP(() => {
    // Condición: racha >= 7 + no visto nunca.
    if (state.streak?.current >= 7 && !state.supportSeenAt) {
      // Pequeña demora tras el mount para no competir con toasts de logros.
      const t = setTimeout(() => setOpen(true), 1200);
      return () => clearTimeout(t);
    }
  }, [state.streak?.current, state.supportSeenAt]);
}

/* ============================================================
   Estilos del módulo (nombre único — regla CLAUDE.md)
   ============================================================ */
const supportStyles = {

    display: 'flex', flexDirection: 'column', alignItems: 'stretch',

  heroIcon: {

Object.assign(window, {

  <script type="text/babel">
/* PACE · Welcome de primera vez
   ============================================================
   FILOSOFÍA — sesión 17 · v0.12.0

   La primera vez que alguien abre PACE, merece una bienvenida
   editorial corta — no un onboarding de 5 pantallas con tooltips.

   Estructura (1 sola pantalla):
     1. Logo + wordmark Pace.
     2. Manifesto breve: "Antídoto a la silla. A tu ritmo."
     3. 3 valores en positivo: todo local · sin cuentas · siempre gratis.
     4. Campo opcional de intención — "¿Qué quieres cultivar hoy?"
        Si el usuario escribe algo, se guarda en `state.intention`.
        Si lo deja vacío, no pasa nada (no es obligatorio).
     5. Botón primario "Empezar" — cierra el modal y marca
        `state.firstSeen = timestamp`.

   MECÁNICA:
     - Se dispara una sola vez por instalación, cuando
       `state.firstSeen == null`.
     - Al cerrar (o terminar) se fija `firstSeen` a timestamp
       para no volver a mostrarse nunca.
     - Hook `useFirstTimeWelcome` replica el patrón de
       `useSupportAutoTrigger`: mismo contrato, mismo tiempo de

       `pace:open-welcome` (para Tweaks dev o pruebas).

const { useEffect: useEffectWEL, useState: useStateWEL, useRef: useRefWEL } = React;

/* ============================================================

   ============================================================ */
function WelcomeModal({ open, onClose }) {
  const [state, set] = usePace();

    const patch = { firstSeen: Date.now() };

    onClose && onClose();

          </div>
          <div style={welcomeStyles.headerRight}>
            <h2 style={welcomeStyles.title}>
              {t('welcome.tagline')}{' '}
              <span style={{ color: 'var(--ink-3)', fontStyle: 'italic' }}>{t('welcome.tagline.sub')}</span>
            </h2>
            <p style={welcomeStyles.lede}>
              {t('welcome.lede')}
            </p>
          </div>
        </div>

        {/* 3 valores en línea — ya más compactos */}
        <div style={welcomeStyles.values}>
          <WValue label={t('welcome.value.local.label')} sub={t('welcome.value.local.sub')} />
          <span style={welcomeStyles.sep} />
          <WValue label={t('welcome.value.accounts.label')} sub={t('welcome.value.accounts.sub')} />
          <span style={welcomeStyles.sep} />
          <WValue label={t('welcome.value.free.label')} sub={t('welcome.value.free.sub')} />
        </div>

        {/* Campo de intención — opcional, fila horizontal label+input */}
        <div style={welcomeStyles.intentionBlock}>
          <label htmlFor="pace-intention" style={welcomeStyles.intentionLabel}>
            {t('welcome.intention.label')}

          </label>
          <input
            id="pace-intention"

            {t('welcome.skip')}
          </button>

            {t('welcome.cta')}
          </Button>
        </div>
      </div>
    </Modal>
  );
}

/* ============================================================

   ------------------------------------------------------------
   Mismo patrón que useSupportAutoTrigger. La demora de 1.2s

function useFirstTimeWelcome(setOpen) {
  const [state] = usePace();

}

const { useState: useStateSB, useMemo: useMemoSB } = React;

if (typeof document !== 'undefined' && !document.getElementById('pace-sidebar-responsive-css')) {
  const s = document.createElement('style');
  s.id = 'pace-sidebar-responsive-css';
  s.textContent = `
    @media (max-width: 768px) {
      [data-pace-sidebar] {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        /* Alto del drawer fullscreen · SCROLL ASIMÉTRICO (sesión 24, v0.12.7).
           A diferencia de la home (que usa 100dvh puro para que los 4
           botones quepan siempre sin scroll), el sidebar FUERZA scroll
           latente para que el navegador móvil oculte su barra de URL
           y el contenido real (ritmo + sendero + logros + footer) tenga
           espacio para respirar. Técnica: min-height 1px por encima
           del viewport visible. Ese píxel extra activa el detector de
           scroll del navegador → auto-hide de la barra → el usuario
           recupera ~56-100px que el drawer aprovecha.
             - min-height: calc(100dvh + 1px) con fallback 100vh+1px
               — 1px invisible, no hay artefacto.
             - height: auto — el drawer se dimensiona al contenido,
               no al viewport. Sin límites artificiales.

           la barra se recoge, el drawer crece). A partir del segundo

        min-height: calc(100vh + 1px) !important;
        min-height: calc(100dvh + 1px) !important;

      [data-pace-sidebar] [data-pace-sidebar-logobar] {

/* ============================================================
   Sendero del día — línea ondulada horizontal que representa
   el arco del día (6h → 22h). Los hitos son pomodoros y sesiones
   completadas hasta ahora; aparecen como puntos sobre la curva.
   ============================================================ */
function SenderoDelDia({ state, compact }) {
  const { t, tn } = useT();
  const now = new Date();
  const hNow = now.getHours() + now.getMinutes() / 60;
  const start = 6;  // 6:00
  const end = 22;   // 22:00
  const fraction = Math.min(1, Math.max(0, (hNow - start) / (end - start)));

  // Hitos del día: pomodoros + sesiones (proxy desde state)
  const hitos = useMemoSB(() => {
    const out = [];
    // Pomodoros: repartimos sus horas ficticiamente por el día hasta hNow
    const cycle = state.cycle || 0;
    for (let i = 0; i < cycle; i++) {
      const t = start + ((i + 1) / (cycle + 1)) * Math.max(0.1, hNow - start);
      out.push({ t, kind: 'focus' });
    }
    // Actividades del plan también cuentan como hitos hoy
    /* Sesion 69 (v0.28.8): weeklyStats indexa lunes-primero. */
    const day = getDayIndexMondayFirst(new Date());
    const ws = state.weeklyStats || {};
    if ((ws.breathMinutes?.[day] || 0) > 0) out.push({ t: hNow - 0.3, kind: 'breathe' });
    if ((ws.moveMinutes?.[day] || 0) > 0) out.push({ t: hNow - 0.55, kind: 'move' });
    if ((ws.waterGlasses?.[day] || 0) > 0) out.push({ t: hNow - 0.15, kind: 'water' });
    // Clamp to path range
    return out
      .map(h => ({ ...h, x: Math.max(0, Math.min(1, (h.t - start) / (end - start))) }))
      .sort((a, b) => a.x - b.x);
  }, [state.cycle, state.weeklyStats]);

  const W = compact ? 180 : 240;
  const H = compact ? 36 : 46;
  const pathD = `M 0 ${H * 0.55} Q ${W * 0.2} ${H * 0.15}, ${W * 0.45} ${H * 0.55} T ${W} ${H * 0.55}`;

  const colorOf = (kind) => ({
    focus: 'var(--focus)',
    breathe: 'var(--breathe)',
    move: 'var(--move)',
    water: 'var(--hydrate)',
  })[kind] || 'var(--ink-3)';

  // "Pointer" (posición actual en la onda) — aproximación lineal en el path
  const pointerX = fraction * W;
  // Para la altura aprox del path en x: usar la misma curva cuadrática
  const pathY = (x) => {
    // valores de control para una cuadrática M-Q-T-Q chainless:
    // aquí aproximamos con dos quads empalmados. Bastante preciso para display.
    if (x <= W * 0.45) {
      const t = x / (W * 0.45);
      const y = (1 - t) * (1 - t) * (H * 0.55) + 2 * (1 - t) * t * (H * 0.15) + t * t * (H * 0.55);
      return y;
    } else {
      const t = (x - W * 0.45) / (W * 0.55);
      const y = (1 - t) * (1 - t) * (H * 0.55) + 2 * (1 - t) * t * (H * 0.95) + t * t * (H * 0.55);
      return y;
    }
  };

  return (
    <>
      <div style={sidebarStyles.sectionHeader}>
        <Meta>{t('sidebar.section.trail')}</Meta>
        <span style={sidebarStyles.sectionAside}>{hitos.length} {hitos.length === 1 ? t('sidebar.trail.hito') : t('sidebar.trail.hitos')}</span>
      </div>
      <div style={{ marginTop: 6 }}>
        <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ display: 'block', width: '100%' }}>
          {/* Camino completo (opacidad baja) */}
          <path d={pathD} stroke="var(--line-2)" strokeWidth="1.4" fill="none" strokeLinecap="round" />
          {/* Camino recorrido: clip al punto actual */}
          <defs>
            <clipPath id="sendero-clip">
              <rect x="0" y="0" width={pointerX} height={H} />
            </clipPath>
          </defs>
          <path d={pathD} stroke="var(--focus)" strokeWidth="1.8" fill="none" strokeLinecap="round" clipPath="url(#sendero-clip)" />
          {/* Hitos */}
          {hitos.map((h, i) => {

          <circle cx={pointerX} cy={pathY(pointerX)} r="3" fill="var(--ink)" />

      </div>
    </>

function WeekDots({ weeklyStats, compact }) {
  const { t } = useT();
  const days = t('sidebar.days').split(',');
  const today = (new Date().getDay() + 6) % 7; // L=0
  const dotSize = compact ? 5 : 6;
  /* Sesion 69 (v0.28.8): weeklyStats ahora es lunes-primero (i=0 -> lunes).
     Eliminado el shift (i+1)%7 que rotaba desde getDay(). */
  return (
    <div style={{ display: 'flex', gap: compact ? 4 : 6, marginTop: compact ? 8 : 12 }}>
      {days.map((d, i) => {
        const active = (weeklyStats.focusMinutes[i] || 0) > 0;
        const isToday = i === today;
        return (
          <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, flex: 1 }}>
            <div style={{
              width: dotSize, height: dotSize, borderRadius: '50%',
              background: active ? 'var(--focus)' : 'var(--line)',
              outline: isToday ? '2px solid var(--ink-2)' : 'none',
              outlineOffset: 2,
            }} />
            <span style={{ fontSize: 9, color: isToday ? 'var(--ink)' : 'var(--ink-3)', fontWeight: isToday ? 600 : 400 }}>{d}</span>
          </div>
        );
      })}
    </div>
  );
}

function AchievementsPreview({ onOpen }) {
  const [state] = usePace();
  const { t } = useT(); // sesión 37 hotfix v0.19.1: faltaba tras migración i18n
  // Los 5 más recientes primero, por unlockedAt descendente
  const unlocked = Object.entries(state.achievements || {})
    .sort((a, b) => (b[1].unlockedAt || 0) - (a[1].unlockedAt || 0))
    .map(([id]) => id);
  const shown = 5;
  return (
    <div data-pace-sidebar-achievements style={{ display: 'grid', gridTemplateColumns: `repeat(${shown}, 1fr)`, gap: 6, marginBottom: 10 }}>
      {Array.from({ length: shown }).map((_, i) => {
        const id = unlocked[i];
        return (
          <button
            key={i}
            onClick={onOpen}
            style={{
              aspectRatio: '1/1',
              borderRadius: '50%',
              border: '1px solid var(--line)',
              background: id ? 'var(--achievement-soft)' : 'transparent',
              color: id ? 'var(--achievement)' : 'var(--ink-3)',

}
