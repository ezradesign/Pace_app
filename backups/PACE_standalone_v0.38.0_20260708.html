  <script type="text/babel">
/* PACE · TweakSecretsWatcher
   ============================================================
   Detectores de secretos ligados a tweaks (palette, font, logo).
   Extraído de TweaksPanel.jsx en sesión 41 para mantener ambos
   archivos bajo el límite de 500 líneas.

   Monta siempre (en main.jsx) para que los secretos se disparen
   al cambiar un tweak desde Ajustes O por import JSON — no solo
   cuando el panel está abierto.
   ============================================================ */

const { useEffect: useEffectSW } = React;

/* Días en paleta oscura — clave independiente de pace.state.v2.
   Solo alimenta secret.dark.mode; no engordar el state principal. */
const DARK_DAYS_KEY = 'pace.darkDays.v1';

function TweakSecretsWatcher() {
  const [state] = usePace();

  // secret.aged — paleta 'envejecido' activa.
  useEffectSW(() => {
    if (state.palette === 'envejecido') unlockAchievement('secret.aged');
  }, [state.palette]);

  /* secret.mono — el Tweak de tipografía se retiró en sesión 20.
     Sigue escuchando por si el valor llega vía import JSON o devtools. */
  useEffectSW(() => {
    if (state.font === 'mono') unlockAchievement('secret.mono');
  }, [state.font]);

  /* Logros de logoVariant — conservados por compat / easter eggs futuros. */
  useEffectSW(() => {
    if (state.logoVariant === 'sello') unlockAchievement('secret.seal');
    if (state.logoVariant === 'ilustrado') unlockAchievement('secret.illustrated');
  }, [state.logoVariant]);

  /* secret.dark.mode — "7 días en oscuro" (días de calendario distintos,
     no necesariamente consecutivos). Cap de 30 fechas. */
  useEffectSW(() => {
    if (state.palette !== 'oscuro') return;
    try {
      const today = new Date().toISOString().slice(0, 10);
      const raw = localStorage.getItem(DARK_DAYS_KEY);
      let days;
      try { days = new Set(JSON.parse(raw || '[]')); } catch (e) { days = new Set(); }
      if (!days.has(today)) {
        days.add(today);
        const arr = Array.from(days).slice(-30);
        localStorage.setItem(DARK_DAYS_KEY, JSON.stringify(arr));
        if (arr.length >= 7) unlockAchievement('secret.dark.mode');
      } else if (days.size >= 7) {
        unlockAchievement('secret.dark.mode');
      }
    } catch (e) { /* silencioso */ }
  }, [state.palette]);

  return null;
}

Object.assign(window, { TweakSecretsWatcher });

</script>

  <script type="text/babel">
/* PACE · Tweaks — sección "Tus datos" (Export / Import JSON)
   Extraída de TweaksPanel.jsx en sesión 89 (v0.34.5) para devolver el panel
   a <500 líneas. Lógica de sesión 17 (v0.12.0) intacta.

   EXPORT — descarga un JSON con el estado completo de PACE.
   Refuerza la promesa "todo local" del modal BMC: ahora es local
   Y portátil. El archivo incluye:
     - version: para migración futura si el schema cambia.
     - exportedAt: timestamp legible.
     - state: copia literal de localStorage['pace.state.v2'].

   IMPORT — lee un JSON y lo mergea/reemplaza en localStorage.
   Valida estructura mínima (app === 'PACE' + state como objeto)
   y pregunta confirmación explícita antes de sobrescribir.
   Tras confirmar, recarga la página para que useSyncExternalStore
   re-lea el nuevo estado desde cero (evita estados inconsistentes).
*/

const { useState: useStateTD, useRef: useRefTD } = React;

function TweaksDataSection() {
  const { t, tn } = useT();
  const fileInputRef = useRefTD(null);
  const [msg, setMsg] = useStateTD(null); // {kind, text} para feedback Export/Import

  const exportJSON = () => {
    try {
      const raw = localStorage.getItem('pace.state.v2') || '{}';
      const parsed = JSON.parse(raw);
      const payload = {
        app: 'PACE',
        version: PACE_VERSION,
        exportedAt: new Date().toISOString(),
        state: parsed,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const yyyymmdd = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      a.href = url;
      a.download = `pace-backup-${yyyymmdd}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setMsg({ kind: 'ok', text: t('tweaks.msg.exported') });
      setTimeout(() => setMsg(null), 2200);
    } catch (e) {
      setMsg({ kind: 'err', text: t('tweaks.msg.export.err') });
      setTimeout(() => setMsg(null), 2600);
    }
  };

  const importJSON = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const raw = String(ev.target.result || '');
        const payload = JSON.parse(raw);

        // Validación mínima: tiene que parecerse a un backup de PACE.
        const looksValid = payload && (
          (payload.app === 'PACE' && payload.state && typeof payload.state === 'object')
          || (payload.achievements !== undefined || payload.weeklyStats !== undefined)
        );
        if (!looksValid) {
          setMsg({ kind: 'err', text: t('tweaks.msg.import.invalid') });
          setTimeout(() => setMsg(null), 2600);
          return;
        }

        // Soporta dos formatos: {app, state:{...}} o state plano (fallback).
        const incoming = (payload.state && typeof payload.state === 'object') ? payload.state : payload;

        // Contador rápido para el aviso de confirmación.
        const nLogros = incoming.achievements ? Object.keys(incoming.achievements).length : 0;
        const nFoco = incoming.totalFocusMin || 0;
        const ok = confirm(tn('tweaks.confirm.import', { logros: nLogros, foco: nFoco }));
        if (!ok) return;

        // Escribimos y recargamos para estado limpio.
        localStorage.setItem('pace.state.v2', JSON.stringify(incoming));
        setMsg({ kind: 'ok', text: t('tweaks.msg.imported') });
        setTimeout(() => location.reload(), 900);
      } catch (e) {
        setMsg({ kind: 'err', text: t('tweaks.msg.import.json.err') });
        setTimeout(() => setMsg(null), 2600);
      }
    };
    reader.readAsText(file);
  };

  return (
    <div>
      <Meta style={{ marginBottom: 8 }}>{t('tweaks.data.meta')}</Meta>
      <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
        <button
          onClick={exportJSON}
          style={tweaksDataStyles.dataBtn}
          title={t('tweaks.data.export.title')}
        >
          <DownloadIcon /> <span>{t('tweaks.data.export')}</span>
        </button>
        <button
          onClick={() => fileInputRef.current && fileInputRef.current.click()}
          style={tweaksDataStyles.dataBtn}
          title={t('tweaks.data.import.title')}
        >
          <UploadIcon /> <span>{t('tweaks.data.import')}</span>
        </button>
        <input
          ref={fileInputRef}
          type="file"
          accept="application/json,.json"
          style={{ display: 'none' }}
          onChange={(e) => {
            const f = e.target.files && e.target.files[0];
            importJSON(f);
            e.target.value = ''; // permitir re-importar el mismo archivo
          }}
        />
      </div>
      {msg && (
        <div style={{
          fontSize: 10.5,
          color: msg.kind === 'err' ? 'var(--breathe)' : 'var(--focus)',
          fontFamily: 'var(--font-display)',
          fontStyle: 'italic',
          marginBottom: 8,
          letterSpacing: 0.1,
          textAlign: 'center',
        }}>{msg.text}</div>
      )}
      <div style={{
        fontSize: 10,
        color: 'var(--ink-3)',
        lineHeight: 1.4,
        letterSpacing: 0.1,
        marginBottom: 4,
      }}>
        {t('tweaks.data.note')}
      </div>
    </div>
  );
}

/* ============================================================
   Iconos + estilos (nombres únicos)
   ============================================================ */
function DownloadIcon() {
  return (
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"
         stroke="currentColor" strokeWidth="1.3"
         strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      <path d="M8 2.5v8" />
      <path d="M4.5 7L8 10.5 11.5 7" />
      <path d="M3 13h10" />
    </svg>
  );
}
function UploadIcon() {
  return (
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"
         stroke="currentColor" strokeWidth="1.3"
         strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      <path d="M8 10.5v-8" />
      <path d="M4.5 6L8 2.5 11.5 6" />
      <path d="M3 13h10" />
    </svg>
  );
}

const tweaksDataStyles = {
  dataBtn: {
    flex: 1,
    display: 'inline-flex',
    alignItems: 'center',
    justifyContent: 'center',
    gap: 6,
    padding: '8px 10px',
    fontSize: 11,
    color: 'var(--ink-2)',
    background: 'var(--paper-2)',
    border: '1px solid var(--line)',
    borderRadius: 'var(--r-sm)',
    letterSpacing: 0.2,
    cursor: 'pointer',
    transition: 'all 180ms',
  },

Object.assign(window, { TweaksDataSection });

</script>

/* Iconos de paso: stroke fino 14x14 */
function SPCIconBreathe() {

const SPC_STEP_ICONS = { breathe: SPCIconBreathe, focus: SPCIconFocus, body: SPCIconBody, hydrate: SPCIconHydrate };

/* PathMiniCard — reutilizable para sugerido y favorito */
function PathMiniCard({ pathObj, label, doneToday, onStart }) {
  const { t } = useT();
  const name = t(pathObj.nameKey) || pathObj.id;
  const tagline = t(pathObj.taglineKey) || '';

  return (
    <div data-pace-spc-card style={{

    onClick={!doneToday ? onStart : undefined}
    onMouseEnter={!doneToday ? function(e) { e.currentTarget.style.boxShadow = 'var(--sh-card)'; e.currentTarget.style.transform = 'translateY(-1px)'; } : undefined}

        </button>

      )}
    </div>
  );
}

function SuggestedPathCard() {
  const [state] = usePace();
  const { t } = useT();

  // Si ya hay camino activo, PathRunner lo gestiona
  if (state.paths && state.paths.current) return null;

  const todayISO = new Date().toISOString().slice(0, 10);

  // Camino sugerido por hora del dia
  const suggestedId = (typeof getSuggestedPath === 'function') ? getSuggestedPath() : null;
  const suggested = (suggestedId && typeof getPath === 'function') ? getPath(suggestedId) : null;

  // Favorito del usuario
  const favoriteId = state.paths && state.paths.favorite;
  const favorite = (favoriteId && typeof getPath === 'function') ? getPath(favoriteId) : null;

  // Si no hay ninguno, no renderizar
  if (!suggested && !favorite) return null;

  // Mostrar dual solo si el favorito es diferente del sugerido
  const showDual = favorite && suggested && favoriteId !== suggestedId;

  function isDoneToday(pathId) {
    const compl = state.paths && state.paths.completed && state.paths.completed[pathId];
    return !!(compl && compl.lastDoneAt === todayISO);
  }

  function handleStart(pathId) {
    if (typeof startPath === 'function') startPath(pathId);
  }

  function handleOpenLibrary() {
    window.dispatchEvent(new CustomEvent('pace:open-paths-library'));
  }

  return (
    <div data-pace-spc style={{ padding: '0 40px 12px', flexShrink: 0 }}>
      {/* Fila superior: cards (una o dos) */}
      {showDual ? (
        <div data-pace-spc-dual style={{ display: 'flex', gap: 10 }}>
          <PathMiniCard
            pathObj={favorite}
            label={t('paths.suggested.favorite') || 'Tu favorito'}
            doneToday={isDoneToday(favoriteId)}
            onStart={function() { handleStart(favoriteId); }}
          />
          <PathMiniCard
            pathObj={suggested}
            label={t('paths.suggested.label') || 'Sugerido ahora'}
            doneToday={isDoneToday(suggestedId)}
            onStart={function() { handleStart(suggestedId); }}
          />
        </div>
      ) : (
        <PathMiniCard
          pathObj={favorite || suggested}
          label={favorite ? (t('paths.suggested.favorite') || 'Tu favorito') : null}
          doneToday={isDoneToday(favorite ? favoriteId : suggestedId)}
          onStart={function() { handleStart(favorite ? favoriteId : suggestedId); }}
        />
      )}

      {/* Enlace Ver todos */}
      <div style={{ textAlign: 'right', marginTop: 6 }}>
        <button
          onClick={handleOpenLibrary}
          style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 11, letterSpacing: '0.1em', color: 'var(--ink-3)', fontFamily: 'var(--font-display)', fontStyle: 'italic', padding: '2px 0', textDecoration: 'underline', textUnderlineOffset: 3 }}
        >
          {t('paths.library.viewAll') || 'Ver todos'}
        </button>
      </div>
    </div>
  );
}

Object.assign(window, { SuggestedPathCard });

</script>

  <script type="text/babel">
/* PACE - Caminos - PathsLibrary - sesion 53 / v0.27.0

const { useState: useStatePL, useEffect: useEffectPL, useRef: useRefPL } = React;

/* Iconos de paso reutilizados de SuggestedPathCard */
function PLIconBreathe() {

function PLIconBody() {

function PathsLibrary() {
  const [open, setOpenPL] = useStatePL(false);
  const [state] = usePace();
  const { t } = useT();
  const closeBtnRef = useRefPL(null);

  useEffectPL(function() {
    function handleOpen() { setOpenPL(true); }
    window.addEventListener('pace:open-paths-library', handleOpen);
    return function() { window.removeEventListener('pace:open-paths-library', handleOpen); };
  }, []);

  // Focus en boton cerrar al abrir + Escape para cerrar
  useEffectPL(function() {
    if (!open) return;
    if (closeBtnRef.current) closeBtnRef.current.focus();
    function handleKey(e) { if (e.key === 'Escape') setOpenPL(false); }
    document.addEventListener('keydown', handleKey);
    return function() { document.removeEventListener('keydown', handleKey); };
  }, [open]);

  if (!open) return null;

  const catalog = (typeof window.PATH_CATALOG !== 'undefined') ? window.PATH_CATALOG : [];
  const todayISO = new Date().toISOString().slice(0, 10);
  const favId = state.paths && state.paths.favorite;

  function handleStart(pathId) {
    setOpenPL(false);
    if (typeof startPath === 'function') startPath(pathId);
  }

  function handleToggleFavorite(pathId) {
    if (typeof toggleFavoritePath === 'function') toggleFavoritePath(pathId);
  }

  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="paths-library-title"
      style={{
        position: 'fixed', inset: 0, zIndex: 900,
        background: 'rgba(0,0,0,0.45)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',

      onClick={function(e) { if (e.target === e.currentTarget) setOpenPL(false); }}

      <div style={{
        background: 'var(--paper-2)',
        borderRadius: 'var(--r-lg)',
        width: '100%', maxWidth: 480,
        maxHeight: '85vh',
        display: 'flex', flexDirection: 'column',
        boxShadow: 'var(--sh-card)',
        overflow: 'hidden',
      }}>
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '20px 20px 16px', borderBottom: '1px solid var(--line)', flexShrink: 0 }}>
          <span id="paths-library-title" style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 20, fontWeight: 500, color: 'var(--ink)' }}>
            {t('paths.library.title') || 'Todos los caminos'}
          </span>
          <button
            ref={closeBtnRef}
            onClick={function() { setOpenPL(false); }}
            style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-3)', fontSize: 20, lineHeight: 1, padding: '2px 6px', borderRadius: 'var(--r-sm)' }}
            aria-label={t('common.close')}
          >&#x2715;</button>
        </div>

        {/* Lista */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '16px 20px 20px' }}>
          {catalog.map(function(pathObj) {
            const compl = state.paths && state.paths.completed && state.paths.completed[pathObj.id];
            const doneToday = !!(compl && compl.lastDoneAt === todayISO);
            const isFav = favId === pathObj.id;
            return (
              <PLPathCard
                key={pathObj.id}
                pathObj={pathObj}
                isFavorite={isFav}
                doneToday={doneToday}
                onStart={function() { handleStart(pathObj.id); }}
                onToggleFavorite={function() { handleToggleFavorite(pathObj.id); }}
              />
            );
          })}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { PathsLibrary });

  <script type="text/babel">
/* PACE - Caminos - SenderoBar (sesion 75 / v0.29.0)
   Visualizacion del progreso interno de un Camino como sendero horizontal:
   curva organica + hitos con halo. Puramente declarativo, sin estado.
   currentColor hereda del tema (claro / oscuro Candil).
*/

const { useId: useIdSB } = React;

/* Parametros Bezier por segmento. Asimetria organica intencional para
   evitar simetria perfecta. Ratios r1/r2 son fracciones de la longitud
   del segmento (escalan automaticamente con N). y1/y2 son absolutos. */
const SB_SEG_PARAMS = [
  { y1: 22, y2: 24, r1: 0.24, r2: 0.760 }, // 0: arriba, ligero peso derecha
  { y1: 78, y2: 82, r1: 0.24, r2: 0.755 }, // 1: abajo
  { y1: 22, y2: 18, r1: 0.24, r2: 0.789 }, // 2: arriba, opuesto
  { y1: 78, y2: 76, r1: 0.24, r2: 0.770 }, // 3: abajo, suave
  { y1: 22, y2: 26, r1: 0.24, r2: 0.740 }, // 4: arriba
];

const SB_ROMAN = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII'];

function sbToRoman(n) {
  return SB_ROMAN[n - 1] || String(n);
}

/* Posicion X de cada hito, equidistantes entre 60 y 580.
   N=1 -> hito unico en x=320. */
function sbHitoX(i, total) {
  if (total <= 1) return 320;
  return 60 + i * (520 / (total - 1));
}

/* Genera el path "C cp1x cp1y, cp2x cp2y, x1 50" de un segmento. */
function sbSegmentPath(x0, x1, segIdx) {
  const span = x1 - x0;
  const p = SB_SEG_PARAMS[segIdx % SB_SEG_PARAMS.length];
  const cp1x = x0 + p.r1 * span;
  const cp2x = x0 + p.r2 * span;
  return `C ${cp1x.toFixed(2)} ${p.y1}, ${cp2x.toFixed(2)} ${p.y2}, ${x1} 50`;
}

function SenderoBarBase({ blocks, currentIndex, size, orbVisible }) {
  const reactId = useIdSB();
  const haloDoneId = `sb-halo-done-${reactId}`;
  const haloCurrentId = `sb-halo-current-${reactId}`;

  const total = (blocks && blocks.length) || 0;
  if (total === 0) return null;

  const isLarge = size === 'lg';

  const xs = [];
  for (let i = 0; i < total; i++) xs.push(sbHitoX(i, total));

  // Partir segmentos en dos paths: completados (solidos) y pendientes (punteados).
  // El segmento "actual" (entre currentIndex-1 y currentIndex) ya se considera completado.
  // Los segmentos pendientes son los que parten del hito currentIndex hacia adelante.
  const doneSegs = [];
  const pendingSegs = [];
  for (let i = 0; i < total - 1; i++) {
    const seg = sbSegmentPath(xs[i], xs[i + 1], i);
    const startMove = `M ${xs[i]} 50 ${seg}`;
    if (i < currentIndex) doneSegs.push(startMove);
    else pendingSegs.push(startMove);
  }
  const donePath = doneSegs.join(' ');
  const pendingPath = pendingSegs.join(' ');

  /* Orbe viajero (s77): SOLO durante StepIntro. Recorre el ultimo segmento
     completado (del hito currentIndex-1 al currentIndex) en --path-step-ms.
     Decision 10 del prompt s77: CSS puro via animateMotion. */
  const showOrb = !!orbVisible && currentIndex > 0 && currentIndex <= total - 1;
  let orbPath = null;
  if (showOrb) {
    const prev = currentIndex - 1;
    const segIdx = prev;
    const segD = sbSegmentPath(xs[prev], xs[currentIndex], segIdx);
    orbPath = `M ${xs[prev]} 50 ${segD}`;
  }

  const className = 'sendero-bar' + (isLarge ? ' lg' : '');

  return (
    <div className={className}>
      <div className="sendero-wrap">
        <svg className="sendero-svg" viewBox="0 0 640 100" preserveAspectRatio="xMidYMid meet">
          <defs>
            <radialGradient id={haloDoneId} cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="currentColor" stopOpacity="0.21" />
              <stop offset="55%" stopColor="currentColor" stopOpacity="0.055" />
              <stop offset="100%" stopColor="currentColor" stopOpacity="0" />
            </radialGradient>
            <radialGradient id={haloCurrentId} cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="currentColor" stopOpacity="0.70" />
              <stop offset="55%" stopColor="currentColor" stopOpacity="0.16" />
              <stop offset="100%" stopColor="currentColor" stopOpacity="0" />
            </radialGradient>
          </defs>

          {donePath && <path className="path-line" d={donePath} />}
          {pendingPath && <path className="path-line pending" d={pendingPath} />}

          {xs.map(function(cx, i) {
            const label = (blocks[i] && blocks[i].name) || '';
            if (i < currentIndex) {
              return (
                <g key={i}>
                  {label && <title>{label}</title>}
                  <circle cx={cx} cy="50" r="10" fill={`url(#${haloDoneId})`} />
                  <circle cx={cx} cy="50" r="4" className="dot-fill" />
                </g>
              );
            }
            if (i === currentIndex) {
              return (
                <g key={i}>
                  {label && <title>{label}</title>}
                  <circle cx={cx} cy="50" r="19" fill={`url(#${haloCurrentId})`} />
                  <circle cx={cx} cy="50" r="4.5" className="dot-fill" />
                </g>
              );
            }
            return (
              <g key={i}>
                {label && <title>{label}</title>}
                <circle cx={cx} cy="50" r="3.2" className="dot-fill" opacity="0.32" />
              </g>
            );
          })}

          {showOrb && (
            <g className="sendero-orb">
              {/* Glow primero (debajo) */}
              <circle r="7" fill="var(--focus)" opacity="0.30">
                <animateMotion dur="2s" fill="freeze" path={orbPath} />
              </circle>
              {/* Punto solido encima */}
              <circle r="3" fill="var(--focus)">
                <animateMotion dur="2s" fill="freeze" path={orbPath} />
              </circle>
            </g>
          )}
        </svg>
      </div>

      {/* hito-labels (s77b): SOLO los hitos done (i < currentIndex).
          - En .lg (TransitionCards): el current ya aparece como titulo
            grande Garamond, asi que no se duplica; los pending quedan
            sin spoiler.
          - En no-lg (CompletionScreen): currentIndex === totalSteps,
            asi que muestra TODOS (todos son done). Comportamiento
            funcionalmente identico al de s76 en CompletionScreen. */}
      {currentIndex > 0 && (
        <div className="hito-labels">
          {blocks.map(function(b, i) {
            if (i >= currentIndex) return null;
            const leftPct = total <= 1 ? 50 : ((xs[i] / 640) * 100);
            return (
              <span
                key={b.id + '-' + i}
                className="hito-label done"
                style={{ left: leftPct + '%' }}
              >
                {b.name}
                <span className="hito-roman">{sbToRoman(i + 1)}</span>
              </span>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* memo: PathFocusStep tickea cada segundo. Sin memo, SenderoBar
   re-renderiza por tick aunque blocks/currentIndex sean estables.
   En movil 60 ticks/min es coste real. */
const SenderoBar = React.memo(SenderoBarBase);

Object.assign(window, { SenderoBar });

</script>
  <!-- Caminos - PathTransitions (sesion 77) - debe cargarse ANTES de PathRunner que lo consume -->
  <script type="text/babel">
/* PACE - Caminos - PathTransitions (sesion 77 / v0.31.0)
   Cards de transicion entre pantallas del Camino:

     - IntroCard:  al abrir el Camino (SenderoBar 0/N + nombre del Camino).
     - StepIntro:  entre cada par de pasos (SenderoBar parcial + orbe + kind).
     - OutroCard:  antes de CompletionScreen (SenderoBar N/N + nombre).

   Las tres comparten layout vertical: SenderoBar grande arriba, titulo
   centrado en vertical, hint "toca para continuar" en la base. La card
   entera es tappable. Auto-advance por timer (tokens CSS configurables).

   Cero audio (decision 15 del prompt s77). Cero persistencia: si
   recargas, no ves transicion -- aterrizas en el paso destino.

   API expuesta a window: IntroCard, StepIntro, OutroCard.
*/

const { useState: useStatePT, useEffect: useEffectPT, useRef: useRefPT } = React;

/* Lee var CSS como ms. Soporta "300ms" y "0.3s". */
function pathTransitionReadMs(name, fallback) {
  try {
    var v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    if (!v) return fallback;
    if (v.endsWith('ms')) return parseFloat(v);
    if (v.endsWith('s'))  return parseFloat(v) * 1000;
    var n = parseFloat(v);
    return Number.isFinite(n) ? n : fallback;
  } catch (e) { return fallback; }
}

/* TransitionCardBase - logica comun de entrada/salida + auto-advance.
   El padre (PathRunner) controla cuando se monta/desmonta cada variante. */
function TransitionCardBase({
  blocks,         // array para SenderoBar
  currentIndex,   // hito activo (intro=0, transition=next, outro=total)
  title,          // texto grande centrado en vertical
  orbVisible,     // true solo en StepIntro
  durationVar,    // 'intro' | 'step' | 'outro'
  fadeMsFallback, // ms para entrada/salida (--path-card-fade-ms)
  totalMsFallback,// ms total de hold antes del auto-continue
  onContinue,     // callback al final del hold o al tap
}) {
  const { t } = useT();
  /* Arranca invisible (decision 5: fade + scale 0.96 -> 1.0). */
  const [visible, setVisible] = useStatePT(false);
  const [exiting, setExiting] = useStatePT(false);
  const exitedRef = useRefPT(false);
  const enterRafRef = useRefPT(null);
  const holdTimerRef = useRefPT(null);
  const exitTimerRef = useRefPT(null);

  useEffectPT(function () {
    var fadeMs  = pathTransitionReadMs('--path-card-fade-ms', fadeMsFallback);
    var holdMs  = pathTransitionReadMs(
      durationVar === 'intro' ? '--path-intro-ms' :
      durationVar === 'outro' ? '--path-outro-ms' :
                                '--path-step-ms',
      totalMsFallback
    );
    /* Doble rAF para asegurar pintado del estado opacity=0 antes del fade-in. */
    enterRafRef.current = requestAnimationFrame(function () {
      enterRafRef.current = requestAnimationFrame(function () { setVisible(true); });
    });
    /* Hold "completo" termina cuando expiran (holdMs - fadeMs) tras el fade-in.
       Asi el conjunto entrada + hold visible + salida cuadra con holdMs total. */
    var holdAfterEnter = Math.max(0, holdMs - fadeMs);
    holdTimerRef.current = setTimeout(function () {
      doExit();
    }, fadeMs + holdAfterEnter);

    return function () {
      if (enterRafRef.current) cancelAnimationFrame(enterRafRef.current);
      clearTimeout(holdTimerRef.current);
      clearTimeout(exitTimerRef.current);
    };
  }, []);

  function doExit() {
    if (exitedRef.current) return;
    exitedRef.current = true;
    clearTimeout(holdTimerRef.current);
    var fadeMs = pathTransitionReadMs('--path-card-fade-ms', fadeMsFallback);
    setExiting(true);
    setVisible(false);
    exitTimerRef.current = setTimeout(function () {
      if (typeof onContinue === 'function') onContinue();
    }, fadeMs);
  }

  /* Tap acelera la salida (decision 7). */
  function handleTap() { doExit(); }
  function handleKey(e) {
    if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
      e.preventDefault();
      doExit();
    }
  }

  /* Opacity y scale derivados del estado:
       inicial:  opacity 0, scale --path-card-scale-from (0.96)
       visible:  opacity 1, scale 1
       exiting:  opacity 0, scale 0.96
     La transicion CSS (definida inline) se encarga del tween. */
  var scaleFrom = (function () {
    try {
      var v = getComputedStyle(document.documentElement)
        .getPropertyValue('--path-card-scale-from').trim();
      var n = parseFloat(v);
      return Number.isFinite(n) ? n : 0.96;
    } catch (e) { return 0.96; }
  })();
  var opacity, scale;
  if (exiting)      { opacity = 0; scale = scaleFrom; }
  else if (visible) { opacity = 1; scale = 1; }
  else              { opacity = 0; scale = scaleFrom; }

  return (
    <div
      onClick={handleTap}
      onKeyDown={handleKey}
      role="button"
      tabIndex={0}
      aria-label={title}
      style={Object.assign({}, pathTransitionStyles.card, {
        opacity: opacity,
        transform: 'scale(' + scale + ')',
      })}
    >
      <div style={pathTransitionStyles.senderoSlot}>
        <SenderoBar
          blocks={blocks}
          currentIndex={currentIndex}
          size="lg"
          orbVisible={orbVisible}
        />
      </div>

      <div style={pathTransitionStyles.titleWrap}>
        <h2 style={pathTransitionStyles.title}>{title}</h2>
      </div>

      <div style={pathTransitionStyles.hint}>
        {t('path.runner.transition.continue')}
      </div>
    </div>
  );
}

function IntroCard({ pathName, blocks, onContinue }) {
  return (
    <TransitionCardBase
      blocks={blocks}
      currentIndex={0}
      title={pathName}
      orbVisible={false}
      durationVar="intro"
      fadeMsFallback={200}
      totalMsFallback={2500}
      onContinue={onContinue}
    />
  );
}

function StepIntro({ kindName, blocks, currentIndex, onContinue }) {
  return (
    <TransitionCardBase
      blocks={blocks}
      currentIndex={currentIndex}
      title={kindName}
      orbVisible={true}
      durationVar="step"
      fadeMsFallback={200}
      totalMsFallback={2000}
      onContinue={onContinue}
    />
  );
}

function OutroCard({ pathName, blocks, onContinue }) {
  var total = (blocks && blocks.length) || 0;
  return (
    <TransitionCardBase
      blocks={blocks}
      currentIndex={total /* todos done */}
      title={pathName}
      orbVisible={false}
      durationVar="outro"
      fadeMsFallback={200}
      totalMsFallback={1500}
      onContinue={onContinue}
    />
  );
}

const pathTransitionStyles = {
  card: {
    position: 'absolute',
    inset: 0,
    display: 'flex',
    flexDirection: 'column',
    alignItems: 'center',
    justifyContent: 'space-between',
    padding: '10vh 32px 6vh',
    background: 'var(--paper)',
    cursor: 'pointer',
    userSelect: 'none',
    zIndex: 10,
    transformOrigin: '50% 50%',
    transition:
      'opacity var(--path-card-fade-ms, 200ms) ease-out, ' +
      'transform var(--path-card-fade-ms, 200ms) ease-out',
    outline: 'none',
  },
  senderoSlot: {
    width: '100%',
    maxWidth: 720,
    flex: '0 0 auto',
  },
  titleWrap: {
    flex: '1 1 auto',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    width: '100%',
    padding: '0 12px',
    minHeight: 0,
  },
  title: {
    fontFamily: "'EB Garamond', 'Cormorant Garamond', Georgia, serif",
    fontStyle: 'italic',
    fontSize: 'clamp(36px, 6vw, 64px)',
    fontWeight: 500,
    color: 'var(--ink)',
    margin: 0,
    textAlign: 'center',
    lineHeight: 1.15,
    letterSpacing: '0.005em',
  },
  hint: {
    fontFamily: "'EB Garamond', 'Cormorant Garamond', Georgia, serif",
    fontStyle: 'italic',
    fontSize: 13,
    color: 'var(--ink-3)',
    letterSpacing: '0.04em',
    flex: '0 0 auto',
    opacity: 0.85,
  },
};

Object.assign(window, { IntroCard, StepIntro, OutroCard });

</script>

   los Steps) y btnOutline (defaults del boton outline -- background, border,

  <script type="text/babel">
/* PACE · Caminos · Step de Respira · sesion 80 (split de PathRunner.jsx)
   Envoltura sobre BreatheSession con resolucion de rutina y gate de
   seguridad para rutinas marcadas safety:true (wim-hof, kapalabhati).
   Contrato uniforme: (step, onExit(reason)) con reason 'done' | 'skip'. */

const { useState: useStateBS } = React;

function PathBreatheStep({ step, onExit }) {
  const routine = getBreatheRoutine && getBreatheRoutine(step.routineId);
  if (!routine) return <StepError routineId={step.routineId} onSkip={() => onExit('skip')} />;

  if (routine.safety) {
    return <PathBreatheSafetyGate routine={routine} onExit={onExit} />;
  }
  return <BreatheSession routine={routine} onExit={onExit} />;
}

function PathBreatheSafetyGate({ routine, onExit }) {
  const [accepted, setAccepted] = useStateBS(false);
  if (!accepted) {
    return (
      <BreatheSafety
        routine={routine}
        onAccept={() => setAccepted(true)}
        onCancel={() => onExit('skip')}
      />
    );
  }
  return <BreatheSession routine={routine} onExit={onExit} />;
}

Object.assign(window, { PathBreatheStep, PathBreatheSafetyGate });

  <script type="text/babel">
/* PACE · Caminos · Step de Foco · sesion 80 (split de PathRunner.jsx)
   Pomodoro contextual de Camino. TimerDial compartido + subtitulo
   "Concentracion profunda" + tres botones del mismo peso visual
   (Pausar/Reset/Saltar) durante la sesion + CTA "Hecho" al completar.
   Acredita foco UNA SOLA VEZ via creditedRef cuando remaining llega a 0
   estando running. Reset NO acredita; skip NO acredita.
   Estilos comunes desde window.pathStepStyles (steps/_shared.js).
   Contrato uniforme: (step, onExit(reason)) con reason 'done' | 'skip'. */

const { useState: useStateFS, useEffect: useEffectFS, useRef: useRefFS } = React;

function PathFocusStep({ step, onExit }) {
  const { t } = useT();
  const totalSec = (step.min || 25) * 60;
  const [remaining, setRemaining] = useStateFS(totalSec);
  const [running, setRunning] = useStateFS(false);
  const [done, setDone] = useStateFS(false);
  const intervalRef = useRefFS(null);
  const creditedRef = useRefFS(false);

  useEffectFS(() => {
    if (!running) { clearInterval(intervalRef.current); return; }
    intervalRef.current = setInterval(() => {
      setRemaining(r => {
        if (r <= 1) {
          clearInterval(intervalRef.current);
          setRunning(false);
          setDone(true);
          if (!creditedRef.current && typeof addFocusMinutes === 'function') {
            try {
              addFocusMinutes(step.min || 25);
              creditedRef.current = true;
              /* F-1 (s86): igual que la home (completePomodoro), el foco de un
                 Camino cuenta como actividad del dia para la racha. updateStreak
                 es idempotente por dia, asi que no doble-cuenta con el paso
                 breathe/body si el Camino tambien lo ejecuta. */
              if (typeof updateStreak === 'function') updateStreak();
            } catch (e) {}
          }
          return 0;
        }
        return r - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [running]);

  /* Reset: restaura contador y pausa. NO toca creditedRef ni avanza el
     Camino. Si el usuario ya termino una vez (done) y resetea, ese caso
     no se da: el bloque "done" muestra solo "Hecho", no Reset. */
  const handleReset = () => {
    setRunning(false);
    setRemaining(totalSec);
  };

  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  const progress = totalSec > 0 ? 1 - (remaining / totalSec) : 0;

  /* Botones del mismo peso visual: misma forma/padding/tipografia, solo
     varia el label. Compone btnTypography + btnOutline desde _shared.js. */
  const { btnTypography, btnOutline } = window.pathStepStyles;
  const btnBase = Object.assign({}, btnTypography, btnOutline, { padding: '10px 22px' });

  const pauseLabel = running
    ? t('focus.pause')
    : (remaining < totalSec ? t('focus.continue') : t('focus.start'));

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', padding: 40, textAlign: 'center',
    }}>
      {typeof TimerDial === 'function' ? (
        <div style={{ marginBottom: 24 }}>
          <TimerDial
            mins={mins}
            secs={secs}
            progress={progress}
            mode="foco"
            modeLabel={t('topbar.mode.focus')}
            subtitle={t('focus.subtitle.focus')}
            inner={null}
          />
        </div>
      ) : (
        <div style={{
          fontFamily: "'EB Garamond', Georgia, serif",
          fontSize: 96, fontWeight: 400,
          fontVariantNumeric: 'tabular-nums',
          color: 'var(--ink)', lineHeight: 1, marginBottom: 32,
        }}>
          {String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}
        </div>
      )}
      {!done ? (
        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={() => setRunning(r => !r)} style={btnBase}>
            {pauseLabel}
          </button>
          <button onClick={handleReset} style={btnBase}>
            {t('focus.restart')}
          </button>
          <button onClick={() => onExit('skip')} style={btnBase}>
            {t('path.runner.skip')}
          </button>
        </div>
      ) : (
        <button
          onClick={() => onExit('done')}
          style={{
            padding: '10px 28px', borderRadius: 'var(--r-sm)',
            background: 'var(--ink)', border: 'none',
            color: 'var(--paper)', cursor: 'pointer', fontSize: 13,
            letterSpacing: '0.08em',
            fontFamily: 'var(--font-display)', fontStyle: 'italic',
          }}
        >
          {t('path.runner.done')}
        </button>
      )}
    </div>
  );
}

Object.assign(window, { PathFocusStep });

</script>
  <script type="text/babel">
/* PACE · Caminos · Step de Hidratacion · sesion 80 (split de PathRunner.jsx)
   Mismo lenguaje visual que HydrateModule del home: contador Garamond
   grande + grid visual de `goal` vasos (no clicables: es step de Camino,
   no tracker) + 2 botones del mismo peso visual (Saltar outline / Beber
   relleno). addWaterGlass(1) solo se llama en handleDrink, no en skip.
   Estilos comunes desde window.pathStepStyles (steps/_shared.js).
   Contrato uniforme: (step, onExit(reason)) con reason 'done' | 'skip'.
   `step` se acepta para uniformidad de firma aunque no se consume. */

function PathHydrateStep({ step, onExit }) {
  const [state] = usePace();
  const { t } = useT();
  const today = (state.water && state.water.today) || 0;
  const goal  = (state.water && state.water.goal)  || 8;
  const handleDrink = () => {
    if (typeof addWaterGlass === 'function') {
      try { addWaterGlass(1); } catch (e) {}
    }
    onExit('done');
  };
  /* Tipografia comun desde _shared; el padding (10px 28px) es propio de
     este step por densidad de su layout (2 botones, no 3). */
  const { btnTypography } = window.pathStepStyles;
  const btnBase = Object.assign({}, btnTypography, { padding: '10px 28px' });
  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      padding: '32px 40px', textAlign: 'center',
    }}>
      {/* Contador grande, mismo lenguaje que HydrateTracker */}
      <div style={{
        fontFamily: "'EB Garamond', Georgia, serif",
        fontStyle: 'italic',
        fontSize: 'clamp(72px, 12vw, 112px)', fontWeight: 400, lineHeight: 1,
        color: 'var(--hydrate)',
      }}>
        {today}<span style={{ color: 'var(--ink-3)', fontSize: '0.42em' }}> / {goal}</span>
      </div>
      <div style={{
        fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase',
        color: 'var(--ink-3)', marginTop: 8, marginBottom: 22,
      }}>
        {t('path.hydrate.glasses.today') || 'Vasos hoy'}
      </div>

      {/* Vasos visuales (no interactivos: es Camino, no tracker) */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'repeat(' + goal + ', 1fr)',
        gap: 6,
        maxWidth: 360, width: '100%',
        marginBottom: 26,
      }}>
        {Array.from({ length: goal }).map(function (_, i) {
          const filled = i < today;
          return (
            <div key={i} style={{
              aspectRatio: '1/1.3',
              background: filled ? 'var(--hydrate-soft)' : 'transparent',
              border: '1.5px solid ' + (filled ? 'var(--hydrate)' : 'var(--line)'),
              borderRadius: 'var(--r-sm)',
              position: 'relative', overflow: 'hidden',

              {filled && (
                <div style={{
                  position: 'absolute', inset: 0, top: '40%',
                  background: 'var(--hydrate-soft)',
                  borderTop: '1px solid var(--hydrate)',
                }} />
              )}
            </div>
          );
        })}
      </div>

      <p style={{
        fontFamily: "'EB Garamond', 'Cormorant Garamond', Georgia, serif",
        fontStyle: 'italic', fontSize: 18, fontWeight: 400,
        color: 'var(--ink-2)', margin: '0 0 26px', lineHeight: 1.4,
        maxWidth: 360,
      }}>
        {t('path.hydrate.copy')}
      </p>

      {/* Dos botones del mismo peso visual: diferencia de color, no de jerarquia */}
      <div style={{ display: 'flex', gap: 12 }}>
        <button
          onClick={() => onExit('skip')}
          style={Object.assign({}, btnBase, {
            background: 'transparent',
            border: '1px solid var(--line-2)',
            color: 'var(--ink-2)',

        >
          {t('path.hydrate.skip') || t('path.runner.skip')}

        <button

          {t('path.hydrate.drank')}
        </button>
      </div>
    </div>
  );
}

  <script type="text/babel">
/* PACE · Caminos · Step de Cuerpo · sesion 80 (split de PathRunner.jsx)
   Dispatcher: resuelve routineId via resolveBodyRoutine (busca primero en
   MoveModule, luego en ExtraModule) y renderiza MoveSession con
   kind='move' o kind='extra'. El catalogo usa kind:'body' como entrada
   unica; la separacion move/extra (stretch) ocurre aqui por procedencia
   de la rutina.
   Contrato uniforme: (step, onExit(reason)) con reason 'done' | 'skip'. */

function PathBodyStep({ step, onExit }) {
  const resolved = resolveBodyRoutine && resolveBodyRoutine(step.routineId);
  if (!resolved) return <StepError routineId={step.routineId} onSkip={() => onExit('skip')} />;
  const kind = resolved.source === 'extra' ? 'extra' : 'move';
  return <MoveSession routine={resolved.routine} kind={kind} onExit={onExit} />;
}

/* PACE · Caminos · PathRunner parts · sesion 80 (split de PathRunner.jsx)
   Componentes auxiliares del overlay del Camino que no son orquestador:
   - PathTopBar: barra superior fija con nombre del Camino y boton cerrar.
   - ExitConfirmModal: confirmacion in-app antes de abandonar el Camino.
   - StepError: fallback visual cuando un routineId no resuelve.
   Aislados aqui para que PathRunner.jsx quede solo con la maquina de
   fases y el dispatcher por step.kind. */

const { useEffect: useEffectPP, useRef: useRefPP } = React;

/* PathTopBar - nombre del Camino + boton de salida.
   Sesion 75: dots eliminados (los reemplaza SenderoBar). */
function PathTopBar({ pathName, onRequestExit }) {

/* ExitConfirmModal - confirmacion in-app (sin llamada al dialog nativo) */
function ExitConfirmModal({ open, onCancel, onConfirm }) {

              padding: '8px 18px', borderRadius: 'var(--r-sm)',
              background: 'var(--paper-2)', border: '1px solid var(--line)',

/* StepError - fallback si routineId no resuelve */
function StepError({ routineId, onSkip }) {

  <!-- Caminos - CompletionScreen (sesion 80) - pantalla de Camino completado -->
  <script type="text/babel">
/* PACE · Caminos · Pantalla de Camino completado · sesion 80 (split de PathRunner.jsx)
   SenderoBar al 100% (todos los hitos como done), lista discreta del
   recorrido con numerales romanos (skipped tachado), logros desbloqueados
   DURANTE este Camino (filter unlockedAt >= snapshot.startedAt) y dos
   botones (Volver / Repetir camino).
   fadeIn=true: cross-fade 400ms al venir de OutroCard (mismo background
   var(--paper) que la card de salida).
   CS_ROMAN local: decision s79 (no extraer a helper compartido hasta
   tener 3 consumidores; aqui sigue siendo solo 1). */

const { useState: useStateCS, useEffect: useEffectCS } = React;

const CS_ROMAN = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII'];

function CompletionScreen({ snapshot, onBack, fadeIn }) {
  const [state] = usePace();
  const { t } = useT();
  const [opacity, setOpacity] = useStateCS(fadeIn ? 0 : 1);
  useEffectCS(function () {
    if (!fadeIn) return;
    /* Doble rAF: asegura que el frame con opacity=0 se pinta antes de
       arrancar la transicion a opacity=1. Sin esto, React podria batch
       y nunca veriamos el fade-in. */
    var r1 = requestAnimationFrame(function () {
      var r2 = requestAnimationFrame(function () { setOpacity(1); });
      /* Limpieza de la segunda rAF en caso de unmount entre frames. */
      return function () { cancelAnimationFrame(r2); };
    });
    return function () { cancelAnimationFrame(r1); };
  }, [fadeIn]);
  const path = getPath(snapshot.pathId);
  const displayName = path ? (t(path.nameKey) || snapshot.pathId) : snapshot.pathId;
  const elapsed = snapshot.startedAt
    ? Math.round((Date.now() - snapshot.startedAt) / 60000)
    : 0;

  const steps = (path && path.steps) || [];
  const totalSteps = steps.length;
  const skippedSet = new Set(snapshot.skippedSteps || []);

  const senderoBlocks = steps.map(function(s, idx) {
    return {
      id: s.kind + '-' + idx,
      name: t('paths.kind.' + s.kind + '.name') || s.kind,
    };
  });

  /* Logros desbloqueados durante este Camino. */
  const startedAt = snapshot.startedAt || 0;
  const catalog = (typeof window !== 'undefined' && window.ACHIEVEMENT_CATALOG) || [];
  const achievementsDuring = Object.keys(state.achievements || {})
    .map(function(id) {
      const v = state.achievements[id];
      if (!v || !v.unlockedAt) return null;
      if (v.unlockedAt < startedAt) return null;
      const cat = catalog.find(function(x) { return x.id === id; });
      if (!cat) return null;
      return { id, title: cat.title, glyph: cat.glyph, glyphSvg: cat.glyphSvg };
    })
    .filter(Boolean);

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      padding: '32px 40px', textAlign: 'center',
      overflowY: 'auto',
      opacity: opacity,
      transition: fadeIn ? 'opacity 400ms ease-out' : 'none',
    }}>
      <div style={{
        width: 64, height: 64, borderRadius: '50%',
        background: 'var(--breathe-soft)', color: 'var(--breathe)',
        display: 'grid', placeItems: 'center', fontSize: 28,
        marginBottom: 20,
      }}>
        &#x2714;
      </div>
      <p style={{ fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--ink-3)', margin: '0 0 10px' }}>
        {t('path.runner.complete.title')}
      </p>
      <h2 style={{
        fontFamily: "'EB Garamond', 'Cormorant Garamond', Georgia, serif",
        fontStyle: 'italic', fontSize: 36, fontWeight: 500,
        color: 'var(--ink)', margin: '0 0 8px', lineHeight: 1.2,
      }}>
        {displayName}
      </h2>
      {elapsed > 0 && (
        <p style={{ color: 'var(--ink-3)', fontSize: 13, margin: '0 0 24px' }}>
          {elapsed} min
        </p>
      )}

      {/* SenderoBar 100% done: currentIndex = totalSteps -> ningun
          hito en estado 'current', todos en 'done'. */}
      {totalSteps > 0 && (
        <div style={{ width: '100%', maxWidth: 640, margin: '0 0 12px' }}>
          <SenderoBar blocks={senderoBlocks} currentIndex={totalSteps} />
        </div>
      )}

      {/* Lista discreta del recorrido */}
      {totalSteps > 0 && (
        <div style={{ margin: '4px 0 24px', maxWidth: 320, width: '100%' }}>
          <div style={{
            fontSize: 10, letterSpacing: '0.22em', textTransform: 'uppercase',
            color: 'var(--ink-3)', marginBottom: 10,
          }}>
            {t('path.runner.complete.recorrido')}
          </div>
          <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 4 }}>
            {steps.map(function(s, idx) {
              const skipped = skippedSet.has(idx);
              return (
                <li key={s.kind + '-' + idx} style={{
                  display: 'flex', alignItems: 'baseline', gap: 12,
                  padding: '4px 0',
                  opacity: skipped ? 0.45 : 1,
                  textDecoration: skipped ? 'line-through' : 'none',
                  textDecorationColor: 'var(--ink-3)',
                }}>
                  <span style={{
                    fontFamily: 'var(--font-display)', fontStyle: 'italic',
                    fontSize: 13, color: 'var(--ink-3)',
                    minWidth: 28, textAlign: 'right',
                  }}>{CS_ROMAN[idx] || (idx + 1)}</span>
                  <span style={{
                    fontFamily: 'var(--font-display)', fontStyle: 'italic',
                    fontSize: 16, color: skipped ? 'var(--ink-3)' : 'var(--ink-2)',
                  }}>
                    {t('paths.kind.' + s.kind + '.name') || s.kind}
                  </span>
                </li>
              );
            })}
          </ul>
        </div>
      )}

      {/* Logros desbloqueados durante el Camino */}
      {achievementsDuring.length > 0 && (
        <div style={{
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          gap: 8, margin: '0 0 24px',
          padding: '14px 18px',
          border: '1px solid var(--achievement)',
          borderRadius: 'var(--r-md)',
          background: 'var(--achievement-soft)',
        }}>
          {achievementsDuring.map(function(a) {
            return (
              <div key={a.id} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{
                  width: 26, height: 26, borderRadius: '50%',
                  border: '1px solid var(--achievement)',
                  display: 'grid', placeItems: 'center',
                  color: 'var(--achievement)',
                  fontFamily: 'var(--font-display)', fontStyle: 'italic',
                  fontSize: 12,
                }}>
                  {a.glyphSvg
                    ? <span style={{ display: 'grid', placeItems: 'center', width: '100%', height: '100%' }} dangerouslySetInnerHTML={{ __html: a.glyphSvg }} />
                    : <span>{a.glyph}</span>
                  }
                </span>
                <span style={{
                  fontFamily: 'var(--font-display)', fontStyle: 'italic',
                  fontSize: 14, color: 'var(--ink)',
                }}>{a.title}</span>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ display: 'flex', gap: 10, flexDirection: 'column', alignItems: 'center' }}>
        <button
          onClick={onBack}
          style={{
            padding: '12px 32px', borderRadius: 'var(--r-pill)',
            background: 'var(--ink)', border: 'none',
            color: 'var(--paper)', cursor: 'pointer',
            fontSize: 13, letterSpacing: '0.1em',
          }}
        >
          {t('path.runner.complete.back')}
        </button>
        <button
          onClick={function() { onBack(); if (typeof startPath === 'function') startPath(snapshot.pathId); }}
          style={{
            padding: '8px 24px', borderRadius: 'var(--r-pill)',
            background: 'transparent', border: '1px solid var(--line)',
            color: 'var(--ink-3)', cursor: 'pointer',
            fontSize: 12, letterSpacing: '0.1em',
            fontFamily: 'var(--font-display)', fontStyle: 'italic',
          }}
        >
          {t('paths.runner.repeat') || 'Repetir camino'}
        </button>
      </div>
    </div>
  );
}

Object.assign(window, { CompletionScreen });

</script>
  <!-- Caminos - PathRunner UI (sesion 50; split s80) - orquestador -->
  <script type="text/babel">
/* PACE · Caminos · PathRunner orquestador · sesion 50 (split s80)
   Monta un overlay full-screen cuando state.paths.current != null.
   Con paths.current === null y justCompleted === null devuelve null
   -> cero impacto visual en home.

   Tras el split de s80 este archivo contiene SOLO la maquina de fases
   + el dispatcher por step.kind. Los demas componentes viven en:
     - app/paths/steps/_shared.js         (estilos comunes)
     - app/paths/steps/PathBreatheStep.jsx
     - app/paths/steps/PathFocusStep.jsx
     - app/paths/steps/PathHydrateStep.jsx
     - app/paths/steps/PathBodyStep.jsx
     - app/paths/PathRunner.parts.jsx     (PathTopBar, ExitConfirmModal, StepError)
     - app/paths/CompletionScreen.jsx     (pantalla terminal)
   Todos deben estar cargados antes que este archivo (ver PACE.html). */

const { useState: useStatePR, useEffect: useEffectPR } = React;

/* PathRunner - orquestador principal.

   s77: maquina de fases para las transiciones intra-overlay.
     'intro'      -> IntroCard al abrir el Camino (solo si recien iniciado).
     'step'       -> render del paso real (Focus/Breathe/Body/Hydrate).
     'transition' -> StepIntro entre dos pasos (cur.stepIndex ya avanzado).
     'outro'      -> OutroCard antes de CompletionScreen.

   Reglas clave (volatiles, no se persisten en paths.current):
   - Recarga durante intro/transition/outro -> phase='step' al rehidratar.
   - Step intermedio: advancePathStep AHORA, asi recarga aterriza en destino.
   - Ultimo step: NO se avanza hasta tras OutroCard (cur queda intacto). */
function PathRunner() {
  const [state] = usePace();
  const { t } = useT();
  const cur = state.paths.current;
  const [justCompleted, setJustCompleted] = useStatePR(null);
  const [confirmExit, setConfirmExit] = useStatePR(false);
  const [phase, setPhase] = useStatePR('step');
  /* pendingComplete = snapshot + reason capturados al iniciar OutroCard.
     Se aplica en handleOutroDone -> setJustCompleted + advancePathStep. */
  const [pendingComplete, setPendingComplete] = useStatePR(null);

  /* Limpiar justCompleted cuando arranca un nuevo camino */
  useEffectPR(() => {
    if (cur) setJustCompleted(null);
  }, [cur ? cur.id : null]);

  /* s76: marca body cuando hay un Camino activo (no en CompletionScreen).
     CSS en tokens.css empuja el padding-top del overlay y de SessionShell
     para dejar sitio a la SenderoBar sticky superior. */
  /* s77: phase = 'intro' al iniciar un Camino (volatil). Detecta "recien
     iniciado" como (Date.now() - startedAt < 1500ms) sobre stepIndex 0.
     Al recargar, este margen ya habra expirado y aterrizamos en 'step'. */
  useEffectPR(() => {
    if (!cur) { setPhase('step'); return; }
    if (cur.stepIndex === 0 && (Date.now() - cur.startedAt) < 1500) {
      setPhase('intro');
    } else {
      setPhase('step');
    }
  }, [cur ? cur.id : null]);

  /* Escape:
       - Modal de confirmacion abierto -> cierra modal.
       - phase != 'step' -> ignorar (la card es tappable de por si).
       - phase === 'step' -> solicita salida (con confirmacion si no opcional).
     NOTA: hook movido antes del early return para cumplir Rules of Hooks. */
  useEffectPR(() => {
    if (!cur) return;
    function handleKey(e) {
      if (e.key !== 'Escape') return;
      var active = document.activeElement;
      if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
      if (confirmExit) { setConfirmExit(false); return; }
      if (phase !== 'step') return;
      var path = getPath(cur.id);
      var step = path && path.steps[cur.stepIndex];
      if (step && step.optional) {
        abandonPath();
      } else {
        setConfirmExit(true);
      }
    }
    document.addEventListener('keydown', handleKey);
    return () => document.removeEventListener('keydown', handleKey);
  }, [confirmExit, cur ? cur.stepIndex : null, phase]);

  /* Nada que mostrar: home visible */
  if (!cur && !justCompleted) return null;

  /* Pantalla de completado. fadeIn=true cuando viene tras OutroCard
     (cross-fade simbolico 400ms). Si el usuario llega aqui por otra
     via, fadeIn queda false. */
  if (justCompleted) {
    return (
      <div
        className="path-runner-overlay"
        role="dialog"
        aria-modal="true"
        aria-label={t('path.runner.complete.title')}
      >
        <CompletionScreen
          snapshot={justCompleted}
          onBack={() => setJustCompleted(null)}
          fadeIn
        />
      </div>
    );
  }

  const path = getPath(cur.id);
  if (!path) return null;

  const step = path.steps[cur.stepIndex];
  const totalSteps = path.steps.length;

  /* Callback de paso: dispara intro/transition/outro segun caso.
     - Intermedio: avanza AHORA (decision 3) + phase='transition'.
     - Ultimo:     captura snapshot + phase='outro'. El advance final lo
       hace handleOutroDone tras el hold de OutroCard. */
  const handleStepExit = (reason) => {
    const isLast = cur.stepIndex >= path.steps.length - 1;
    if (isLast) {
      const skipped = reason === 'skip'
        ? [...cur.skippedSteps, cur.stepIndex]
        : cur.skippedSteps;
      setPendingComplete({
        reason: reason,
        snapshot: {
          pathId: cur.id,
          startedAt: cur.startedAt,
          skippedSteps: skipped,
        },
      });
      setPhase('outro');
    } else {
      advancePathStep(reason);
      setPhase('transition');
    }
  };

  const handleIntroDone = () => { setPhase('step'); };
  const handleTransitionDone = () => { setPhase('step'); };
  const handleOutroDone = () => {
    if (pendingComplete) {
      setJustCompleted(pendingComplete.snapshot);
      advancePathStep(pendingComplete.reason);
      setPendingComplete(null);
    }
  };

  /* Boton de salida: si el paso es opcional, salir directo; si no, confirmar */
  const handleRequestExit = () => {
    if (step.optional) {
      abandonPath();
    } else {
      setConfirmExit(true);
    }
  };

  const displayPathName = t(path.nameKey) || cur.id;
  const senderoBlocks = path.steps.map(function(s, idx) {
    return {
      id: s.kind + '-' + idx,
      name: t('paths.kind.' + s.kind + '.name') || s.kind,
    };
  });

  /* Para StepIntro: durante phase='transition', cur.stepIndex YA refleja
     el destino (advancePathStep ya se llamo). El kind del titulo y el
     hito current son ambos del step actual. */
  const transitionKindName = t('paths.kind.' + step.kind + '.name') || step.kind;

  return (
    <div
      className="path-runner-overlay"
      role="dialog"
      aria-modal="true"
      aria-label={displayPathName}
    >
      {/* Step activo: TopBar + body del paso.
          Solo renderizamos esta capa cuando phase==='step' para evitar
          montar el step mientras hay una card encima (decision 9:
          StepIntro es bloqueante). La SenderoBar sticky se elimino en
          s77b -- la lectura del progreso vive ahora en las
          TransitionCards entre pantallas, no superpuesta al ejercicio. */}
      {phase === 'step' && (
        <>
          <PathTopBar
            pathName={displayPathName}
            onRequestExit={handleRequestExit}
          />
          <div className="path-step-body">
            {step.kind === 'breathe' && (
              <PathBreatheStep step={step} onExit={handleStepExit} />
            )}
            {step.kind === 'focus' && (
              <PathFocusStep step={step} onExit={handleStepExit} />
            )}
            {step.kind === 'body' && (
              <PathBodyStep step={step} onExit={handleStepExit} />
            )}
            {step.kind === 'hydrate' && (
              <PathHydrateStep step={step} onExit={handleStepExit} />
            )}
          </div>
        </>
      )}

      {/* Cards de transicion (s77). Posicionadas absolutas dentro del overlay.
          Guard "typeof X === 'function'" cubre el caso de carga lenta (mismo
          patron defensivo que SenderoBar/TimerDial). */}
      {phase === 'intro' && typeof IntroCard === 'function' && (
        <IntroCard
          pathName={displayPathName}
          blocks={senderoBlocks}
          onContinue={handleIntroDone}
        />
      )}
      {phase === 'transition' && typeof StepIntro === 'function' && (
        <StepIntro
          kindName={transitionKindName}
          blocks={senderoBlocks}
          currentIndex={cur.stepIndex}
          onContinue={handleTransitionDone}
        />
      )}
      {phase === 'outro' && typeof OutroCard === 'function' && (
        <OutroCard
          pathName={displayPathName}
          blocks={senderoBlocks}

  useEffectMain(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 't' || e.key === 'T') setOpenTweaks(o => !o);
      if (e.key === 's' || e.key === 'S') setOpenStats(o => !o);
      if (e.key === 'l' || e.key === 'L') setOpenAchievements(o => !o);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Handle start de una rutina
  const handleStartBreathe = (routine) => {
    if (routine.safety) {
      setSafetyRoutine(routine);
      setOpenLibrary(null);
    } else {
      setOpenLibrary(null);
      setView({ type: 'breathe-session', routine });
    }
  };

  const handleStartMove = (routine) => {
    setOpenLibrary(null);
    setView({ type: 'move-session', routine });
  };
  const handleStartExtra = (routine) => {
    setOpenLibrary(null);
    // Reutiliza MoveSession pero marca kind='extra' para que la completion
    // dispare completeExtraSession (logros correctos, plan.extra, no plan.muevete).
    setView({ type: 'move-session', routine, kind: 'extra' });
  };

  const handleFocusFinish = () => {
    // Al acabar un Pomodoro → menú pausa
    setOpenBreakMenu(true);
  };

  const handleBreakChoice = (choice) => {
    setOpenBreakMenu(false);
    if (choice === 'breathe') setOpenLibrary('breathe');
    else if (choice === 'move') setOpenLibrary('move');
    else if (choice === 'water') setOpenHydrate(true);
  };

  return (
    /* NOTA sesión 23: `height` y `maxHeight` se delegan al bloque CSS
       inyectado [data-pace-app-root] (ahora en app/main/_responsive.js).
       Permite fallback vh → override dvh que los objetos de estilos
       inline no pueden expresar (una sola key por propiedad). El resto
       de estilos (display, overflow, background, position) se quedan
       inline porque no necesitan fallback cascada. */
    <div data-pace-app-root style={{
      display: 'flex',
      overflow: 'hidden',
      background: 'var(--paper)',
      position: 'relative',
    }}>
      {/* SIDEBAR */}
      {state.layout !== 'minimal' && <Sidebar />}

      {/* Handle flotante para re-abrir sidebar cuando está oculto
          (aparece sólo en layout con sidebar y cuando está colapsado).
          En móvil (≤768px) el CSS lo amplía a 44×44 (hit target
          accesible) — ver app/main/_responsive.js. */}
      {state.layout !== 'minimal' && state.sidebarCollapsed && (
        <button
          data-pace-sidebar-open
          onClick={() => set({ sidebarCollapsed: false })}
          title={t('sidebar.open.title')}
          aria-label={t('sidebar.open.aria')}
          style={{
            position: 'fixed', top: 16, left: 14, zIndex: 50,
            width: 30, height: 30, borderRadius: 6,
            display: 'grid', placeItems: 'center',
            background: 'transparent', border: '1px solid transparent',
            color: 'var(--ink-3)', transition: 'all 180ms',
          }}
          onMouseEnter={(e) => { e.currentTarget.style.color = 'var(--ink)'; e.currentTarget.style.background = 'var(--paper-2)'; e.currentTarget.style.borderColor = 'var(--line)'; }}
          onMouseLeave={(e) => { e.currentTarget.style.color = 'var(--ink-3)'; e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = 'transparent'; }}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <line x1="4" y1="7" x2="20" y2="7" />
            <line x1="4" y1="12" x2="14" y2="12" />
            <line x1="4" y1="17" x2="20" y2="17" />
          </svg>
        </button>
      )}

      {/* MAIN AREA */}
      <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, height: '100%', overflow: 'hidden' }}>
        {/* Top bar */}
        <TopBar
          onOpenLibrary={(kind) => setOpenLibrary(kind)}
          onOpenHydrate={() => setOpenHydrate(true)}
          onOpenStats={() => setOpenStats(true)}
          onOpenTweaks={() => setOpenTweaks(true)}
        />

        {/* Content */}
        <div data-pace-main-content style={{
          flex: 1,
          display: 'grid',
          placeItems: 'center',
          padding: '10px 40px',
          minHeight: 0,
          overflow: 'hidden',
        }}>
          <FocusTimer onFinish={handleFocusFinish} />
        </div>

        {/* Actividades footer */}
        <ActivityBar
          onOpenLibrary={(kind) => setOpenLibrary(kind)}
          onOpenHydrate={() => setOpenHydrate(true)}
        />

        {/* Camino sugerido del momento (sesion 51) */}
        <SuggestedPathCard />
      </main>

      {/* ========== MODALS ========== */}
      <BreatheLibrary
        open={openLibrary === 'breathe'}
        onClose={() => setOpenLibrary(null)}
        onStart={handleStartBreathe}
      />
      <MoveLibrary
        open={openLibrary === 'move' && !customBuilder}
        onClose={() => setOpenLibrary(null)}
        onStart={handleStartMove}
      />
      {customBuilder && (
        <CustomBuilder editId={customBuilder.id} onClose={() => setCustomBuilder(null)} />
      )}
      <ExtraLibrary
        open={openLibrary === 'extra'}
        onClose={() => setOpenLibrary(null)}
        onStart={handleStartExtra}
      />
      <HydrateTracker open={openHydrate} onClose={() => setOpenHydrate(false)} />
      <Achievements open={openAchievements} onClose={() => setOpenAchievements(false)} />
      <StatsPanel open={openStats} onClose={() => setOpenStats(false)} />
      <TweaksPanel open={openTweaks} onClose={() => setOpenTweaks(false)} />
      <BreakMenu
        open={openBreakMenu}
        onClose={() => setOpenBreakMenu(false)}
        onChoose={handleBreakChoice}
      />
      <SupportModal open={openSupport} onClose={() => setOpenSupport(false)} />
      <WelcomeModal open={openWelcome} onClose={() => setOpenWelcome(false)} />

      {/* Observador de tweak-secrets — monta siempre, retorna null.
          Desbloquea secret.aged / dark.mode / mono / seal / illustrated
          en función del state actual. Ver TweaksPanel.jsx. */}
      <TweakSecretsWatcher />

      {safetyRoutine && (
        <BreatheSafety
          routine={safetyRoutine}
          onAccept={(r) => { setSafetyRoutine(null); setView({ type: 'breathe-session', routine: r }); }}
          onCancel={() => setSafetyRoutine(null)}
        />
      )}

      {/* ========== SESSION FULLSCREEN ==========
          NOTA (#29): los <Session/> llaman `onExit('exit')` vs `onExit('done')`
          para diferenciar salida voluntaria de finalización completa. Hoy
          ambos caminos van a home y el argumento se descarta intencionalmente;
          se conserva la señal en la API para un futuro consumidor (p.ej.
          micro-animación de despedida distinta, o métrica de abandono). */}
      {view.type === 'breathe-session' && (
        <BreatheSession routine={view.routine} onExit={(_reason) => setView({ type: 'home' })} />
      )}
      {view.type === 'move-session' && (
        <MoveSession routine={view.routine} kind={view.kind || 'move'} onExit={(_reason) => setView({ type: 'home' })} />
      )}

      {/* ========== CAMINOS ========== */}
      <PathRunner />
      <PathsLibrary />

      {/* ========== TOASTS ========== */}
      <ToastHost />
    </div>
  );
}

Object.assign(window, { PaceApp });

/* ARRANQUE DIRECTO (sólo si existe #pace-root en DOM — entry point standalone).
   En el entry point modular PACE.html el montaje lo hace el script de abajo en #root. */
if (typeof document !== 'undefined' && document.getElementById('pace-root')) {
  const root = ReactDOM.createRoot(document.getElementById('pace-root'));
  root.render(<PaceApp />);
}

</script>

  <!-- Monta la app
       Los <script type="text/babel" src> se fetchean y compilan async,
       así que esperamos al evento `DOMContentLoaded` de Babel antes de montar.
  -->
  <script type="text/babel" data-presets="env,react">
    /* Mount loop — espera a que TODOS los scripts Babel estén compilados.
       Los <script type="text/babel" src> se fetchean en paralelo y pueden
       evaluar en orden no garantizado: PaceApp puede estar lista antes que
       BreakMenu, TweaksPanel o BreatheSession, provocando crashes en la
       primera apertura de esas pantallas ("Element type is invalid: undefined").
       Fix sesion 38b: comprobar los componentes criticos del arbol completo,
       no solo PaceApp. Timeout ampliado a 5 s para cargas lentas / CDN frio. */
    function mount(tries) {
      tries = tries || 0;
      var container = document.getElementById('root');
      var allReady = (
        typeof PaceApp          === 'function' &&
        typeof BreakMenu        === 'function' &&
        typeof TweaksPanel      === 'function' &&
        typeof BreatheSession   === 'function' &&
        typeof MoveSession      === 'function' &&
        typeof ToastHost        === 'function'
      );
      if (container && allReady) {
        var root = ReactDOM.createRoot(container);
        root.render(<PaceApp />);
      } else if (tries < 100) {
        setTimeout(function() { mount(tries + 1); }, 50);
      } else {
        console.error('PACE - Componentes no cargaron en 5 s. Comprueba la red.');
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() { mount(); });
    } else {
      mount();
    }
  </script>

  <!-- PWA · Service Worker (sesión 37 · v0.19.0) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function() {});
      });
    }
  </script>
</body>
</html>
