  <title>PACE · Foco · Cuerpo</title>
  <style>/* ============================================
   PACE · Design Tokens
   Cambios aquí se reflejan en toda la app.
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter+Tight:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* PALETA · Crema día (default) */
  --paper: #F2EDE0;
  --paper-2: #EAE4D4;
  --paper-3: #DFD8C4;
  --ink: #1F1C17;
  --ink-2: #4A453C;
  --ink-3: #8A8372;
  --line: #C9C0A8;
  --line-2: #B8AD8E;

  --focus: #3E5A3A;
  --focus-2: #2A3E27;
  --focus-soft: rgba(62, 90, 58, 0.10);

  --breathe: #C97A5D;
  --breathe-2: #A85E43;
  --breathe-soft: rgba(201, 122, 93, 0.12);

  --move: #9A7B4F;
  --move-soft: rgba(154, 123, 79, 0.12);

  --extra: #6B7A8F;
  --extra-soft: rgba(107, 122, 143, 0.12);

  --hydrate: #5F8A9B;
  --hydrate-soft: rgba(95, 138, 155, 0.12);

  --achievement: #B8934A;
  --achievement-soft: rgba(184, 147, 74, 0.12);

  /* TIPOGRAFÍA */
  --font-display: 'EB Garamond', 'Cormorant Garamond', Georgia, serif;
  --font-ui: 'Inter Tight', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  --size-hero: clamp(96px, 12vw, 180px);
  --size-h1: 40px;
  --size-h2: 28px;
  --size-h3: 20px;
  --size-body: 15px;
  --size-sm: 13px;
  --size-meta: 11px;

  --lh-tight: 1.1;
  --lh-normal: 1.45;
  --lh-relaxed: 1.65;

  --track-meta: 0.14em;
  --track-tag: 0.08em;

  /* ESPACIADO */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --s-7: 48px;
  --s-8: 64px;
  --s-9: 96px;

  /* RADIUS */
  --r-xs: 4px;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 20px;
  --r-pill: 999px;

  /* SHADOWS */
  --sh-soft: 0 1px 2px rgba(31, 28, 23, 0.06), 0 4px 16px rgba(31, 28, 23, 0.04);
  --sh-card: 0 1px 3px rgba(31, 28, 23, 0.05), 0 8px 24px rgba(31, 28, 23, 0.06);
  --sh-modal: 0 8px 40px rgba(31, 28, 23, 0.18);

  /* MISC */
  --dur-quick: 180ms;
  --dur-normal: 320ms;
  --dur-slow: 640ms;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

/* PALETA · Oscuro noche */
[data-palette="oscuro"] {
  --paper: #1A1814;
  --paper-2: #252119;
  --paper-3: #302B21;
  --ink: #EDE5D3;
  --ink-2: #B8AF9A;
  --ink-3: #756D5D;
  --line: #3C3628;
  --line-2: #4E4735;
  --focus: #7A9A6D;
  --focus-2: #98B58B;
  --focus-soft: rgba(122, 154, 109, 0.12);
  --breathe: #D99477;
  --breathe-2: #E8A98F;
  --breathe-soft: rgba(217, 148, 119, 0.14);
}

/* PALETA · Papel envejecido */
[data-palette="envejecido"] {
  --paper: #EDE2C8;
  --paper-2: #E3D6B6;
  --paper-3: #D6C8A3;
  --ink: #2B241A;
  --ink-2: #5A4F3C;
  --ink-3: #8F826A;
  --line: #BEAF8C;
  --focus: #56663E;
  --breathe: #B86A4D;
}

/* TIPOGRAFÍAS ALT */
[data-font="cormorant"] {
  --font-display: 'Cormorant Garamond', Georgia, serif;
}
[data-font="mono"] {
  --font-display: 'JetBrains Mono', ui-monospace, monospace;
  --font-ui: 'JetBrains Mono', ui-monospace, monospace;
}

/* RESET MÍNIMO */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  font-size: var(--size-body);
  line-height: var(--lh-normal);
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  transition: background-color var(--dur-normal) var(--ease), color var(--dur-normal) var(--ease);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, textarea { font-family: inherit; color: inherit; }

/* UTILIDADES */
.pace-display { font-family: var(--font-display); }
.pace-display-italic { font-family: var(--font-display); font-style: italic; }
.pace-meta {
  font-size: var(--size-meta);
  letter-spacing: var(--track-meta);
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.pace-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  font-size: 10px;
  letter-spacing: var(--track-tag);
  text-transform: uppercase;
  border-radius: var(--r-pill);
  border: 1px solid currentColor;
  font-weight: 500;
}

/* SCROLLBAR SUTIL */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; border: 3px solid var(--paper); }
::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

/* FOCUS ACCESIBLE */
:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
  border-radius: var(--r-xs);
}

/* REDUCED MOTION */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

  <!-- State global (antes de todo) -->
  <script type="text/babel" data-presets="react">/* PACE · Estado global
   Simple store con useSyncExternalStore + localStorage
*/

const { useSyncExternalStore, useCallback } = React;

const LS_KEY = 'pace.state.v1';

const defaultState = {
  // Settings / Tweaks
  palette: 'crema',           // crema | oscuro | envejecido
  font: 'cormorant',          // garamond | cormorant | mono
  layout: 'sidebar',          // sidebar | minimal | editorial
  timerStyle: 'aro',          // numero | circulo | barra | analogico | aro (híbrido círculo+barra)
  breathStyle: 'flor',        // pulso | ondas | petalo | organico | flor (híbrido pulso+pétalo)
  logoVariant: 'lineal',      // lineal | sello | ilustrado
  soundOn: false,

  // Foco
  focusMode: 'foco',          // foco | pausa | larga
  focusMinutes: 25,           // 15 | 25 | 35 | 45
  cycle: 0,                   // Pomodoros completados hoy
  totalFocusMin: 0,           // minutos totales acumulados

  // Plan del día
  plan: {
    muevete: false,
    respira: false,
    extra: false,
    hidratate: false,
  },

  // Hidratación
  water: { goal: 8, today: 0, lastReset: null },

  // Logros
  achievements: {},           // { [id]: { unlockedAt } }

  // Stats semanales
  weeklyStats: {
    focusMinutes: [0,0,0,0,0,0,0],
    breathMinutes: [0,0,0,0,0,0,0],
    moveMinutes: [0,0,0,0,0,0,0],
    waterGlasses: [0,0,0,0,0,0,0],
  },

  // Streak
  streak: { current: 0, longest: 0, lastActiveDate: null },

  // Intención del día
  intention: '',

  // Recordatorios
  reminders: [],
};

let _state = loadState();
const _listeners = new Set();

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return { ...defaultState };
    const parsed = JSON.parse(raw);
    return { ...defaultState, ...parsed };
  } catch (e) {
    return { ...defaultState };
  }
}

function persistState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(_state)); } catch (e) {}
}

function getState() { return _state; }

function setState(patch) {
  _state = typeof patch === 'function' ? patch(_state) : { ...(_state), ...patch };
  persistState();
  _listeners.forEach(l => l());
  // Aplicar tokens visuales
  applyTheme();
}

function subscribe(listener) {
  _listeners.add(listener);
  return () => _listeners.delete(listener);
}

function applyTheme() {
  const root = document.documentElement;
  root.setAttribute('data-palette', _state.palette);
  root.setAttribute('data-font', _state.font);
}

function usePace() {
  const state = useSyncExternalStore(subscribe, getState);
  return [state, setState];
}

/* ============================
   ACCIONES ESPECÍFICAS
   ============================ */

function unlockAchievement(id, note) {
  const s = getState();
  if (s.achievements[id]) return false;
  setState({
    achievements: { ...s.achievements, [id]: { unlockedAt: Date.now(), note } }
  });
  // Notificación flotante
  showToast({ id, type: 'achievement' });
  return true;
}

function addFocusMinutes(mins) {
  const s = getState();
  const day = new Date().getDay();
  const week = [...s.weeklyStats.focusMinutes];
  week[day] += mins;
  setState({
    totalFocusMin: s.totalFocusMin + mins,
    weeklyStats: { ...s.weeklyStats, focusMinutes: week },
  });
  // Logros por horas de foco
  const h = (s.totalFocusMin + mins) / 60;
  if (h >= 10) unlockAchievement('focus.hours.10');
  if (h >= 50) unlockAchievement('focus.hours.50');
  if (h >= 100) unlockAchievement('focus.hours.100');
}

function completePomodoro() {
  const s = getState();
  setState({ cycle: s.cycle + 1 });
  addFocusMinutes(s.focusMinutes);
  unlockAchievement('first.step');
  if (s.cycle + 1 >= 8) unlockAchievement('master.pomodoro.8');
  updateStreak();
}

function completeBreathSession(routineId, durationMin) {
  const s = getState();
  const day = new Date().getDay();
  const week = [...s.weeklyStats.breathMinutes];
  week[day] += durationMin;
  setState({
    plan: { ...s.plan, respira: true },
    weeklyStats: { ...s.weeklyStats, breathMinutes: week },
  });
  unlockAchievement('first.breath');
  // Exploración
  const explorationMap = {
    'breathe.box.4': 'explore.box',
    'breathe.box.6': 'explore.box',
    'breathe.478': 'explore.478',
    'breathe.coherent.55': 'explore.coherent',
    'breathe.coherent.66': 'explore.coherent',
    'breathe.rounds.full': 'explore.rounds',
    'breathe.rounds.express': 'explore.rounds',
    'breathe.bellows': 'explore.bhastrika',
    'breathe.nadi.shodhana': 'explore.nadi',
    'breathe.ujjayi': 'explore.ujjayi',
    'breathe.kapalabhati': 'explore.kapalabhati',
    'breathe.physiological': 'explore.physiological',
  };
  if (explorationMap[routineId]) unlockAchievement(explorationMap[routineId]);
  updateStreak();
}

function completeMoveSession(routineId, durationMin) {
  const s = getState();
  const day = new Date().getDay();
  const week = [...s.weeklyStats.moveMinutes];
  week[day] += durationMin;
  setState({
    plan: { ...s.plan, muevete: true },
    weeklyStats: { ...s.weeklyStats, moveMinutes: week },
  });
  unlockAchievement('first.stretch');
  const map = {
    'move.hips.5': 'explore.hips',
    'move.shoulders.5': 'explore.shoulders',
    'move.atg.knees': 'explore.atg',
    'move.ancestral': 'explore.ancestral',
    'move.neck.3': 'explore.neck',
    'move.desk.quick': 'explore.desk',
  };
  if (map[routineId]) unlockAchievement(map[routineId]);
  updateStreak();
}

function completeExtraSession() {
  setState(s => ({ plan: { ...s.plan, extra: true } }));
  unlockAchievement('first.extra');
  updateStreak();
}

function addWaterGlass(delta = 1) {
  const s = getState();
  const day = new Date().getDay();
  const week = [...s.weeklyStats.waterGlasses];
  week[day] = Math.max(0, (week[day] || 0) + delta);
  const next = Math.max(0, s.water.today + delta);
  setState({
    water: { ...s.water, today: next },
    plan: { ...s.plan, hidratate: next > 0 ? true : s.plan.hidratate },
    weeklyStats: { ...s.weeklyStats, waterGlasses: week },
  });
  if (delta > 0) unlockAchievement('first.sip');
}

function updateStreak() {
  const s = getState();
  const today = new Date().toDateString();
  const last = s.streak.lastActiveDate;
  if (last === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  let current = s.streak.current;
  if (last === yesterday) current += 1;
  else current = 1;
  const longest = Math.max(s.streak.longest, current);
  setState({
    streak: { current, longest, lastActiveDate: today }
  });
  if (current >= 3) unlockAchievement('streak.3');
  if (current >= 7) unlockAchievement('streak.7');
  if (current >= 30) unlockAchievement('streak.30');
  if (current >= 100) unlockAchievement('streak.100');
}

/* TOAST NOTIFICATIONS */
const _toastListeners = new Set();
function showToast(toast) {
  const t = { ...toast, _id: Date.now() + Math.random() };
  _toastListeners.forEach(l => l(t));
}
function onToast(listener) {
  _toastListeners.add(listener);
  return () => _toastListeners.delete(listener);
}

// Init theme on load
applyTheme();

Object.assign(window, {
  usePace, getState, setState, subscribe,
  unlockAchievement, completePomodoro,
  completeBreathSession, completeMoveSession, completeExtraSession,
  addWaterGlass, addFocusMinutes, updateStreak,
  showToast, onToast,
});
</script>

  <!-- UI primitivos -->
  <script type="text/babel" data-presets="react">/* PACE · Primitivos UI compartidos
   Modal, Card, Tag, Button, Divider, Meta
*/

const { useEffect } = React;

function Modal({ open, onClose, children, maxWidth = 680, tagLabel, title, subtitle }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  if (!open) return null;

  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0,
        background: 'rgba(31, 28, 23, 0.28)',
        backdropFilter: 'blur(3px)',
        zIndex: 100,
        display: 'grid',
        placeItems: 'center',
        padding: 24,
        animation: 'pace-fade-in 200ms ease',
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          background: 'var(--paper)',
          borderRadius: 'var(--r-lg)',
          boxShadow: 'var(--sh-modal)',
          padding: 'var(--s-6)',
          maxWidth, width: '100%',
          maxHeight: '85vh',
          overflowY: 'auto',
          position: 'relative',
          border: '1px solid var(--line)',
          animation: 'pace-slide-up 280ms var(--ease)',
        }}
      >
        {onClose && (
          <button
            onClick={onClose}
            aria-label="Cerrar"
            style={{
              position: 'absolute', top: 18, right: 20,
              fontSize: 20, color: 'var(--ink-3)',
              width: 28, height: 28,
              display: 'grid', placeItems: 'center',
              borderRadius: 'var(--r-sm)',
              transition: 'color 160ms',
            }}
            onMouseEnter={(e) => e.currentTarget.style.color = 'var(--ink)'}
            onMouseLeave={(e) => e.currentTarget.style.color = 'var(--ink-3)'}
          >×</button>
        )}
        {(tagLabel || title) && (
          <div style={{ marginBottom: 'var(--s-5)' }}>
            {tagLabel && <div className="pace-meta" style={{ marginBottom: 6 }}>{tagLabel}</div>}
            {title && <h2 style={{
              fontFamily: 'var(--font-display)',
              fontStyle: 'italic',
              fontSize: 32, fontWeight: 500, margin: 0, lineHeight: 1.1
            }}>{title}</h2>}
            {subtitle && <p style={{
              color: 'var(--ink-3)', fontSize: 14, margin: '6px 0 0', maxWidth: '90%'
            }}>{subtitle}</p>}
          </div>
        )}
        {children}
      </div>
    </div>
  );
}

function Card({ children, onClick, accent, padded = true, style = {} }) {
  const base = {
    background: 'var(--paper)',
    border: '1px solid var(--line)',
    borderRadius: 'var(--r-md)',
    padding: padded ? 'var(--s-5)' : 0,
    transition: 'all 220ms var(--ease)',
    cursor: onClick ? 'pointer' : 'default',
    position: 'relative',
    ...style,
  };
  return (
    <div
      onClick={onClick}
      style={base}
      onMouseEnter={onClick ? (e) => {
        e.currentTarget.style.borderColor = accent || 'var(--ink-2)';
        e.currentTarget.style.transform = 'translateY(-1px)';
        e.currentTarget.style.boxShadow = 'var(--sh-soft)';
      } : undefined}
      onMouseLeave={onClick ? (e) => {
        e.currentTarget.style.borderColor = 'var(--line)';
        e.currentTarget.style.transform = 'translateY(0)';
        e.currentTarget.style.boxShadow = 'none';
      } : undefined}
    >{children}</div>
  );
}

function Tag({ children, color = 'var(--ink-2)', muted = false }) {
  return (
    <span style={{
      display: 'inline-flex',
      padding: '3px 10px',
      fontSize: 10,
      letterSpacing: '0.12em',
      textTransform: 'uppercase',
      borderRadius: 'var(--r-pill)',
      border: `1px solid ${muted ? 'var(--line)' : color}`,
      color: muted ? 'var(--ink-3)' : color,
      fontWeight: 500,
      background: 'transparent',
    }}>{children}</span>
  );
}

function Button({ children, onClick, variant = 'primary', size = 'md', icon, disabled, style = {}, type = 'button' }) {
  const sizes = {
    sm: { padding: '6px 14px', fontSize: 13, height: 32 },
    md: { padding: '10px 22px', fontSize: 14, height: 42 },
    lg: { padding: '14px 28px', fontSize: 15, height: 52 },
  };
  const variants = {
    primary: {
      background: 'var(--focus)',
      color: 'var(--paper)',
      border: '1px solid var(--focus)',
    },
    secondary: {
      background: 'transparent',
      color: 'var(--ink)',
      border: '1px solid var(--line-2)',
    },
    ghost: {
      background: 'transparent',
      color: 'var(--ink-2)',
      border: '1px solid transparent',
    },
    terracota: {
      background: 'var(--breathe)',
      color: 'var(--paper)',
      border: '1px solid var(--breathe)',
    },
  };
  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      style={{
        ...sizes[size],
        ...variants[variant],
        borderRadius: 'var(--r-md)',
        fontWeight: 500,
        letterSpacing: 0.2,
        display: 'inline-flex',
        alignItems: 'center',
        gap: 8,
        transition: 'all 180ms var(--ease)',
        opacity: disabled ? 0.4 : 1,
        cursor: disabled ? 'not-allowed' : 'pointer',
        ...style,
      }}
      onMouseEnter={(e) => {
        if (disabled) return;
        if (variant === 'primary') e.currentTarget.style.background = 'var(--focus-2)';
        if (variant === 'secondary') e.currentTarget.style.background = 'var(--paper-2)';
        if (variant === 'ghost') e.currentTarget.style.background = 'var(--paper-2)';
        if (variant === 'terracota') e.currentTarget.style.background = 'var(--breathe-2)';
      }}
      onMouseLeave={(e) => {
        if (disabled) return;
        if (variant === 'primary') e.currentTarget.style.background = 'var(--focus)';
        if (variant === 'secondary') e.currentTarget.style.background = 'transparent';
        if (variant === 'ghost') e.currentTarget.style.background = 'transparent';
        if (variant === 'terracota') e.currentTarget.style.background = 'var(--breathe)';
      }}
    >
      {icon && <span style={{ fontSize: 12 }}>{icon}</span>}
      {children}
    </button>
  );
}

function Divider({ label, style = {} }) {
  if (label) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, color: 'var(--ink-3)', ...style }}>
        <span style={{ flex: 1, height: 1, background: 'var(--line)' }} />
        <span className="pace-meta" style={{ fontSize: 10 }}>{label}</span>
        <span style={{ flex: 1, height: 1, background: 'var(--line)' }} />
      </div>
    );
  }
  return <div style={{ height: 1, background: 'var(--line)', ...style }} />;
}

function Meta({ children, style = {} }) {
  return <div className="pace-meta" style={style}>{children}</div>;
}

/* Animaciones globales */
const _paceAnimStyle = document.getElementById('pace-anim');
if (!_paceAnimStyle) {
  const s = document.createElement('style');
  s.id = 'pace-anim';
  s.textContent = `
    @keyframes pace-fade-in { from { opacity: 0 } to { opacity: 1 } }
    @keyframes pace-slide-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

const { useState: useStateTO, useEffect: useEffectTO } = React;

function ToastHost() {
  const [toasts, setToasts] = useStateTO([]);

  useEffectTO(() => {
    return onToast((t) => {
      // Resolver datos del logro
      if (t.type === 'achievement') {
        const a = (window.ACHIEVEMENT_CATALOG || []).find(x => x.id === t.id);
        if (!a) return;
        const full = { ...t, title: a.title, desc: a.desc, glyph: a.glyph };
        setToasts(prev => [...prev, full]);
        setTimeout(() => {
          setToasts(prev => prev.filter(x => x._id !== full._id));
        }, 5000);
      }
    });

  <script type="text/babel" data-presets="react">/* PACE · Módulo Foco (Pomodoro)
   Temporizador funcional real. 4 estilos visuales de tweaks.
*/

const { useState: useStateFT, useEffect: useEffectFT, useRef: useRefFT } = React;

function FocusTimer({ onFinish }) {
  const [state, set] = usePace();
  const [running, setRunning] = useStateFT(false);
  const [remainingSec, setRemainingSec] = useStateFT(state.focusMinutes * 60);
  const [justFinished, setJustFinished] = useStateFT(false);
  const intervalRef = useRefFT(null);

  // Reset si cambian minutos o modo
  useEffectFT(() => {
    const baseMin = state.focusMode === 'foco' ? state.focusMinutes
                  : state.focusMode === 'pausa' ? 5
                  : 15;
    setRemainingSec(baseMin * 60);
    setRunning(false);
    setJustFinished(false);
  }, [state.focusMode, state.focusMinutes]);

  useEffectFT(() => {
    if (!running) {
      if (intervalRef.current) { clearInterval(intervalRef.current); intervalRef.current = null; }
      return;
    }
    intervalRef.current = setInterval(() => {
      setRemainingSec(s => {
        if (s <= 1) {
          clearInterval(intervalRef.current);
          setRunning(false);
          setJustFinished(true);
          if (state.focusMode === 'foco') {
            completePomodoro();
            onFinish && onFinish();
          }
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
  }, [running]);

  const mins = Math.floor(remainingSec / 60);
  const secs = remainingSec % 60;
  const totalSec = (state.focusMode === 'foco' ? state.focusMinutes : state.focusMode === 'pausa' ? 5 : 15) * 60;
  const progress = 1 - (remainingSec / totalSec);

  const modeLabel = state.focusMode === 'foco' ? 'Foco'
                  : state.focusMode === 'pausa' ? 'Pausa corta'
                  : 'Pausa larga';
  const subtitle = state.focusMode === 'foco' ? 'Concentración profunda'
                 : state.focusMode === 'pausa' ? 'Desconecta 5 min'
                 : 'Pausa larga · estira y respira';

  const reset = () => {
    setRunning(false);
    setJustFinished(false);
    const baseMin = state.focusMode === 'foco' ? state.focusMinutes : state.focusMode === 'pausa' ? 5 : 15;
    setRemainingSec(baseMin * 60);
  };

  return (
    <div style={focusStyles.root}>
      {/* Selector modo */}
      <div style={focusStyles.modeRow}>
        <ModeToggle value={state.focusMode} onChange={(v) => set({ focusMode: v })} />
      </div>

      {/* Selector minutos */}
      {state.focusMode === 'foco' && (
        <MinutesPicker value={state.focusMinutes} onChange={(v) => set({ focusMinutes: v })} />
      )}

      {/* Visualización */}
      <div style={focusStyles.timerWrap}>
        <TimerVisualization
          style={state.timerStyle}
          mins={mins}
          secs={secs}
          progress={progress}
          mode={state.focusMode}
          modeLabel={modeLabel}
          subtitle={subtitle}
        />
      </div>

      {/* Controles */}
      <div style={focusStyles.controls}>
        <Button
          variant={running ? 'secondary' : 'primary'}
          size="lg"
          onClick={() => setRunning(r => !r)}
          icon={running ? '❚❚' : '▶'}
        >
          {running ? 'Pausar' : (remainingSec === totalSec ? 'Comenzar' : 'Continuar')}
        </Button>
        <button onClick={reset} style={focusStyles.resetBtn} title="Reiniciar">
          <span style={{ fontSize: 18 }}>↻</span>
        </button>
      </div>

      {/* Dots de ciclo */}
      <div style={focusStyles.cycleDots}>
        {[0,1,2,3].map(i => (
          <span key={i} style={{
            width: 4, height: 4, borderRadius: '50%',
            background: (state.cycle % 4) > i ? 'var(--focus)' : 'var(--line-2)',
          }} />
        ))}
        <span style={{ fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-3)', marginLeft: 10 }}>Ciclo</span>
      </div>
    </div>
  );
}

/* ===================== */
/* MODE TOGGLE */
/* ===================== */
function ModeToggle({ value, onChange }) {

    { v: 'foco', label: 'Foco' },

            textTransform: 'uppercase',

}

/* ===================== */
/* MINUTES PICKER */
/* ===================== */
function MinutesPicker({ value, onChange }) {
  const options = [15, 25, 35, 45];

            transition: 'all 180ms',

}

/* ===================== */
/* TIMER VISUALIZATIONS */
/* ===================== */
function TimerVisualization({ style, mins, secs, progress, mode, modeLabel, subtitle }) {
  if (style === 'aro') return <TimerAro mins={mins} secs={secs} progress={progress} modeLabel={modeLabel} subtitle={subtitle} />;
  if (style === 'circulo') return <TimerCircle mins={mins} secs={secs} progress={progress} modeLabel={modeLabel} subtitle={subtitle} />;
  if (style === 'barra') return <TimerBar mins={mins} secs={secs} progress={progress} modeLabel={modeLabel} subtitle={subtitle} />;
  if (style === 'analogico') return <TimerAnalog mins={mins} secs={secs} progress={progress} modeLabel={modeLabel} subtitle={subtitle} />;
  return <TimerNumber mins={mins} secs={secs} progress={progress} modeLabel={modeLabel} subtitle={subtitle} />;
}

/* Timer "Aro" — híbrido entre círculo y barra.
   Doble anillo sutil + arco de progreso grueso + micro-barra inferior.
   Pensado para sentir avance tanto radial como lineal. */
function TimerAro({ mins, secs, progress, modeLabel, subtitle }) {
  const R = 45;
  const C = 2 * Math.PI * R;
  return (
    <div style={{ position: 'relative', width: 440, height: 440, display: 'grid', placeItems: 'center' }}>
      <svg viewBox="0 0 100 100" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', transform: 'rotate(-90deg)' }}>
        {/* Anillo exterior finísimo */}
        <circle cx="50" cy="50" r="48" fill="none" stroke="var(--line)" strokeWidth="0.3" />
        {/* Pista del progreso */}
        <circle cx="50" cy="50" r={R} fill="none" stroke="var(--line)" strokeWidth="1.2" opacity="0.5" />
        {/* Arco de progreso grueso */}
        <circle cx="50" cy="50" r={R} fill="none" stroke="var(--focus)" strokeWidth="2.2"
          strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={C * (1 - progress)}
          style={{ transition: 'stroke-dashoffset 1s linear' }} />
        {/* Punto indicador al final del arco */}
        <circle
          cx={50 + R * Math.cos(progress * 2 * Math.PI - Math.PI / 2)}
          cy={50 + R * Math.sin(progress * 2 * Math.PI - Math.PI / 2)}
          r="1.6" fill="var(--focus)"
          style={{ transition: 'all 1s linear' }}
        />
      </svg>
      <div style={{ textAlign: 'center', zIndex: 1 }}>
        <div style={{ fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 14 }}>{modeLabel}</div>
        <div style={{
          fontFamily: 'var(--font-display)', fontStyle: 'italic',
          fontSize: 108, fontWeight: 400, lineHeight: 0.9,
          fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.03em',
          color: 'var(--ink)',
        }}>{String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}</div>
        <div style={{ fontStyle: 'italic', fontFamily: 'var(--font-display)', fontSize: 14, color: 'var(--ink-3)', marginTop: 14 }}>{subtitle}</div>
        {/* Micro-barra inferior (guiño a la versión "barra") */}
        <div style={{
          width: 140, height: 2, margin: '16px auto 0',
          background: 'var(--line)', borderRadius: 2, overflow: 'hidden',
        }}>
          <div style={{
            width: `${progress * 100}%`, height: '100%',
            background: 'var(--focus)',
            transition: 'width 1s linear',
          }} />
        </div>
      </div>
    </div>
  );
}

function TimerNumber({ mins, secs, progress, modeLabel, subtitle }) {
  return (
    <div style={{ position: 'relative', width: 420, height: 420, display: 'grid', placeItems: 'center' }}>
      {/* Círculo muy sutil */}
      <svg viewBox="0 0 100 100" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
        <circle cx="50" cy="50" r="48" fill="none" stroke="var(--line)" strokeWidth="0.3" />
      </svg>
      <div style={{ textAlign: 'center', zIndex: 1 }}>
        <div style={{ fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 16 }}>{modeLabel}</div>
        <div style={{
          fontFamily: 'var(--font-display)',
          fontStyle: 'italic',
          fontSize: 'var(--size-hero)',
          fontWeight: 400,
          lineHeight: 0.9,
          color: 'var(--ink)',
          fontVariantNumeric: 'tabular-nums',
          letterSpacing: '-0.03em',
        }}>{String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}</div>
        <div style={{ fontStyle: 'italic', fontFamily: 'var(--font-display)', fontSize: 14, color: 'var(--ink-3)', marginTop: 20 }}>{subtitle}</div>
      </div>
    </div>
  );
}

function TimerCircle({ mins, secs, progress, modeLabel, subtitle }) {
  const R = 46;
  const C = 2 * Math.PI * R;
  return (
    <div style={{ position: 'relative', width: 420, height: 420, display: 'grid', placeItems: 'center' }}>
      <svg viewBox="0 0 100 100" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', transform: 'rotate(-90deg)' }}>
        <circle cx="50" cy="50" r={R} fill="none" stroke="var(--line)" strokeWidth="0.6" />
        <circle cx="50" cy="50" r={R} fill="none" stroke="var(--focus)" strokeWidth="1.2"
          strokeDasharray={C} strokeDashoffset={C * (1 - progress)}
          style={{ transition: 'stroke-dashoffset 1s linear' }} />
      </svg>
      <div style={{ textAlign: 'center', zIndex: 1 }}>
        <div style={{ fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 14 }}>{modeLabel}</div>
        <div style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 96, fontWeight: 400, lineHeight: 0.9, fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.03em' }}>

        <div style={{ fontStyle: 'italic', fontFamily: 'var(--font-display)', fontSize: 14, color: 'var(--ink-3)', marginTop: 16 }}>{subtitle}</div>
      </div>
    </div>
  );
}

function TimerBar({ mins, secs, progress, modeLabel, subtitle }) {
  return (
    <div style={{ width: 520, textAlign: 'center' }}>
      <div style={{ fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 24 }}>{modeLabel}</div>
      <div style={{
        fontFamily: 'var(--font-display)', fontStyle: 'italic',
        fontSize: 140, fontWeight: 400, lineHeight: 0.9,
        fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.04em',
        marginBottom: 30,
      }}>{String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}</div>
      <div style={{ height: 2, background: 'var(--line)', borderRadius: 2, position: 'relative', overflow: 'hidden' }}>
        <div style={{
          position: 'absolute', inset: 0,
          width: `${progress * 100}%`,
          background: 'var(--focus)',
          transition: 'width 1s linear',
        }} />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, fontSize: 10, color: 'var(--ink-3)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
        <span>0:00</span>
        <span style={{ fontStyle: 'italic', textTransform: 'none', fontFamily: 'var(--font-display)' }}>{subtitle}</span>
        <span>{Math.floor(progress * 100)}%</span>
      </div>
    </div>
  );
}

function TimerAnalog({ mins, secs, progress, modeLabel, subtitle }) {
  // Reloj analógico con aguja de minutos en base a progress
  const angle = progress * 360;
  return (
    <div style={{ position: 'relative', width: 380, height: 380, display: 'grid', placeItems: 'center' }}>
      <svg viewBox="0 0 100 100" style={{ width: '100%', height: '100%' }}>
        <circle cx="50" cy="50" r="48" fill="var(--paper)" stroke="var(--ink-2)" strokeWidth="0.4" />
        {/* Marcas horarias */}
        {Array.from({ length: 60 }).map((_, i) => {
          const a = (i / 60) * 2 * Math.PI - Math.PI / 2;
          const isMajor = i % 5 === 0;
          const r1 = isMajor ? 42 : 44;
          const r2 = 46;
          return <line key={i}
            x1={50 + r1 * Math.cos(a)} y1={50 + r1 * Math.sin(a)}
            x2={50 + r2 * Math.cos(a)} y2={50 + r2 * Math.sin(a)}
            stroke="var(--ink-2)" strokeWidth={isMajor ? 0.6 : 0.2} />;
        })}
        {/* Aguja */}
        <line x1="50" y1="50"
          x2={50 + 38 * Math.cos((angle - 90) * Math.PI / 180)}
          y2={50 + 38 * Math.sin((angle - 90) * Math.PI / 180)}
          stroke="var(--focus)" strokeWidth="1.2" strokeLinecap="round" />
        <circle cx="50" cy="50" r="1.2" fill="var(--focus)" />
        {/* Texto */}
        <text x="50" y="32" textAnchor="middle" fontSize="3.5" letterSpacing="0.5" fill="var(--ink-3)" style={{ textTransform: 'uppercase' }}>{modeLabel}</text>
        <text x="50" y="72" textAnchor="middle" fontSize="10" fontFamily="EB Garamond" fontStyle="italic" fill="var(--ink)">
          {String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}
        </text>
      </svg>
    </div>
  );
}

const focusStyles = {
  root: {
    display: 'flex',
    flexDirection: 'column',
    alignItems: 'center',
    gap: 20,
    padding: '32px 40px',
    width: '100%',
  },
  modeRow: { marginBottom: 4 },
  timerWrap: {
    display: 'grid', placeItems: 'center',
    margin: '12px 0',
  },
  controls: {
    display: 'flex', alignItems: 'center', gap: 12,

  resetBtn: {
    width: 48, height: 48,
    borderRadius: 'var(--r-md)',

    display: 'grid', placeItems: 'center',
    transition: 'all 180ms',
  },
  cycleDots: {
    display: 'flex', alignItems: 'center', gap: 5,
    marginTop: 4,
  },
};

Object.assign(window, { FocusTimer });

  const [paused, setPaused] = useStateBR(false);
  const startTime = useRefBR(Date.now());
  const sessionStart = useRefBR(Date.now());

  const sequence = getSequence(routine);
  const isRounds = routine.pattern === 'rounds';

  // Preparación: cuenta atrás 3 segundos
  useEffectBR(() => {
    if (stage !== 'prep' || paused) return;
    if (prepCount <= 0) {
      setStage('active');
      startTime.current = Date.now();
      return;
    }
    const t = setTimeout(() => setPrepCount(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [stage, prepCount, paused]);

  // Ticker principal (active)
  useEffectBR(() => {
    if (paused || stage !== 'active') return;
    const intv = setInterval(() => {
      setPhaseTime(t => {
        const cur = sequence[phase];
        if (t + 1 >= cur.duration) {
          const nextPhase = phase + 1;
          if (nextPhase >= sequence.length) {
            handleCycleComplete();
            return 0;
          }
          setPhase(nextPhase);
          return 0;
        }
        return t + 1;
      });
    }, 1000);
    return () => clearInterval(intv);
  }, [phase, paused, routine, stage]);

  // Ticker de retención (hold en rondas)
  useEffectBR(() => {
    if (stage !== 'hold' || paused) return;
    const intv = setInterval(() => {
      setHoldSeconds(s => {
        const next = s + 1;
        // Desbloqueo de logros por apnea
        if (next === 60) unlockAchievement('secret.breath.hold.60');
        if (next === 90) unlockAchievement('secret.breath.hold.90');
        if (next === 120) unlockAchievement('secret.breath.hold.120');
        return next;
      });
    }, 1000);
    return () => clearInterval(intv);
  }, [stage, paused]);

  // Atajos de teclado
  useEffectBR(() => {
    const onKey = (e) => {
      if (e.key === ' ') { e.preventDefault(); setPaused(p => !p); }
      if (e.key === 'Escape') onExit('exit');
      if (e.key === 'Enter' && stage === 'hold') releaseHold();
      if (e.key === 'Enter' && stage === 'done') onExit('done');
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [stage]);

  const handleCycleComplete = () => {
    if (isRounds) {
      if (breathCount < routine.breaths) {
        setBreathCount(b => b + 1);
        setPhase(0);
      } else {
        // Se completaron las N respiraciones → retención
        setStage('hold');
        setHoldSeconds(0);
      }
    } else {
      const elapsed = (Date.now() - startTime.current) / 1000;
      if (elapsed >= routine.min * 60) {
        finish();
      } else {
        setPhase(0);
      }
    }
  };

  const releaseHold = () => {
    // Tras liberar el aire, siguiente ronda o fin
    if (round < routine.rounds) {
      setRound(r => r + 1);
      setBreathCount(1);
      setPhase(0);
      setStage('active');
    } else {
      finish();
    }
  };

  const finish = () => {
    completeBreathSession(routine.id, routine.min);
    setStage('done');
  };

  // ====== RENDER STAGES ======

  // PREPARACIÓN
  if (stage === 'prep') {
    return (
      <div style={sessionStyles.root}>
        <SessionHeader routine={routine} onExit={onExit} extra={null} />
        <div style={sessionStyles.center}>
          <div style={{ textAlign: 'center', maxWidth: 460 }}>
            <div style={{ fontSize: 12, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 18 }}>Prepárate</div>
            <div style={{
              fontFamily: 'var(--font-display)', fontStyle: 'italic',
              fontSize: 200, fontWeight: 400, lineHeight: 0.9,
              color: 'var(--breathe)',
              fontVariantNumeric: 'tabular-nums',
            }}>{prepCount > 0 ? prepCount : '·'}</div>
            <div style={{ fontStyle: 'italic', fontFamily: 'var(--font-display)', fontSize: 22, color: 'var(--ink-2)', marginTop: 20 }}>
              Siéntate cómodo. Respira natural.
            </div>
          </div>
        </div>
        <div style={sessionStyles.footer}>
          <button onClick={() => { setPrepCount(0); setStage('active'); startTime.current = Date.now(); }} style={sessionStyles.ctrlBtn}>
            Empezar ahora
          </button>
        </div>
      </div>
    );
  }

  // COMPLETADO
  if (stage === 'done') {
    const totalSec = Math.round((Date.now() - sessionStart.current) / 1000);
    const mins = Math.floor(totalSec / 60);
    const secs = totalSec % 60;
    return (
      <div style={sessionStyles.root}>
        <SessionHeader routine={routine} onExit={onExit} extra={null} />
        <div style={sessionStyles.center}>
          <div style={{ textAlign: 'center', maxWidth: 520 }}>
            <div style={{
              width: 120, height: 120, margin: '0 auto 24px',
              borderRadius: '50%',
              background: 'var(--breathe-soft)',
              border: '1.5px solid var(--breathe)',
              display: 'grid', placeItems: 'center',
              animation: 'pace-fade-in 600ms ease',
            }}>
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--breathe)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20 6L9 17l-5-5" />
              </svg>
            </div>
            <div style={{ fontSize: 12, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 12 }}>
              Sesión completada
            </div>
            <h1 style={{
              fontFamily: 'var(--font-display)', fontStyle: 'italic',
              fontSize: 56, fontWeight: 500, margin: '0 0 24px', lineHeight: 1.05,
            }}>{routine.name}</h1>
            <div style={{ display: 'flex', justifyContent: 'center', gap: 40, marginBottom: 36 }}>
              <Stat label="Tiempo" value={`${mins}:${String(secs).padStart(2,'0')}`} />
              {isRounds && <Stat label="Rondas" value={String(routine.rounds)} />}
              {isRounds && <Stat label="Respiraciones" value={String(routine.breaths * routine.rounds)} />}
            </div>
            <p style={{ fontStyle: 'italic', fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--ink-2)', maxWidth: 380, margin: '0 auto 36px', lineHeight: 1.5 }}>
              Bien hecho. Observa cómo te sientes antes de volver.
            </p>
          </div>
        </div>
        <div style={sessionStyles.footer}>
          <Button variant="terracota" onClick={() => onExit('done')}>Volver al inicio</Button>
        </div>
      </div>
    );
  }

  // HOLD (retención en rondas)
  if (stage === 'hold') {
    const holdMins = Math.floor(holdSeconds / 60);
    const holdSecs = holdSeconds % 60;
    return (
      <div style={sessionStyles.root}>
        <SessionHeader routine={routine} onExit={onExit}
          extra={<div style={{ fontSize: 12, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--breathe)' }}>Ronda {round} / {routine.rounds}</div>} />
        <div style={sessionStyles.center}>
          <div style={{ textAlign: 'center', maxWidth: 520 }}>
            <div style={{ fontSize: 12, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--breathe)', marginBottom: 16, fontWeight: 500 }}>
              Retén sin aire
            </div>
            <div style={{
              fontFamily: 'var(--font-display)', fontStyle: 'italic',
              fontSize: 160, fontWeight: 400, lineHeight: 0.9,
              color: 'var(--ink)',
              fontVariantNumeric: 'tabular-nums',
              letterSpacing: '-0.03em',
            }}>
              {holdMins > 0 ? `${holdMins}:${String(holdSecs).padStart(2,'0')}` : holdSecs}
            </div>
            <div style={{ fontSize: 13, color: 'var(--ink-3)', marginTop: 8, letterSpacing: '0.12em', textTransform: 'uppercase' }}>
              {holdMins > 0 ? 'minutos' : 'segundos'}
            </div>
            <p style={{ fontStyle: 'italic', fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--ink-2)', maxWidth: 360, margin: '30px auto 0', lineHeight: 1.5 }}>
              Pulsa cuando sientas la necesidad de respirar.
            </p>
          </div>
        </div>
        <div style={sessionStyles.footer}>
          <Button variant="terracota" onClick={releaseHold}>Respirar de nuevo</Button>
        </div>
      </div>
    );
  }

  // ACTIVE (ciclo de respiración normal)
  const current = sequence[phase] || sequence[0];
  const progress = current.duration > 0 ? phaseTime / current.duration : 0;
  const remaining = Math.max(0, current.duration - phaseTime);
  const showCountdown = current.duration >= 4;
  const totalDots = isRounds ? routine.breaths : 20;
  const activeDot = isRounds ? breathCount : Math.floor(phaseTime % totalDots);

  return (
    <div style={sessionStyles.root}>
      <SessionHeader routine={routine} onExit={onExit}
        extra={isRounds ? (
          <div style={{ fontSize: 12, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>
            Ronda {round} / {routine.rounds}
          </div>
        ) : null} />

      <div style={sessionStyles.center}>
        <BreathVisual
          style={state.breathStyle}
          phase={current.label}
          progress={progress}
          scale={current.scale}
        />
        <div style={sessionStyles.text}>
          <div style={{
            fontFamily: 'var(--font-display)', fontStyle: 'italic',
            fontSize: 44, fontWeight: 500, color: 'var(--ink)',
            marginBottom: 8, lineHeight: 1,
          }}>{current.label}</div>
          {showCountdown && (
            <div style={{
              fontSize: 28, fontFamily: 'var(--font-display)', fontStyle: 'italic',
              color: 'var(--breathe)', fontVariantNumeric: 'tabular-nums', marginTop: 4,
            }}>{remaining}</div>
          )}
          <div style={{ fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-3)', marginTop: 10 }}>
            {isRounds ? `Respiración ${breathCount} de ${routine.breaths}` : `${phaseTime}s / ${current.duration}s`}
          </div>
        </div>
      </div>

      <div style={sessionStyles.dots}>
        {Array.from({ length: Math.min(totalDots, 30) }).map((_, i) => (
          <span key={i} style={{
            width: 4, height: 4, borderRadius: '50%',
            background: i < activeDot ? 'var(--breathe)' : 'var(--line)',
            transition: 'background 200ms',
          }} />
        ))}
      </div>

      <div style={sessionStyles.footer}>
        <button onClick={() => setPaused(p => !p)} style={sessionStyles.ctrlBtn} title="Espacio">
          {paused ? '▶ Reanudar' : '❚❚ Pausar'}
        </button>
        <button onClick={finish} style={{ ...sessionStyles.ctrlBtn, borderColor: 'transparent' }} title="Esc">
          ▶| Terminar
        </button>
      </div>
      <div style={{ position: 'absolute', bottom: 14, left: 0, right: 0, textAlign: 'center', fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', opacity: 0.6 }}>
        Espacio pausar · Esc salir
      </div>
    </div>
  );
}

/* Header reutilizable de sesión */
function SessionHeader({ routine, onExit, extra }) {
  return (
    <div style={sessionStyles.header}>
      <div>
        <Meta style={{ fontSize: 10 }}>{routine.code}</Meta>
        <h2 style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 22, margin: '2px 0 0', fontWeight: 500 }}>{routine.name}</h2>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
        {extra}
        <button onClick={() => onExit('exit')} style={sessionStyles.exitBtn}>× Salir</button>
      </div>
    </div>
  );
}

function Stat({ label, value }) {
  return (
    <div style={{ textAlign: 'center' }}>
      <div style={{
        fontFamily: 'var(--font-display)', fontStyle: 'italic',
        fontSize: 40, fontWeight: 500, lineHeight: 1,
        color: 'var(--ink)',
      }}>{value}</div>
      <div style={{ fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-3)', marginTop: 8 }}>
        {label}
      </div>
    </div>
  );
}

function getSequence(routine) {
  // Devuelve [{label, duration, scale}, …]
  if (routine.pattern === 'rounds') {
    return [
      { label: 'Inhala', duration: 2, scale: 1.3 },
      { label: 'Exhala', duration: 2, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'box') {
    const [i, h1, e, h2] = routine.cycle;
    return [
      { label: 'Inhala', duration: i, scale: 1.3 },
      { label: 'Sostén', duration: h1, scale: 1.3 },
      { label: 'Exhala', duration: e, scale: 0.9 },
      { label: 'Sostén', duration: h2, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'coherent') {
    const [i, , e] = routine.cycle;
    return [
      { label: 'Inhala', duration: i, scale: 1.3 },
      { label: 'Exhala', duration: e, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'pattern') {
    // 4-7-8
    const [i, h, e] = routine.cycle;
    return [
      { label: 'Inhala', duration: i, scale: 1.3 },
      { label: 'Sostén', duration: h, scale: 1.3 },
      { label: 'Exhala', duration: e, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'physiological') {
    return [
      { label: 'Inhala', duration: 2, scale: 1.25 },
      { label: 'Inhala más', duration: 1, scale: 1.35 },
      { label: 'Exhala', duration: 5, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'ujjayi') {
    return [
      { label: 'Inhala oceánica', duration: 5, scale: 1.3 },
      { label: 'Exhala oceánica', duration: 5, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'bhastrika' || routine.pattern === 'kapalabhati') {
    return [
      { label: 'Inhala', duration: 1, scale: 1.2 },
      { label: 'Exhala', duration: 1, scale: 0.95 },
    ];
  }
  if (routine.pattern === 'nadi') {
    return [
      { label: 'Inhala izq.', duration: 4, scale: 1.3 },
      { label: 'Sostén', duration: 2, scale: 1.3 },
      { label: 'Exhala dcha.', duration: 4, scale: 0.9 },
      { label: 'Inhala dcha.', duration: 4, scale: 1.3 },
      { label: 'Sostén', duration: 2, scale: 1.3 },
      { label: 'Exhala izq.', duration: 4, scale: 0.9 },
    ];
  }
  return [{ label: 'Respira', duration: 4, scale: 1.2 }];
}

/* =========================
   BREATH VISUAL
   ========================= */
function BreathVisual({ style, phase, progress, scale = 1.2 }) {
  const transitionDur = '1800ms';
  /* Estilo "Flor" — híbrido entre pulso y pétalo.
     Anillos concéntricos que pulsan + pétalos suaves rotando lentamente + núcleo luminoso. */
  if (style === 'flor') {
    return (
      <div style={visualStyles.wrap}>
        {/* Anillos externos pulsando */}
        <div style={{
          position: 'absolute', inset: -40,
          border: '1px solid var(--breathe)',
          borderRadius: '50%',
          opacity: 0.25,
          transform: `scale(${scale * 0.95})`,
          transition: `transform ${transitionDur} var(--ease)`,
        }} />
        <div style={{
          position: 'absolute', inset: -20,
          border: '1px solid var(--breathe)',
          borderRadius: '50%',
          opacity: 0.4,
          transform: `scale(${scale})`,
          transition: `transform ${transitionDur} var(--ease)`,
        }} />
        {/* Pétalos suaves girando muy lento */}
        <svg viewBox="-100 -100 200 200" style={{
          position: 'absolute', inset: 0, width: '100%', height: '100%',
          transform: `scale(${scale * 0.85}) rotate(${progress * 40}deg)`,
          transition: `transform ${transitionDur} var(--ease)`,
        }}>
          {[0,1,2,3,4,5].map(i => (
            <ellipse key={i} cx="0" cy="-32" rx="14" ry="34"
              fill="var(--breathe-soft)" stroke="var(--breathe)" strokeWidth="0.6"
              transform={`rotate(${i * 60})`} opacity="0.5" />
          ))}
        </svg>
        {/* Núcleo luminoso */}
        <div style={{
          width: 80, height: 80,
          borderRadius: '50%',
          background: 'radial-gradient(circle, var(--breathe-soft) 0%, transparent 80%)',
          border: '1.5px solid var(--breathe)',
          transform: `scale(${scale * 0.7})`,
          transition: `transform ${transitionDur} var(--ease)`,
          position: 'relative',
        }} />
      </div>
    );
  }
  if (style === 'ondas') {
    return (
      <div style={visualStyles.wrap}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{
            position: 'absolute', inset: 0,
            border: '1px solid var(--breathe)',
            borderRadius: '50%',
            opacity: 0.15 + i * 0.1,
            transform: `scale(${scale - i * 0.15})`,
            transition: `transform ${transitionDur} var(--ease)`,
          }} />
        ))}
        <div style={{ ...visualStyles.core, background: 'var(--breathe-soft)' }} />
      </div>
    );
  }
  if (style === 'petalo') {
    return (
      <div style={visualStyles.wrap}>
        <svg viewBox="-100 -100 200 200" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', transition: `transform ${transitionDur} var(--ease)`, transform: `scale(${scale})` }}>
          {[0,1,2,3,4,5].map(i => (
            <ellipse key={i} cx="0" cy="-40" rx="20" ry="45"
              fill="var(--breathe-soft)" stroke="var(--breathe)" strokeWidth="0.8"
              transform={`rotate(${i * 60})`} opacity="0.55" />
          ))}
          <circle cx="0" cy="0" r="12" fill="var(--breathe)" opacity="0.25" />
        </svg>
      </div>
    );
  }
  if (style === 'organico') {
    return (
      <div style={visualStyles.wrap}>
        <div style={{
          ...visualStyles.core,
          background: 'radial-gradient(circle, var(--breathe-soft) 0%, transparent 70%)',
          transform: `scale(${scale})`,
          transition: `transform ${transitionDur} var(--ease)`,
          borderRadius: `${42 + Math.sin(progress * Math.PI * 4) * 6}% ${58 - Math.sin(progress * Math.PI * 4) * 6}% ${46 + Math.cos(progress * Math.PI * 3) * 8}% ${54 - Math.cos(progress * Math.PI * 3) * 8}%`,
          border: '1px solid var(--breathe)',
        }} />
      </div>
    );
  }
  // Default: pulso
  return (
    <div style={visualStyles.wrap}>
      {/* Anillos externos */}
      <div style={{ position: 'absolute', inset: -30, border: '1px solid var(--line)', borderRadius: '50%', opacity: 0.4 }} />
      <div style={{ position: 'absolute', inset: -60, border: '1px solid var(--line)', borderRadius: '50%', opacity: 0.2 }} />
      <div style={{
        ...visualStyles.core,
        background: 'var(--breathe-soft)',
        border: '1.5px solid var(--breathe)',
        transform: `scale(${scale})`,
        transition: `transform ${transitionDur} var(--ease)`,
      }} />
      {/* Puntito indicador rotando */}
      <div style={{
        position: 'absolute',
        width: 8, height: 8, borderRadius: '50%',
        background: 'var(--breathe-2)',
        top: '50%', left: '50%',
        transform: `translate(-50%, -50%) rotate(${progress * 360}deg) translateY(-110px)`,
        transition: 'transform 1s linear',
      }} />
    </div>
  );
}

const visualStyles = {
  wrap: {
    position: 'relative',
    width: 260, height: 260,
    display: 'grid', placeItems: 'center',
  },
  core: {
    width: 160, height: 160,
    borderRadius: '50%',
    position: 'relative',
  },
};

const sessionStyles = {
  root: {
    position: 'fixed', inset: 0,
    background: 'var(--paper)',
    zIndex: 90,
    display: 'flex',
    flexDirection: 'column',
    padding: '28px 48px 40px',
  },
  header: {
    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
  },
  exitBtn: {
    fontSize: 13, color: 'var(--ink-2)',
    padding: '6px 10px',
  },
  center: {
    flex: 1, display: 'flex', flexDirection: 'column',
    alignItems: 'center', justifyContent: 'center',
    gap: 32,
  },
  text: {
    textAlign: 'center',
  },
  dots: {
    display: 'flex', gap: 5,
    justifyContent: 'center',
    marginBottom: 28,
    flexWrap: 'wrap',
    maxWidth: 400,
    margin: '0 auto 28px',
  },
  footer: {
    display: 'flex', gap: 16, justifyContent: 'center',
  },
  ctrlBtn: {
    padding: '10px 22px',
    fontSize: 13,
    border: '1px solid var(--line-2)',
    borderRadius: 'var(--r-md)',
    background: 'var(--paper-2)',
    color: 'var(--ink)',
  },
};

Object.assign(window, { BreatheLibrary, BreatheSafety, BreatheSession, BREATHE_ROUTINES, SessionHeader, Stat });
</script>

function MoveSession({ routine, onExit }) {
  const { useRef: useRefMV } = React;
  const [stage, setStage] = useStateMV('prep'); // 'prep' | 'active' | 'done'
  const [prepCount, setPrepCount] = useStateMV(3);
  const [stepIdx, setStepIdx] = useStateMV(0);
  const [elapsed, setElapsed] = useStateMV(0);
  const [paused, setPaused] = useStateMV(false);
  const sessionStart = useRefMV(Date.now());
  const step = routine.steps[stepIdx];

  // Preparación 3s
  useEffectMV(() => {
    if (stage !== 'prep' || paused) return;
    if (prepCount <= 0) { setStage('active'); sessionStart.current = Date.now(); return; }
    const t = setTimeout(() => setPrepCount(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [stage, prepCount, paused]);

  // Ticker del paso activo
  useEffectMV(() => {
    if (stage !== 'active' || paused) return;
    const intv = setInterval(() => {
      setElapsed(e => {
        if (e + 1 >= step.dur) {
          if (stepIdx + 1 >= routine.steps.length) {
            completeMoveSession(routine.id, routine.min);
            setStage('done');
            return 0;
          }
          setStepIdx(i => i + 1);
          return 0;
        }
        return e + 1;
      });
    }, 1000);
    return () => clearInterval(intv);
  }, [stepIdx, paused, step, routine, stage]);

  // Atajos de teclado
  useEffectMV(() => {
    const onKey = (e) => {
      if (e.key === ' ') { e.preventDefault(); setPaused(p => !p); }
      if (e.key === 'Escape') onExit('exit');
      if (e.key === 'ArrowRight') goNext();
      if (e.key === 'ArrowLeft') goPrev();
      if (e.key === 'Enter' && stage === 'done') onExit('done');
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [stage, stepIdx]);

  const goNext = () => {
    if (stage !== 'active') return;
    if (stepIdx + 1 >= routine.steps.length) {
      completeMoveSession(routine.id, routine.min);
      setStage('done');
    } else {
      setStepIdx(stepIdx + 1); setElapsed(0);
    }
  };
  const goPrev = () => {
    if (stage !== 'active' || stepIdx === 0) return;
    setStepIdx(stepIdx - 1); setElapsed(0);
  };

  // PREPARACIÓN
  if (stage === 'prep') {
    return (
      <div style={moveSessionStyles.root}>
        <MoveHeader routine={routine} onExit={onExit} />
        <div style={moveSessionStyles.center}>
          <div style={{ textAlign: 'center', maxWidth: 460 }}>
            <div style={{ fontSize: 12, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 18 }}>Prepárate</div>
            <div style={{
              fontFamily: 'var(--font-display)', fontStyle: 'italic',
              fontSize: 200, fontWeight: 400, lineHeight: 0.9,
              color: 'var(--move)',
              fontVariantNumeric: 'tabular-nums',
            }}>{prepCount > 0 ? prepCount : '·'}</div>
            <div style={{ fontStyle: 'italic', fontFamily: 'var(--font-display)', fontSize: 20, color: 'var(--ink-2)', marginTop: 20 }}>
              De pie. Sin prisa. {routine.steps.length} pasos.
            </div>
          </div>
        </div>
        <div style={moveSessionStyles.footer}>
          <button onClick={() => { setPrepCount(0); setStage('active'); sessionStart.current = Date.now(); }} style={moveSessionStyles.ctrlBtn}>
            Empezar ahora
          </button>
        </div>
      </div>
    );
  }

  // COMPLETADO
  if (stage === 'done') {
    const totalSec = Math.round((Date.now() - sessionStart.current) / 1000);
    const mins = Math.floor(totalSec / 60);
    const secs = totalSec % 60;
    return (
      <div style={moveSessionStyles.root}>
        <MoveHeader routine={routine} onExit={onExit} />
        <div style={moveSessionStyles.center}>
          <div style={{ textAlign: 'center', maxWidth: 520 }}>
            <div style={{
              width: 120, height: 120, margin: '0 auto 24px',
              borderRadius: '50%', background: 'var(--move-soft)',
              border: '1.5px solid var(--move)',
              display: 'grid', placeItems: 'center',
              animation: 'pace-fade-in 600ms ease',
            }}>
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--move)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20 6L9 17l-5-5" />
              </svg>
            </div>
            <div style={{ fontSize: 12, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 12 }}>
              Antídoto completado
            </div>
            <h1 style={{
              fontFamily: 'var(--font-display)', fontStyle: 'italic',
              fontSize: 56, fontWeight: 500, margin: '0 0 24px', lineHeight: 1.05,
            }}>{routine.name}</h1>
            <div style={{ display: 'flex', justifyContent: 'center', gap: 40, marginBottom: 36 }}>
              <MoveStat label="Tiempo" value={`${mins}:${String(secs).padStart(2,'0')}`} />
              <MoveStat label="Pasos" value={String(routine.steps.length)} />
            </div>
            <p style={{ fontStyle: 'italic', fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--ink-2)', maxWidth: 400, margin: '0 auto 36px', lineHeight: 1.5 }}>
              El cuerpo vuelve a sentirse tuyo.
            </p>
          </div>
        </div>
        <div style={moveSessionStyles.footer}>
          <Button onClick={() => onExit('done')} style={{ background: 'var(--move)', borderColor: 'var(--move)' }}>Volver al inicio</Button>
        </div>
      </div>
    );
  }

  // ACTIVE
  const progress = elapsed / step.dur;
  const remaining = Math.max(0, step.dur - elapsed);
  return (
    <div style={moveSessionStyles.root}>
      <MoveHeader routine={routine} onExit={onExit}
        extra={<Meta>Paso {stepIdx + 1} / {routine.steps.length}</Meta>} />

      <div style={moveSessionStyles.center}>
        <div style={{ textAlign: 'center', maxWidth: 620 }}>
          <StepGlyph tag={routine.tag} stepIdx={stepIdx} />
          <div style={{ fontSize: 12, letterSpacing: '0.24em', textTransform: 'uppercase', color: 'var(--move)', marginBottom: 14, fontWeight: 500 }}>
            Paso {stepIdx + 1} de {routine.steps.length}
          </div>
          <h1 style={{
            fontFamily: 'var(--font-display)', fontStyle: 'italic',
            fontSize: 56, fontWeight: 500,
            lineHeight: 1.05, margin: '0 0 20px',
          }}>{step.name}</h1>
          <p style={{
            fontSize: 17, lineHeight: 1.55, color: 'var(--ink-2)',
            maxWidth: 460, margin: '0 auto 30px',
          }}>{step.cue}</p>

          <div style={{
            fontSize: 128, fontFamily: 'var(--font-display)', fontStyle: 'italic',
            fontWeight: 400, fontVariantNumeric: 'tabular-nums',
            color: 'var(--ink)', lineHeight: 1,
          }}>{String(remaining).padStart(2, '0')}</div>
          <div style={{ fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--ink-3)', marginTop: 8 }}>segundos</div>
        </div>
      </div>

      <div style={moveSessionStyles.rulerWrap}>
        <div style={moveSessionStyles.ruler}>
          {routine.steps.map((s, i) => (
            <div key={i} style={{
              flex: s.dur,
              height: i === stepIdx ? 6 : 2,
              background: i < stepIdx ? 'var(--move)' : i === stepIdx ? 'var(--line)' : 'var(--paper-3)',
              borderRadius: 2, position: 'relative', overflow: 'hidden',
              transition: 'height 220ms',
            }}>
              {i === stepIdx && (
                <div style={{
                  position: 'absolute', inset: 0,
                  width: `${progress * 100}%`,
                  background: 'var(--move)',
                  transition: 'width 1s linear',
                }} />
              )}
            </div>
          ))}
        </div>
        <div style={{ textAlign: 'center', marginTop: 8, fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>
          {routine.steps[stepIdx + 1] ? `Siguiente: ${routine.steps[stepIdx + 1].name}` : 'Último paso'}
        </div>
      </div>

      <div style={moveSessionStyles.footer}>
        <button onClick={goPrev} disabled={stepIdx === 0} style={moveSessionStyles.ctrlBtn} title="←">
          ← Anterior
        </button>
        <button onClick={() => setPaused(p => !p)} style={moveSessionStyles.ctrlBtn} title="Espacio">
          {paused ? '▶ Reanudar' : '❚❚ Pausar'}
        </button>
        <button onClick={goNext} style={moveSessionStyles.ctrlBtn} title="→">
          {stepIdx + 1 >= routine.steps.length ? 'Terminar' : 'Siguiente →'}
        </button>
      </div>
      <div style={{ position: 'absolute', bottom: 14, left: 0, right: 0, textAlign: 'center', fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)', opacity: 0.6 }}>
        ← → navegar · Espacio pausar · Esc salir
      </div>
    </div>
  );
}

function MoveHeader({ routine, onExit, extra }) {
  return (
    <div style={moveSessionStyles.header}>
      <div>
        <Meta>{routine.code}</Meta>
        <h2 style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 22, margin: '2px 0 0', fontWeight: 500 }}>{routine.name}</h2>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
        {extra}
        <button onClick={() => onExit('exit')} style={moveSessionStyles.exitBtn}>× Salir</button>
      </div>
    </div>
  );
}

function MoveStat({ label, value }) {
  return (
    <div style={{ textAlign: 'center' }}>
      <div style={{
        fontFamily: 'var(--font-display)', fontStyle: 'italic',
        fontSize: 40, fontWeight: 500, lineHeight: 1,
        color: 'var(--ink)',
      }}>{value}</div>
      <div style={{ fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-3)', marginTop: 8 }}>
        {label}
      </div>
    </div>
  );
}

/* Glifo placeholder por paso — círculo con símbolo de categoría.
   Proyecta sensación de "ficha de biblioteca" hasta que tengamos ilustraciones reales. */
function StepGlyph({ tag, stepIdx }) {
  const symbols = ['◯', '◬', '◇', '△', '▢', '⬡', '✦'];
  const sym = symbols[stepIdx % symbols.length];
  return (
    <div style={{
      width: 72, height: 72, margin: '0 auto 20px',
      borderRadius: '50%',
      border: '1px dashed var(--move)',
      background: 'var(--move-soft)',
      display: 'grid', placeItems: 'center',
      color: 'var(--move)',
      fontFamily: 'var(--font-display)',
      fontSize: 28,
      fontStyle: 'italic',
    }}>
      {sym}
    </div>
  );
}

const moveSessionStyles = {
  root: {
    position: 'fixed', inset: 0,
    background: 'var(--paper)',
    zIndex: 90,
    display: 'flex',
    flexDirection: 'column',
    padding: '28px 48px 40px',

  header: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' },
  exitBtn: { fontSize: 13, color: 'var(--ink-2)', padding: '6px 10px' },

  rulerWrap: { margin: '0 auto 20px', width: '100%', maxWidth: 640 },
  ruler: {

    alignItems: 'center',

    fontSize: 13,
    border: '1px solid var(--line-2)',
    borderRadius: 'var(--r-md)',
    background: 'var(--paper-2)',
    color: 'var(--ink)',
  },
};

Object.assign(window, { MoveLibrary, MoveSession, MOVE_ROUTINES });
</script>

            style={{

}

            <div style={{
              fontFamily: 'var(--font-display)',
              fontStyle: 'italic', fontSize: 28, fontWeight: 500, lineHeight: 1,
            }}>{b.key === 'water' ? totals[b.key] : totals[b.key]}</div>
            <div style={{ fontSize: 10, color: 'var(--ink-3)', marginTop: 4 }}>{b.unit}</div>
          </div>
        ))}
      </div>

      {/* Gráfico por días */}
      {bars.map(b => (
        <WeekBarRow key={b.key} label={b.label} data={b.data} color={b.color} unit={b.unit} />
      ))}

      <div style={{
        marginTop: 24, padding: 14,
        background: 'var(--paper-2)',
        borderRadius: 'var(--r-sm)',
        fontSize: 12, color: 'var(--ink-2)', lineHeight: 1.6,
      }}>
        <strong style={{ color: 'var(--ink)', fontStyle: 'italic', fontFamily: 'var(--font-display)' }}>Nota: </strong>
        no medimos para juzgarte. Los números están aquí para que reconozcas tus ritmos, no para que los persigas.
      </div>
    </Modal>
  );
}

function WeekBarRow({ label, data, color, unit }) {
  const days = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
  const today = (new Date().getDay() + 6) % 7;
  const max = Math.max(1, ...data);
  // Reordenar: en España empezamos en lunes. data está indexado 0=Dom (getDay)
  const reordered = [data[1], data[2], data[3], data[4], data[5], data[6], data[0]];

  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
        <span style={{ fontSize: 13, color: 'var(--ink-2)', fontFamily: 'var(--font-display)', fontStyle: 'italic', fontWeight: 500 }}>{label}</span>
        <Meta>{unit}</Meta>
      </div>
      <div style={{ display: 'flex', gap: 6, alignItems: 'flex-end', height: 64 }}>
        {reordered.map((v, i) => {
          const h = (v / max) * 100;
          const isToday = i === today;
          return (
            <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              <div style={{ flex: 1, width: '100%', display: 'flex', alignItems: 'flex-end', position: 'relative' }}>
                <div style={{
                  width: '100%',
                  height: `${h}%`,
                  minHeight: v > 0 ? 4 : 2,
                  background: v > 0 ? color : 'var(--line)',
                  opacity: isToday ? 1 : (v > 0 ? 0.8 : 0.4),
                  borderRadius: '3px 3px 0 0',
                  transition: 'height 320ms var(--ease)',
                  position: 'relative',
                }}>
                  {v > 0 && (
                    <span style={{
                      position: 'absolute', bottom: '100%', left: '50%',
                      transform: 'translateX(-50%)',
                      fontSize: 10, color: 'var(--ink-3)',
                      marginBottom: 4,
                      fontVariantNumeric: 'tabular-nums',
                    }}>{v}</span>
                  )}
                </div>
              </div>
              <span style={{
                fontSize: 10,
                color: isToday ? 'var(--ink)' : 'var(--ink-3)',
                fontWeight: isToday ? 600 : 400,
                letterSpacing: 0.3,
              }}>{days[i]}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

Object.assign(window, { WeeklyStats });
</script>
