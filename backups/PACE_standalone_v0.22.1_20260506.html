  <script type="text/babel">
/* PACE · Respiración — Sesión guiada
   Extraído de BreatheModule.jsx en sesión 34 (v0.16.0).
   Depende de BreatheVisual.jsx (BreathVisual, getSequence) que carga antes.
*/

const { useState, useEffect, useRef } = React;

const PHASE_KEYS = {
  'Inhala':           'breathe.phase.inhala',
  'Exhala':           'breathe.phase.exhala',
  'Sostén':           'breathe.phase.sosten',
  'Inhala más':       'breathe.phase.inhala.mas',
  'Inhala oceánica':  'breathe.phase.inhala.oceanica',
  'Exhala oceánica':  'breathe.phase.exhala.oceanica',
  'Inhala izq.':      'breathe.phase.inhala.izq',
  'Inhala dcha.':     'breathe.phase.inhala.dcha',
  'Exhala dcha.':     'breathe.phase.exhala.dcha',
  'Exhala izq.':      'breathe.phase.exhala.izq',
  'Respira':          'breathe.phase.respira',
};

function BreatheSession({ routine, onExit }) {
  const [state] = usePace();
  const { t, lang } = useT();
  const tR = (key, fb) => { if (lang !== 'en') return fb; const v = t(key); return v === key ? fb : v; };
  const displayRoutine = lang === 'en'
    ? { ...routine, name: tR(`${routine.id}.name`, routine.name), code: tR(`${routine.id}.code`, routine.code) }
    : routine;
  const [stage, setStage] = useState('prep'); // 'prep' | 'active' | 'hold' | 'done'
  const [prepCount, setPrepCount] = useState(3);
  const [phase, setPhase] = useState(0);
  const [phaseTime, setPhaseTime] = useState(0);
  const [round, setRound] = useState(1);
  const [breathCount, setBreathCount] = useState(1);
  const [holdSeconds, setHoldSeconds] = useState(0);
  const [paused, setPaused] = useState(false);
  const startTime = useRef(Date.now());
  const sessionStart = useRef(Date.now());

  const sequence = getSequence(routine);
  const isRounds = routine.pattern === 'rounds';

  // Preparación: cuenta atrás 3 segundos
  useEffect(() => {
    if (stage !== 'prep' || paused) return;
    if (prepCount <= 0) {
      try { playSound('breathe.session.start'); } catch (e) {}
      setStage('active');
      startTime.current = Date.now();
      return;
    }
    const timer = setTimeout(() => setPrepCount(c => Math.max(0, c - 1)), 1000);
    return () => clearTimeout(timer);
  }, [stage, prepCount, paused]);

  // Ticker principal (active)
  useEffect(() => {
    if (paused || stage !== 'active') return;
    const intv = setInterval(() => {
      setPhaseTime(t => {
        const cur = sequence[phase];
        if (t + 1 >= cur.duration) {
          const nextPhase = phase + 1;
          if (nextPhase >= sequence.length) {
            handleCycleComplete();
            return 0;
          }
          setPhase(nextPhase);
          /* Sonido de fase — sesión 38a: ruido filtrado sincronizado con
             la duración real de la fase. Hold = silencio intencional. */
          const newCur = sequence[nextPhase];
          const phaseDur = newCur.duration;
          const phaseLabel = newCur.label;
          if (phaseLabel === 'Inhala' || phaseLabel === 'Inhala más' ||
              phaseLabel === 'Inhala oceánica' || phaseLabel === 'Inhala izq.' ||
              phaseLabel === 'Inhala dcha.' || phaseLabel === 'Respira') {
            try { playSound('breathe.inhale', phaseDur); } catch (e) {}
          } else if (phaseLabel === 'Exhala' || phaseLabel === 'Exhala oceánica' ||
                     phaseLabel === 'Exhala dcha.' || phaseLabel === 'Exhala izq.') {
            try { playSound('breathe.exhale', phaseDur); } catch (e) {}
          }
          // Sostén → silencio intencional (no llamar a playSound).
          return 0;
        }
        return t + 1;
      });
    }, 1000);
    return () => clearInterval(intv);
  }, [phase, paused, routine, stage]);

  // Ticker de retención (hold en rondas)
  useEffect(() => {
    if (stage !== 'hold' || paused) return;
    const intv = setInterval(() => {
      setHoldSeconds(s => {
        const next = s + 1;
        if (next === 60) unlockAchievement('secret.breath.hold.60');
        if (next === 90) unlockAchievement('secret.breath.hold.90');
        if (next === 120) unlockAchievement('secret.breath.hold.120');
        return next;
      });
    }, 1000);
    return () => clearInterval(intv);
  }, [stage, paused]);

  // Drone ambiente — efecto paralelo sobre stage y paused
  useEffect(() => {
    if (!window.ambientDrone) return;
    const drone = window.ambientDrone;

    if (stage === 'done') { drone.stop(800); return; }
    if (stage === 'prep') return; // no arranca en preparación

    if (stage === 'hold') {
      // Drone sigue sonando durante hold (retención) — sin tocar
      return;
    }

    // stage === 'active'
    if (paused) {
      drone.pause();
    } else {
      if (drone.isActive()) {
        drone.resume();
      } else {
        // activar ambientOn mid-sesión no arranca el drone retroactivamente
        // — solo arranca al inicio de una sesión nueva
        drone.start();
      }
    }
  }, [stage, paused]);

  // Stop drone si soundOn se apaga durante sesión
  useEffect(() => {
    if (!state.soundOn && window.ambientDrone && window.ambientDrone.isActive()) {
      window.ambientDrone.stop(400);
    }
  }, [state.soundOn]);

  // Cleanup: para el drone en todos los caminos de onExit (unmount)
  useEffect(() => {
    return () => { if (window.ambientDrone) window.ambientDrone.stop(800); };
  }, []);

  // Atajos de teclado
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === ' ') { e.preventDefault(); setPaused(p => !p); }
      if (e.key === 'Escape') onExit('exit');
      if (e.key === 'Enter' && stage === 'hold') releaseHold();
      if (e.key === 'Enter' && stage === 'done') onExit('done');
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [stage]);

  const handleCycleComplete = () => {
    if (isRounds) {
      if (breathCount < routine.breaths) {
        setBreathCount(b => b + 1);
        setPhase(0);
      } else {
        try { playSound('breathe.session.end'); } catch (e) {}
        setStage('hold');
        setHoldSeconds(0);
      }
    } else {
      const elapsed = (Date.now() - startTime.current) / 1000;
      if (elapsed >= routine.min * 60) {
        finish();
      } else {
        setPhase(0);
      }
    }
  };

  const releaseHold = () => {
    if (round < routine.rounds) {
      setRound(r => r + 1);
      setBreathCount(1);
      setPhase(0);
      setStage('active');
    } else {
      finish();
    }
  };

  const finish = () => {
    completeBreathSession(routine.id, routine.min);
    try { playSound('breathe.session.end'); } catch (e) {}
    setStage('done');
  };

  // ====== RENDER STAGES ======

  if (stage === 'prep') {
    return (
      <SessionPrep
        routine={displayRoutine}
        onExit={onExit}
        accent="var(--breathe)"
        prepCount={prepCount}
        copy={t('breathe.prepCopy')}
        onSkip={() => { setPrepCount(0); setStage('active'); startTime.current = Date.now(); }}
      />
    );
  }

  if (stage === 'done') {
    const totalSec = Math.round((Date.now() - sessionStart.current) / 1000);
    const mins = Math.floor(totalSec / 60);
    const secs = totalSec % 60;
    const stats = [
      { label: t('common.time'), value: `${mins}:${String(secs).padStart(2,'0')}` },
    ];
    if (isRounds) {
      stats.push({ label: t('common.rounds'), value: String(routine.rounds) });
      stats.push({ label: t('common.breaths'), value: String(routine.breaths * routine.rounds) });
    }
    return (
      <SessionDone
        routine={displayRoutine}
        onExit={onExit}
        accent="var(--breathe)"
        accentSoft="var(--breathe-soft)"
        doneMeta={t('session.doneMeta')}
        doneCopy={t('breathe.doneCopy')}
        stats={stats}
        buttonVariant="terracota"
      />
    );
  }

  if (stage === 'hold') {
    const holdMins = Math.floor(holdSeconds / 60);
    const holdSecs = holdSeconds % 60;
    return (
      <SessionShell
        routine={displayRoutine}
        onExit={onExit}
        headerExtra={<div style={{ fontSize: 12, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--breathe)' }}>{t('session.round')} {round} / {routine.rounds}</div>}
        footer={<Button variant="terracota" onClick={releaseHold}>{t('session.breatheAgain')}</Button>}
      >
        <div style={{ textAlign: 'center', maxWidth: 520 }}>
          <div style={{ fontSize: 12, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'var(--breathe)', marginBottom: 16, fontWeight: 500 }}>
            {t('session.hold')}
          </div>
          <div style={{
            ...displayItalic,
            fontSize: 160, fontWeight: 400, lineHeight: 0.9,
            color: 'var(--ink)',
            fontVariantNumeric: 'tabular-nums',
            letterSpacing: '-0.03em',
          }}>
            {holdMins > 0 ? `${holdMins}:${String(holdSecs).padStart(2,'0')}` : holdSecs}
          </div>
          <div style={{ fontSize: 13, color: 'var(--ink-3)', marginTop: 8, letterSpacing: '0.12em', textTransform: 'uppercase' }}>
            {holdMins > 0 ? t('session.minutes') : t('session.seconds')}
          </div>
          <p style={{
            ...displayItalic,
            fontSize: 18, color: 'var(--ink-2)',
            maxWidth: 360, margin: '30px auto 0', lineHeight: 1.5,
          }}>
            {t('session.holdCue')}
          </p>
        </div>
      </SessionShell>
    );
  }

  // ACTIVE
  const current = sequence[phase] || sequence[0];
  const displayLabel = tR(PHASE_KEYS[current.label] || current.label, current.label);
  const progress = current.duration > 0 ? phaseTime / current.duration : 0;
  const remaining = Math.max(0, current.duration - phaseTime);
  const showCountdown = current.duration >= 4;
  const totalDots = isRounds ? routine.breaths : 20;
  const activeDot = isRounds ? breathCount : Math.floor(phaseTime % totalDots);

  const footer = (
    <React.Fragment>
      <button onClick={() => setPaused(p => !p)} style={sessionShellStyles.ctrlBtn} title={t('session.pause')}>
        {paused ? t('session.resume') : t('session.pause')}
      </button>
      <button onClick={finish} style={{ ...sessionShellStyles.ctrlBtn, borderColor: 'transparent' }} title={t('session.finish')}>
        {t('session.finish')}
      </button>
    </React.Fragment>
  );

  return (
    <SessionShell
      routine={displayRoutine}
      onExit={onExit}
      centerGap={true}
      footerGap={16}
      footer={footer}
      hint={t('session.hint')}
      headerExtra={isRounds ? (
        <div style={{ fontSize: 12, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>
          {t('session.round')} {round} / {routine.rounds}
        </div>
      ) : null}
    >
      <BreathVisual
        style={state.breathStyle}
        phase={current.label}
        progress={progress}
        scale={current.scale}
      />
      <div style={{ textAlign: 'center' }}>
        <div style={{
          ...displayItalic,
          fontSize: 44, fontWeight: 500, color: 'var(--ink)',
          marginBottom: 8, lineHeight: 1,
        }}>{displayLabel}</div>
        {showCountdown && (
          <div style={{
            ...displayItalic,
            fontSize: 28, color: 'var(--breathe)',
            fontVariantNumeric: 'tabular-nums', marginTop: 4,
          }}>{remaining}</div>
        )}
        <div style={{ fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-3)', marginTop: 10 }}>
          {isRounds ? `${t('common.breath')} ${breathCount} ${t('common.of')} ${routine.breaths}` : `${phaseTime}s / ${current.duration}s`}
        </div>
      </div>
      <div style={{
        display: 'flex', gap: 5,
        justifyContent: 'center',
        flexWrap: 'wrap',
        maxWidth: 400,
        margin: '0 auto',
      }}>
        {Array.from({ length: Math.min(totalDots, 30) }).map((_, i) => (
          <span key={i} style={{
            width: 4, height: 4, borderRadius: '50%',
            background: i < activeDot ? 'var(--breathe)' : 'var(--line)',
            transition: 'background 200ms',
          }} />
        ))}
      </div>
    </SessionShell>
  );
}

Object.assign(window, { BreatheSession });

</script>

/* PACE · Módulo Mueve (Calistenia / Fuerza)

   v0.11.9 — SWAP de contenido (sesión 14):

      <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: -30, marginBottom: 10 }}>
        <Meta>{t('lib.move.meta')}</Meta>
      </div>
      <h3 style={{ ...displayItalic, fontSize: 20, margin: '0 0 12px', fontWeight: 500 }}>{t('lib.routines')}</h3>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 10 }}>

function MoveSession({ routine, onExit, kind = 'move' }) {

  const displayRoutine = lang === 'en'
    ? { ...routine, name: tR(`${routine.id}.name`, routine.name), code: tR(`${routine.id}.code`, routine.code) }
    : routine;
  const [stage, setStage] = useStateMV('prep'); // 'prep' | 'active' | 'done'
  // Despacha la completion correcta según el tipo (Mueve vs. Extra reutiliza este componente)
  const dispatchComplete = () => {
    if (kind === 'extra') completeExtraSession(routine.id, routine.min);
    else completeMoveSession(routine.id, routine.min);
  };
  const [prepCount, setPrepCount] = useStateMV(3);
  const [stepIdx, setStepIdx] = useStateMV(0);
  const [elapsed, setElapsed] = useStateMV(0);
  const [paused, setPaused] = useStateMV(false);
  const sessionStart = useRefMV(Date.now());

  // Preparación 3s
  useEffectMV(() => {

    if (prepCount <= 0) { setStage('active'); sessionStart.current = Date.now(); return; }
    const t = setTimeout(() => setPrepCount(c => Math.max(0, c - 1)), 1000);
    return () => clearTimeout(t);
  }, [stage, prepCount, paused]);

  // Ticker del paso activo
  useEffectMV(() => {
    if (stage !== 'active' || paused) return;
    const intv = setInterval(() => {
      setElapsed(e => {
        if (e + 1 >= step.dur) {
          if (stepIdx + 1 >= routine.steps.length) {
            dispatchComplete();
            setStage('done');
            return 0;
          }
          setStepIdx(i => i + 1);
          return 0;
        }
        return e + 1;
      });
    }, 1000);
    return () => clearInterval(intv);
  }, [stepIdx, paused, step, routine, stage]);

  // Atajos de teclado
  useEffectMV(() => {
    const onKey = (e) => {
      if (e.key === ' ') { e.preventDefault(); setPaused(p => !p); }
      if (e.key === 'Escape') onExit('exit');
      if (e.key === 'ArrowRight') goNext();
      if (e.key === 'ArrowLeft') goPrev();
      if (e.key === 'Enter' && stage === 'done') onExit('done');
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [stage, stepIdx]);

  // Sonidos de sesión
  useEffectMV(() => {
    if (stage === 'active') { try { playSound('move.start'); } catch(e) {} }
    if (stage === 'done')   { try { playSound('move.end');   } catch(e) {} }
  }, [stage]);

  useEffectMV(() => {
    if (stage !== 'active') return;
    try { playSound('move.step'); } catch(e) {}
  }, [stepIdx]);

  const goNext = () => {
    if (stage !== 'active') return;
    if (stepIdx + 1 >= routine.steps.length) {
      dispatchComplete();
      setStage('done');
    } else {
      setStepIdx(stepIdx + 1); setElapsed(0);
    }
  };
  const goPrev = () => {
    if (stage !== 'active' || stepIdx === 0) return;
    setStepIdx(stepIdx - 1); setElapsed(0);
  };

  // PREPARACIÓN
  if (stage === 'prep') {
    return (
      <SessionPrep
        routine={displayRoutine}
        onExit={onExit}
        accent="var(--move)"
        prepCount={prepCount}
        copy={tn('move.prepCopy', { n: routine.steps.length })}
        onSkip={() => { setPrepCount(0); setStage('active'); sessionStart.current = Date.now(); }}
      />
    );
  }

  // COMPLETADO
  if (stage === 'done') {
    const totalSec = Math.round((Date.now() - sessionStart.current) / 1000);
    const mins = Math.floor(totalSec / 60);
    const secs = totalSec % 60;
    return (
      <SessionDone
        routine={displayRoutine}
        onExit={onExit}
        accent="var(--move)"
        accentSoft="var(--move-soft)"
        doneMeta={t('session.antidoteDone')}
        doneCopy={t('move.doneCopy')}
        stats={[
          { label: t('common.time'), value: `${mins}:${String(secs).padStart(2,'0')}` },
          { label: t('move.steps'),  value: String(routine.steps.length) },
        ]}
        buttonStyle={{ background: 'var(--move)', borderColor: 'var(--move)' }}
      />
    );
  }

  // ACTIVE
  const progress = elapsed / step.dur;
  const remaining = Math.max(0, step.dur - elapsed);
  const footer = (
    <React.Fragment>
      <button onClick={goPrev} disabled={stepIdx === 0} style={sessionShellStyles.ctrlBtn}>
        {t('move.prev')}
      </button>
      <button onClick={() => setPaused(p => !p)} style={sessionShellStyles.ctrlBtn}>
        {paused ? t('session.resume') : t('session.pause')}
      </button>
      <button onClick={goNext} style={sessionShellStyles.ctrlBtn}>
        {stepIdx + 1 >= routine.steps.length ? t('move.finish') : t('move.next')}
      </button>
    </React.Fragment>
  );
  return (
    <SessionShell
      routine={displayRoutine}
      onExit={onExit}
      headerExtra={<Meta>{tn('move.stepCount', { current: stepIdx + 1, total: routine.steps.length })}</Meta>}
      footer={footer}
      hint={t('move.hint')}
    >
      <div style={{ textAlign: 'center', maxWidth: 620 }}>
        <StepGlyph tag={routine.tag} stepIdx={stepIdx} />
        <div style={{ fontSize: 12, letterSpacing: '0.24em', textTransform: 'uppercase', color: 'var(--move)', marginBottom: 14, fontWeight: 500 }}>
          {tn('move.stepCount', { current: stepIdx + 1, total: routine.steps.length })}
        </div>
        <h1 style={{
          ...displayItalic,
          fontSize: 56, fontWeight: 500,
          lineHeight: 1.05, margin: '0 0 20px',
        }}>{tR(`${routine.id}.s${stepIdx}.name`, step.name)}</h1>
        <p style={{
          fontSize: 17, lineHeight: 1.55, color: 'var(--ink-2)',
          maxWidth: 460, margin: '0 auto 30px',
        }}>{tR(`${routine.id}.s${stepIdx}.cue`, step.cue)}</p>

        <div data-pace-move-timer style={{
          ...displayItalic,
          fontSize: 128, fontWeight: 400, fontVariantNumeric: 'tabular-nums',
          color: 'var(--ink)', lineHeight: 1,
        }}>{String(remaining).padStart(2, '0')}</div>
        <div style={{ fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--ink-3)', marginTop: 8 }}>{t('session.seconds')}</div>
      </div>

      <div style={{ margin: '28px auto 0', width: '100%', maxWidth: 640 }}>
        <div style={{ display: 'flex', gap: 4, alignItems: 'center', height: 10 }}>
          {routine.steps.map((s, i) => (
            <div key={i} style={{
              flex: s.dur,
              height: i === stepIdx ? 6 : 2,
              background: i < stepIdx ? 'var(--move)' : i === stepIdx ? 'var(--line)' : 'var(--paper-3)',
              borderRadius: 2, position: 'relative', overflow: 'hidden',
              transition: 'height 220ms',
            }}>
              {i === stepIdx && (
                <div style={{
                  position: 'absolute', inset: 0,
                  width: `${progress * 100}%`,
                  background: 'var(--move)',
                  transition: 'width 1s linear',
                }} />
              )}
            </div>
          ))}
        </div>
        <div style={{ textAlign: 'center', marginTop: 8, fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>
          {routine.steps[stepIdx + 1] ? `${t('move.next.prefix')} ${tR(`${routine.id}.s${stepIdx + 1}.name`, routine.steps[stepIdx + 1].name)}` : t('move.lastStep')}
        </div>
      </div>
    </SessionShell>
  );
}

  <script type="text/babel">
/* PACE · Menú post-Pomodoro
   Aparece tras completar un ciclo de foco.
   Las 3 opciones se reordenan según lo que el usuario ha hecho menos hoy:
   primero la actividad más necesaria, con indicador "Para ti".
*/

const { useEffect: useEffectBM } = React;

/* Score: cuánto se necesita esta actividad en este momento.
   Mayor → más prioritaria. Water usa escala 0-3 según vasos restantes. */
function computeScore(key, state) {
  const { plan, water } = state;
  if (key === 'breathe') return plan.respira ? 0 : 2;
  if (key === 'move') return plan.muevete ? 0 : 2;
  if (key === 'water') {
    if (water.today === 0) return 3;
    if (water.today < water.goal) return 1;
    return 0;
  }
  return 0;
}

function BreakMenu({ open, onClose, onChoose }) {
  const { t } = useT();

  /* `first.cycle` — Pomodoro completado + pausa activa elegida.
     El BreakMenu sólo se abre tras `completePomodoro`, así que aquí
     basta con detectar que el usuario eligió una de las 3 micro-pausas
     activas (Respira, Mueve, Hidrátate). "Saltar" no cuenta — la
     filosofía del logro es que se cierre el ciclo de verdad.
     Sesión 28. */
  const handleChoose = (key) => {
    if (key === 'breathe' || key === 'move' || key === 'water') {
      try { unlockAchievement('first.cycle'); } catch (e) {}
    }
    onChoose(key);
  };

  // Atajos de teclado: B (Respira) · M (Muévete) · H (Hidrátate) · Esc (Saltar).
  // Los atajos siguen mapeados por actividad (no por posición visual),
  // así el reordenamiento inteligente no los rompe.
  useEffectBM(() => {
    if (!open) return;
    const onKey = (e) => {
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      const k = e.key.toLowerCase();
      if (k === 'b') { e.preventDefault(); handleChoose('breathe'); }
      else if (k === 'm') { e.preventDefault(); handleChoose('move'); }
      else if (k === 'h') { e.preventDefault(); handleChoose('water'); }
      else if (e.key === 'Escape') { e.preventDefault(); onClose(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onChoose, onClose]);

  if (!open) return null;

  const state = getState();

  const baseOpts = [
    { key: 'breathe', label: t('break.breathe.label'), desc: t('break.breathe.desc'), color: 'var(--breathe)', bg: 'var(--breathe-soft)', icon: <BMWindIcon /> },
    { key: 'move',    label: t('break.move.label'),    desc: t('break.move.desc'),    color: 'var(--move)',    bg: 'var(--move-soft)',    icon: <BMMoveIcon /> },
    { key: 'water',   label: t('break.water.label'),   desc: t('break.water.desc'),   color: 'var(--hydrate)', bg: 'var(--hydrate-soft)', icon: <BMDropIcon /> },
  ];

  // Ordenar por score descendente; empate → orden original (sort estable).
  const opts = baseOpts
    .map(o => ({ ...o, score: computeScore(o.key, state) }))
    .sort((a, b) => b.score - a.score);

  const topScore = opts[0].score;

  return (
    <Modal open={open} onClose={onClose} tagLabel={t('break.tag')} title={t('break.title')} subtitle={t('break.subtitle')} maxWidth={720}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, margin: '20px 0' }}>
        {opts.map((o, i) => {
          const done = o.score === 0;
          const recommended = i === 0 && topScore > 0;
          return (
            <button key={o.key}
              onClick={() => handleChoose(o.key)}
              style={{
                position: 'relative',
                padding: '24px 18px',
                background: o.bg,
                border: `1.5px solid ${done ? 'var(--line)' : o.color}`,
                borderRadius: 'var(--r-md)',
                textAlign: 'left',
                display: 'flex', flexDirection: 'column', gap: 12,
                transition: 'all 220ms var(--ease)',
                cursor: 'pointer',
                color: 'var(--ink)',
              }}
              onMouseEnter={(e) => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = 'var(--sh-card)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = 'none'; }}
            >
              {/* Indicador de actividad ya completada hoy (punto color módulo) */}
              {done && (
                <span style={{
                  position: 'absolute', top: 10, right: 10,
                  width: 6, height: 6, borderRadius: '50%',
                  background: o.color, opacity: 0.6,
                }} />
              )}
              {/* Tag "Para ti" en la opción recomendada */}
              {recommended && (
                <Tag color="var(--focus)">{t('break.recommended')}</Tag>
              )}
              <div style={{ color: o.color, fontSize: 28 }}>{o.icon}</div>
              <div>
                <div style={{ ...displayItalic, fontSize: 22, fontWeight: 500, marginBottom: 4 }}>{o.label}</div>
                <div style={{ fontSize: 12, color: 'var(--ink-2)' }}>
                  {done ? t('break.done') : o.desc}
                </div>
              </div>
            </button>
          );
        })}
      </div>

/* Logros con trigger implementado en state.jsx / main.jsx / BreatheModule.jsx.
   El resto se pinta en la colección como "Pronto" — visible para incentivar
   curiosidad, pero sin prometer lo que el código todavía no puede detectar.

   Los secretos NO se revelan: aunque estén sin implementar, se pintan como
   secretos normales (glifo "?" + título oculto). Por eso esta lista solo
   mira logros NO-secretos. */
const IMPLEMENTED_ACHIEVEMENTS = new Set([
  // Primeros pasos (10/10) — sesión 28 cierra esta categoría:
  // +first.cycle (BreakMenu → pausa activa), +first.ritual (4 módulos

  // +first.plan (mismo trigger que ritual), +first.return (rollover

  'first.cycle', 'first.ritual', 'first.day', 'first.plan', 'first.return',

  'streak.3', 'streak.7', 'streak.14', 'streak.30', 'streak.60',

  // Exploración breathe (9/20)

  'explore.bhastrika', 'explore.nadi', 'explore.ujjayi',
  'explore.kapalabhati', 'explore.physiological',
  // Exploración move (6/20) — reconectados en sesión 15
  'explore.hips', 'explore.shoulders', 'explore.atg',
  'explore.ancestral', 'explore.neck', 'explore.desk',
  // Maestría (13/25) — sesión 29: +master.long.focus, +master.dawn, +master.dusk.
  // Sesión 34: +master.collector.half/full, +master.silent.day, +master.retreat.
  // Sesión 41: +master.box.10, +master.coherent.10, +master.rounds.10, +master.atg.20.
  'master.pomodoro.8', 'master.focus.day',
  'master.long.focus', 'master.dawn', 'master.dusk',
  'master.collector.half', 'master.collector.full',
  'master.silent.day', 'master.retreat',
  'master.box.10', 'master.coherent.10', 'master.rounds.10', 'master.atg.20',
  // Exploración extra (1/20) — tweak-secrets desbloqueados por abrir el panel
  'explore.tweaks',
  // Secretos (10/21) — los secretos con trigger se siguen pintando como secretos.
  // Sesión 17: +5 tweak-secrets (aged, dark.mode, mono, seal, illustrated).
  'secret.cow.click', 'secret.breath.hold.60',
  'secret.breath.hold.90', 'secret.breath.hold.120',
  'secret.supporter',
  'secret.aged', 'secret.dark.mode', 'secret.mono',
  'secret.seal', 'secret.illustrated',
]);

function isImplemented(a) {
  // Los secretos siempre se pintan como secretos (revelen o no).
  // El estado "Pronto" es para logros visibles no-secretos sin trigger.
  return a.secret || IMPLEMENTED_ACHIEVEMENTS.has(a.id);
}

function Achievements({ open, onClose }) {
  const [state] = usePace();
  const { t } = useT();
  const unlocked = state.achievements || {};
  const unlockedCount = Object.keys(unlocked).length;
  // Clasificación sesión 15: disponibles = con trigger hoy; próximamente = sin trigger.
  // Los secretos se cuentan como disponibles (su mecánica es "intriga", no "pronto").
  const availableCount = ACHIEVEMENT_CATALOG.filter(isImplemented).length;
  const comingSoonCount = ACHIEVEMENT_CATALOG.length - availableCount;

  return (
    <Modal open={open} onClose={onClose} tagLabel={t('ach.tag')} title={t('ach.title')} subtitle={t('ach.subtitle')} maxWidth={920}>
      {/* Counter */}
      <div style={{ display: 'flex', gap: 20, margin: '8px 0 24px', padding: '16px 20px', background: 'var(--paper-2)', borderRadius: 'var(--r-md)', border: '1px solid var(--line)' }}>
        <div>
          <div style={{ ...displayItalic, fontSize: 36, fontWeight: 500, lineHeight: 1 }}>
            {unlockedCount}<span style={{ color: 'var(--ink-3)', fontSize: 20 }}> / {availableCount}</span>
          </div>
          <Meta style={{ marginTop: 4 }}>{t('ach.available')}</Meta>
        </div>
        <Divider style={{ width: 1, height: 'auto', background: 'var(--line)' }} />
        <div>
          <div style={{ ...displayItalic, fontSize: 36, fontWeight: 500, lineHeight: 1 }}>
            {comingSoonCount}
          </div>
          <Meta style={{ marginTop: 4 }}>{t('ach.coming.soon')}</Meta>
        </div>
      </div>

      {Object.entries(CAT_META).map(([cat, meta]) => {
        const items = ACHIEVEMENT_CATALOG.filter(a => a.cat === cat);
        const gotThisCat = items.filter(a => unlocked[a.id]).length;
        return (
          <div key={cat} style={{ marginBottom: 28 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
              <h3 style={{ ...displayItalic, fontSize: 22, margin: 0, fontWeight: 500, color: meta.color }}>{t(meta.labelKey)}</h3>
              <Meta>{gotThisCat} / {items.length}</Meta>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(128px, 1fr))', gap: 12 }}>
              {items.map(a => (
                <Seal
                  key={a.id}
                  achievement={a}
                  unlocked={!!unlocked[a.id]}
                  implemented={isImplemented(a)}
                  color={meta.color}
                />
              ))}
            </div>
          </div>
        );
      })}
    </Modal>
  );
}

/* Tres estados del sello:
   1. unlocked         → borde color sólido, opacidad 1, descripción visible.
   2. locked           → borde dashed gris, opacidad 0.55, descripción visible
                         (guía al usuario: "esto se puede cazar").
   3. comingSoon       → borde dotted gris, opacidad 0.38, glifo opaco 0.25,
                         descripción sustituida por "Pronto" (crea curiosidad
                         sin ser opaco). Badge "Pronto" en esquina.
   Los secretos no-desbloqueados saltan siempre a modo secreto (glifo ?,
   título "Secreto") — su mecánica es intriga, no señalización. */
function Seal({ achievement, unlocked, implemented, color }) {
  const { t } = useT();
  const a = achievement;

/* PACE · Panel de estadísticas semanales */

function WeeklyStats({ open, onClose }) {
  const [state] = usePace();
  const { t } = useT();
  const w = state.weeklyStats;

  const totals = {
    focus: w.focusMinutes.reduce((a,b)=>a+b, 0),
    breath: w.breathMinutes.reduce((a,b)=>a+b, 0),
    move: w.moveMinutes.reduce((a,b)=>a+b, 0),
    water: w.waterGlasses.reduce((a,b)=>a+b, 0),
  };

  const bars = [
    { key: 'focus', label: t('topbar.mode.focus'), color: 'var(--focus)', data: w.focusMinutes, unit: t('stats.unit.min') },
    { key: 'breath', label: t('activity.breathe.label'), color: 'var(--breathe)', data: w.breathMinutes, unit: t('stats.unit.min') },
    { key: 'move', label: t('activity.move.label'), color: 'var(--move)', data: w.moveMinutes, unit: t('stats.unit.min') },
    { key: 'water', label: t('activity.hydrate.label'), color: 'var(--hydrate)', data: w.waterGlasses, unit: t('stats.unit.glasses') },

  return (
    <Modal open={open} onClose={onClose} tagLabel={t('stats.tag')} title={t('stats.title')} subtitle={t('stats.subtitle')} maxWidth={780}>
      {/* Totales */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, margin: '8px 0 24px' }}>
        {bars.map(b => (
          <div key={b.key} style={{
            padding: '16px 14px',
            background: 'var(--paper-2)',
            borderRadius: 'var(--r-md)',
            border: `1px solid var(--line)`,
            borderTop: `3px solid ${b.color}`,
          }}>
            <Meta style={{ fontSize: 10, marginBottom: 6 }}>{b.label}</Meta>
            <div style={{
              fontFamily: 'var(--font-display)',
              fontStyle: 'italic', fontSize: 28, fontWeight: 500, lineHeight: 1,
            }}>{b.key === 'water' ? totals[b.key] : totals[b.key]}</div>
            <div style={{ fontSize: 10, color: 'var(--ink-3)', marginTop: 4 }}>{b.unit}</div>
          </div>
        ))}
      </div>

      {/* Gráfico por días */}
      {bars.map(b => (
        <WeekBarRow key={b.key} label={b.label} data={b.data} color={b.color} unit={b.unit} />
      ))}

      <div style={{
        marginTop: 24, padding: 14,
        background: 'var(--paper-2)',
        borderRadius: 'var(--r-sm)',
        fontSize: 12, color: 'var(--ink-2)', lineHeight: 1.6,
      }}>
        <strong style={{ color: 'var(--ink)', fontStyle: 'italic', fontFamily: 'var(--font-display)' }}>{t('stats.note.label')}{' '}</strong>
        {t('stats.note')}
      </div>
    </Modal>
  );
}

function WeekBarRow({ label, data, color, unit }) {
  const { t } = useT();
  const days = t('stats.days').split(',');
  const today = (new Date().getDay() + 6) % 7;
  const max = Math.max(1, ...data);
  // Reordenar: en España empezamos en lunes. data está indexado 0=Dom (getDay)
  const reordered = [data[1], data[2], data[3], data[4], data[5], data[6], data[0]];

  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
        <span style={{ ...displayItalic, fontSize: 13, color: 'var(--ink-2)', fontWeight: 500 }}>{label}</span>
        <Meta>{unit}</Meta>
      </div>
      <div style={{ display: 'flex', gap: 6, alignItems: 'flex-end', height: 64 }}>
        {reordered.map((v, i) => {
          const h = (v / max) * 100;
          const isToday = i === today;
          return (
            <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              <div style={{ flex: 1, width: '100%', display: 'flex', alignItems: 'flex-end', position: 'relative' }}>
                <div style={{
                  width: '100%',
                  height: `${h}%`,
                  minHeight: v > 0 ? 4 : 2,
                  background: v > 0 ? color : 'var(--line)',
                  opacity: isToday ? 1 : (v > 0 ? 0.8 : 0.4),
                  borderRadius: '3px 3px 0 0',
                  transition: 'height 320ms var(--ease)',
                  position: 'relative',
                }}>
                  {v > 0 && (
                    <span style={{
                      position: 'absolute', bottom: '100%', left: '50%',
                      transform: 'translateX(-50%)',
                      fontSize: 10, color: 'var(--ink-3)',
                      marginBottom: 4,
                      fontVariantNumeric: 'tabular-nums',
                    }}>{v}</span>
                  )}
                </div>
              </div>
              <span style={{
                fontSize: 10,
                color: isToday ? 'var(--ink)' : 'var(--ink-3)',
                fontWeight: isToday ? 600 : 400,
                letterSpacing: 0.3,
              }}>{days[i]}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* PACE · TweakSecretsWatcher
   ============================================================
   Detectores de secretos ligados a tweaks (palette, font, logo).
   Extraído de TweaksPanel.jsx en sesión 41 para mantener ambos
   archivos bajo el límite de 500 líneas.

   Monta siempre (en main.jsx) para que los secretos se disparen
   al cambiar un tweak desde Ajustes O por import JSON — no solo
   cuando el panel está abierto.
   ============================================================ */

const { useEffect: useEffectSW } = React;

/* Días en paleta oscura — clave independiente de pace.state.v2.
   Solo alimenta secret.dark.mode; no engordar el state principal. */
const DARK_DAYS_KEY = 'pace.darkDays.v1';

function TweakSecretsWatcher() {
  const [state] = usePace();

  // secret.aged — paleta 'envejecido' activa.
  useEffectSW(() => {
    if (state.palette === 'envejecido') unlockAchievement('secret.aged');
  }, [state.palette]);

  /* secret.mono — el Tweak de tipografía se retiró en sesión 20.
     Sigue escuchando por si el valor llega vía import JSON o devtools. */
  useEffectSW(() => {
    if (state.font === 'mono') unlockAchievement('secret.mono');
  }, [state.font]);

  /* Logros de logoVariant — conservados por compat / easter eggs futuros. */
  useEffectSW(() => {
    if (state.logoVariant === 'sello') unlockAchievement('secret.seal');
    if (state.logoVariant === 'ilustrado') unlockAchievement('secret.illustrated');
  }, [state.logoVariant]);

  /* secret.dark.mode — "7 días en oscuro" (días de calendario distintos,
     no necesariamente consecutivos). Cap de 30 fechas. */
  useEffectSW(() => {
    if (state.palette !== 'oscuro') return;
    try {
      const today = new Date().toISOString().slice(0, 10);
      const raw = localStorage.getItem(DARK_DAYS_KEY);
      let days;
      try { days = new Set(JSON.parse(raw || '[]')); } catch (e) { days = new Set(); }
      if (!days.has(today)) {
        days.add(today);
        const arr = Array.from(days).slice(-30);
        localStorage.setItem(DARK_DAYS_KEY, JSON.stringify(arr));
        if (arr.length >= 7) unlockAchievement('secret.dark.mode');
      } else if (days.size >= 7) {
        unlockAchievement('secret.dark.mode');
      }
    } catch (e) { /* silencioso */ }
  }, [state.palette]);

  return null;
}

Object.assign(window, { TweakSecretsWatcher });

</script>

const { useState: useStateTW, useEffect: useEffectTW, useRef: useRefTW } = React;

function TweaksPanel({ open, onClose }) {
  const [state, set] = usePace();

  const [msg, setMsg] = useStateTW(null); // {kind, text} para feedback Export/Import

      { v: 'minimal', name: t('tweaks.layout.minimal') },
    ]},
    { key: 'timerStyle', label: t('tweaks.eje.timer'), options: [

      { v: 'barra', name: t('tweaks.timer.barra') },
      { v: 'analogico', name: t('tweaks.timer.analogico') },

  /* ============================================================

  const exportJSON = () => {
    try {
      const raw = localStorage.getItem('pace.state.v2') || '{}';

      const payload = {
        app: 'PACE',
        version: PACE_VERSION,
        exportedAt: new Date().toISOString(),
        state: parsed,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const yyyymmdd = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      a.href = url;
      a.download = `pace-backup-${yyyymmdd}.json`;

      <Divider style={{ margin: '14px 0' }} />

      {/* ============================================================
          Datos — Export / Import JSON (sesión 17 / v0.12.0)
          ============================================================ */}
      <Meta style={{ marginBottom: 8 }}>{t('tweaks.data.meta')}</Meta>
      <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
        <button
          onClick={exportJSON}
          style={tweaksStyles.dataBtn}
          title={t('tweaks.data.export.title')}
        >
          <DownloadIcon /> <span>{t('tweaks.data.export')}</span>
        </button>
        <button
          onClick={() => fileInputRef.current && fileInputRef.current.click()}
          style={tweaksStyles.dataBtn}
          title={t('tweaks.data.import.title')}
        >
          <UploadIcon /> <span>{t('tweaks.data.import')}</span>
        </button>
        <input
          ref={fileInputRef}
          type="file"
          accept="application/json,.json"
          style={{ display: 'none' }}
          onChange={(e) => {
            const f = e.target.files && e.target.files[0];
            importJSON(f);
            e.target.value = ''; // permitir re-importar el mismo archivo
          }}
        />
      </div>
      {msg && (
        <div style={{
          fontSize: 10.5,
          color: msg.kind === 'err' ? 'var(--breathe)' : 'var(--focus)',
          fontFamily: 'var(--font-display)',
          fontStyle: 'italic',
          marginBottom: 8,
          letterSpacing: 0.1,
          textAlign: 'center',
        }}>{msg.text}</div>
      )}
      <div style={{
        fontSize: 10,
        color: 'var(--ink-3)',
        lineHeight: 1.4,
        letterSpacing: 0.1,
        marginBottom: 4,
      }}>
        {t('tweaks.data.note')}
      </div>

      <Divider style={{ margin: '14px 0' }} />

      {/* Reset */}
      <button
        onClick={() => { if (confirm(t('tweaks.confirm.reset'))) { localStorage.removeItem('pace.state.v2'); location.reload(); } }}
        style={{
          width: '100%',
          padding: '8px',
          fontSize: 11,
          color: 'var(--ink-3)',
          border: '1px dashed var(--line)',
          borderRadius: 'var(--r-sm)',
          letterSpacing: 0.2,
        }}
      >{t('tweaks.reset')}</button>
    </div>
  );
}

  <script type="text/babel">
/* PACE · Foco · Cuerpo
   Copyright © 2026 ezradesign
   Licensed under the Elastic License 2.0 — see LICENSE

   Main orchestrator.
   Monta todo: Sidebar + FocusTimer + modales de librerías + sesiones

   RESPONSIVE (sesión 22 · v0.12.5):
     El layout desktop es flex horizontal [Sidebar 280 | Main 1fr].
     En ≤768px el sidebar se absolutamente desacopla (pasa a
     position:fixed y ocupa el viewport entero — ver Sidebar.jsx),
     así que en móvil el main toma 100vw por sí solo sin cambios.
     Los ajustes aquí son sobre TopBar y ActivityBar para que
     quepan en 375px de ancho, y sobre el handle flotante `≡` para
     aumentar su hit target a 44px (accesibilidad móvil).
*/

const { useState: useStateMain, useEffect: useEffectMain } = React;

/* Reglas responsive globales del layout. Inyectadas una sola vez.
   - TopBar: reduce padding lateral y el ancho de los tabs en móvil
     para dejar sitio a los 3 iconos de la derecha sin que choquen.
   - Main content: en móvil sigue centrando el timer pero con menos
     padding horizontal para ganar ancho para el aro.
   - ActivityBar: en móvil, los 4 accesos pasan de fila horizontal
     de pills anchos (min-width 180) a grid 2×2 de tarjetas
     compactas (chip vertical: icono arriba, label abajo).
     Así el bloque completo mide ~220px de alto en 375×812 y deja
     que el timer ocupe unos ~420 px centrales. */
if (typeof document !== 'undefined' && !document.getElementById('pace-main-responsive-css')) {
  const s = document.createElement('style');
  s.id = 'pace-main-responsive-css';
  s.textContent = `
    /* Alto del contenedor raíz: 100vh de fallback + 100dvh en navegadores
       modernos. 100dvh (dynamic viewport height) se recalcula cuando la
       barra de URL móvil aparece/desaparece, así que la app siempre
       encaja en el espacio real visible en vez de quedarse atada al
       alto máximo (con URL oculta) como hace 100vh. En desktop 1920×1080
       100dvh === 100vh — cero impacto. Fallback garantiza que navegadores
       antiguos (pre-iOS 15.4 / Chrome 107 / Firefox 100) siguen usando vh.
       Sesión 23 · v0.12.6. */
    [data-pace-app-root] {
      height: 100vh;
      height: 100dvh;
      max-height: 100vh;
      max-height: 100dvh;
    }
    @media (max-width: 768px) {
      [data-pace-topbar] {
        padding: 10px 12px !important;
        min-height: 48px !important;
        gap: 4px !important;
      }
      /* Tabs Foco/Pausa/Larga: más compactos */
      [data-pace-topbar] [data-pace-tabs] button {
        padding: 5px 12px !important;
        font-size: 10px !important;
        letter-spacing: 0.14em !important;
      }
      /* Iconos top-right: hit target 40x40 */
      [data-pace-topbar] [data-pace-topbar-icon] {
        width: 40px !important;
        height: 40px !important;
      }
      /* Main content: menos padding para ganar ancho del aro */
      [data-pace-main-content] {
        padding: 4px 12px !important;
      }
      /* ActivityBar en móvil: grid 2×2, chips compactos verticales */
      [data-pace-activitybar] {
        padding: 4px 12px 14px !important;
      }
      [data-pace-activitybar-grid] {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 8px !important;
      }
      [data-pace-activitybar-chip] {
        min-width: 0 !important;
        flex: 1 1 auto !important;
        padding: 10px 12px !important;
        gap: 10px !important;
      }
      [data-pace-activitybar-chip] [data-pace-chip-label] {
        font-size: 15px !important;
      }
      [data-pace-activitybar-chip] [data-pace-chip-sub] {
        font-size: 11px !important;
      }
      /* Handle flotante ≡ para abrir sidebar: hit target ≥44px */
      [data-pace-sidebar-open] {
        width: 44px !important;
        height: 44px !important;
        top: 8px !important;
        left: 8px !important;
      }
    }
    /* Viewports muy bajos (≤700 de alto): reducir aún más la ActivityBar
       para dejar que el aro respire. Sólo afecta móvil vertical pequeño. */
    @media (max-width: 768px) and (max-height: 720px) {
      [data-pace-activitybar-chip] {
        padding: 8px 10px !important;
      }
      [data-pace-activitybar-chip] [data-pace-chip-label] {
        font-size: 14px !important;
      }
      [data-pace-activitybar-chip] [data-pace-chip-sub] {
        display: none !important;
      }
    }
  `;
  document.head.appendChild(s);
}

function PaceApp() {
  const [state, set] = usePace();
  const { t } = useT();
  const [view, setView] = useStateMain({ type: 'home' });

  // Modales
  const [openLibrary, setOpenLibrary] = useStateMain(null); // 'breathe' | 'move' | 'extra' | null
  const [openHydrate, setOpenHydrate] = useStateMain(false);
  const [openAchievements, setOpenAchievements] = useStateMain(false);
  const [openStats, setOpenStats] = useStateMain(false);
  const [openTweaks, setOpenTweaks] = useStateMain(false);
  const [openBreakMenu, setOpenBreakMenu] = useStateMain(false);
  const [openSupport, setOpenSupport] = useStateMain(false);
  const [openWelcome, setOpenWelcome] = useStateMain(false);

  // Flujo de seguridad para respiración
  const [safetyRoutine, setSafetyRoutine] = useStateMain(null);

  // Logro secreto: clicks en la vaca del logo (sidebar o topbar).
  // Se escucha como evento global para que el Sidebar pueda disparar clicks
  // sobre el logo sin acoplarse a props del root.
  const [cowClicks, setCowClicks] = useStateMain(0);
  useEffectMain(() => {
    if (cowClicks >= 10) unlockAchievement('secret.cow.click');
  }, [cowClicks]);
  useEffectMain(() => {
    const h = () => setCowClicks(c => c + 1);
    window.addEventListener('pace:cow-click', h);
    return () => window.removeEventListener('pace:cow-click', h);
  }, []);

  // Abrir colección desde sidebar
  useEffectMain(() => {
    const h = () => setOpenAchievements(true);
    window.addEventListener('pace:open-achievements', h);
    return () => window.removeEventListener('pace:open-achievements', h);
  }, []);

  // Abrir modal de apoyo desde sidebar (sesión 16 / v0.11.11).
  // Mismo patrón que `pace:open-achievements`: el Sidebar despacha el
  // evento y aquí lo escuchamos para abrir. Desacopla el botón del root.
  useEffectMain(() => {
    const h = () => setOpenSupport(true);
    window.addEventListener('pace:open-support', h);
    return () => window.removeEventListener('pace:open-support', h);
  }, []);

  // Auto-trigger único del SupportModal a los 7 días de racha.
  // Consumidor del helper expuesto en SupportModule.jsx; la lógica
  // ('condición + flag de una sola vez') vive allí para mantenerla
  // junto a la filosofía del módulo.
  useSupportAutoTrigger(setOpenSupport);

  // Auto-trigger del WelcomeModal la primera vez que se abre la app
  // (state.firstSeen == null). Mismo patrón que el anterior.
  useFirstTimeWelcome(setOpenWelcome);

  // Re-abrir welcome a mano (dev / curiosidad): evento global
  // `pace:open-welcome`. Mismo patrón que `pace:open-support`.
  useEffectMain(() => {
    const h = () => setOpenWelcome(true);
    window.addEventListener('pace:open-welcome', h);
    return () => window.removeEventListener('pace:open-welcome', h);
  }, []);

  // Atajo logros
  useEffectMain(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 't' || e.key === 'T') setOpenTweaks(o => !o);
      if (e.key === 's' || e.key === 'S') setOpenStats(o => !o);
      if (e.key === 'l' || e.key === 'L') setOpenAchievements(o => !o);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Handle start de una rutina
  const handleStartBreathe = (routine) => {
    if (routine.safety) {
      setSafetyRoutine(routine);
      setOpenLibrary(null);
    } else {
      setOpenLibrary(null);
      setView({ type: 'breathe-session', routine });
    }
  };

  const handleStartMove = (routine) => {
    setOpenLibrary(null);
    setView({ type: 'move-session', routine });
  };
  const handleStartExtra = (routine) => {
    setOpenLibrary(null);
    // Reutiliza MoveSession pero marca kind='extra' para que la completion
    // dispare completeExtraSession (logros correctos, plan.extra, no plan.muevete).
    setView({ type: 'move-session', routine, kind: 'extra' });
  };

  const handleFocusFinish = () => {
    // Al acabar un Pomodoro → menú pausa
    setOpenBreakMenu(true);
  };

  const handleBreakChoice = (choice) => {
    setOpenBreakMenu(false);
    if (choice === 'breathe') setOpenLibrary('breathe');
    else if (choice === 'move') setOpenLibrary('move');
    else if (choice === 'water') setOpenHydrate(true);
  };

  return (
    /* NOTA sesión 23: `height` y `maxHeight` se delegan al bloque CSS
       inyectado [data-pace-app-root] arriba. Permite fallback vh →
       override dvh que los objetos de estilos inline no pueden
       expresar (una sola key por propiedad). El resto de estilos
       (display, overflow, background, position) se quedan inline
       porque no necesitan fallback cascada. */
    <div data-pace-app-root style={{
      display: 'flex',
      overflow: 'hidden',
      background: 'var(--paper)',
      position: 'relative',
    }}>
      {/* SIDEBAR */}
      {state.layout !== 'minimal' && <Sidebar />}

      {/* Handle flotante para re-abrir sidebar cuando está oculto
          (aparece sólo en layout con sidebar y cuando está colapsado).
          En móvil (≤768px) el CSS lo amplía a 44×44 (hit target
          accesible) — ver bloque pace-main-responsive-css arriba. */}
      {state.layout !== 'minimal' && state.sidebarCollapsed && (
        <button
          data-pace-sidebar-open
          onClick={() => set({ sidebarCollapsed: false })}
          title={t('sidebar.open.title')}
          aria-label={t('sidebar.open.aria')}
          style={{
            position: 'fixed', top: 16, left: 14, zIndex: 50,
            width: 30, height: 30, borderRadius: 6,
            display: 'grid', placeItems: 'center',
            background: 'transparent', border: '1px solid transparent',
            color: 'var(--ink-3)', transition: 'all 180ms',
          }}
          onMouseEnter={(e) => { e.currentTarget.style.color = 'var(--ink)'; e.currentTarget.style.background = 'var(--paper-2)'; e.currentTarget.style.borderColor = 'var(--line)'; }}
          onMouseLeave={(e) => { e.currentTarget.style.color = 'var(--ink-3)'; e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = 'transparent'; }}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <line x1="4" y1="7" x2="20" y2="7" />
            <line x1="4" y1="12" x2="14" y2="12" />
            <line x1="4" y1="17" x2="20" y2="17" />
          </svg>
        </button>
      )}

      {/* MAIN AREA */}
      <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, height: '100%', overflow: 'hidden' }}>
        {/* Top bar */}
        <TopBar
          onOpenLibrary={(kind) => setOpenLibrary(kind)}
          onOpenHydrate={() => setOpenHydrate(true)}
          onOpenStats={() => setOpenStats(true)}
          onOpenTweaks={() => setOpenTweaks(true)}
        />

        {/* Content */}
        <div data-pace-main-content style={{
          flex: 1,
          display: 'grid',
          placeItems: 'center',
          padding: '10px 40px',
          minHeight: 0,
          overflow: 'hidden',
        }}>
          <FocusTimer onFinish={handleFocusFinish} />
        </div>

        {/* Actividades footer */}
        <ActivityBar
          onOpenLibrary={(kind) => setOpenLibrary(kind)}
          onOpenHydrate={() => setOpenHydrate(true)}
        />
      </main>

      {/* ========== MODALS ========== */}
      <BreatheLibrary
        open={openLibrary === 'breathe'}
        onClose={() => setOpenLibrary(null)}
        onStart={handleStartBreathe}
      />
      <MoveLibrary
        open={openLibrary === 'move'}
        onClose={() => setOpenLibrary(null)}
        onStart={handleStartMove}
      />
      <ExtraLibrary
        open={openLibrary === 'extra'}
        onClose={() => setOpenLibrary(null)}
        onStart={handleStartExtra}
      />
      <HydrateTracker open={openHydrate} onClose={() => setOpenHydrate(false)} />
      <Achievements open={openAchievements} onClose={() => setOpenAchievements(false)} />
      <WeeklyStats open={openStats} onClose={() => setOpenStats(false)} />
      <TweaksPanel open={openTweaks} onClose={() => setOpenTweaks(false)} />
      <BreakMenu
        open={openBreakMenu}
        onClose={() => setOpenBreakMenu(false)}
        onChoose={handleBreakChoice}
      />
      <SupportModal open={openSupport} onClose={() => setOpenSupport(false)} />
      <WelcomeModal open={openWelcome} onClose={() => setOpenWelcome(false)} />

      {/* Observador de tweak-secrets — monta siempre, retorna null.
          Desbloquea secret.aged / dark.mode / mono / seal / illustrated
          en función del state actual. Ver TweaksPanel.jsx. */}
      <TweakSecretsWatcher />

      {safetyRoutine && (
        <BreatheSafety
          routine={safetyRoutine}
          onAccept={(r) => { setSafetyRoutine(null); setView({ type: 'breathe-session', routine: r }); }}
          onCancel={() => setSafetyRoutine(null)}
        />
      )}

      {/* ========== SESSION FULLSCREEN ==========
          NOTA (#29): los <Session/> llaman `onExit('exit')` vs `onExit('done')`
          para diferenciar salida voluntaria de finalización completa. Hoy
          ambos caminos van a home y el argumento se descarta intencionalmente;
          se conserva la señal en la API para un futuro consumidor (p.ej.
          micro-animación de despedida distinta, o métrica de abandono). */}
      {view.type === 'breathe-session' && (
        <BreatheSession routine={view.routine} onExit={(_reason) => setView({ type: 'home' })} />
      )}
      {view.type === 'move-session' && (
        <MoveSession routine={view.routine} kind={view.kind || 'move'} onExit={(_reason) => setView({ type: 'home' })} />
      )}

      {/* ========== TOASTS ========== */}
      <ToastHost />
    </div>
  );
}

/* ================
   TOP BAR
   ================ */
function TopBar({ onOpenLibrary, onOpenHydrate, onOpenStats, onOpenTweaks }) {
  const [state, set] = usePace();
  const { t } = useT();
  const modes = [
    { v: 'foco', label: t('topbar.mode.focus') },
    { v: 'pausa', label: t('topbar.mode.pause') },
    { v: 'larga', label: t('topbar.mode.long') },
  ];
  return (
    <div data-pace-topbar style={{
      position: 'relative',
      display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
      padding: '14px 24px',
      gap: 8,
      flexShrink: 0,
      minHeight: 56,
    }}>
      {/* Tabs centrados (según referencia) */}
      <div data-pace-tabs style={{
        position: 'absolute', left: '50%', top: '50%',
        transform: 'translate(-50%, -50%)',
        display: 'inline-flex',
        background: 'var(--paper-2)',
        border: '1px solid var(--line)',
        borderRadius: 'var(--r-pill)',
        padding: 3,
        gap: 2,
      }}>
        {modes.map(m => (
          <button key={m.v} onClick={() => set({ focusMode: m.v })}
            style={{
              padding: '6px 18px',
              fontSize: 11,
              letterSpacing: '0.18em',
              textTransform: 'uppercase',
              fontWeight: 500,
              borderRa
