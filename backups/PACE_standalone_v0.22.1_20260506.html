/* ============================================
   PACE · Design Tokens
   Cambios aquí se reflejan en toda la app.
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter+Tight:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* PALETA · Crema día (default) */
  --paper: #F2EDE0;
  --paper-2: #EAE4D4;
  --paper-3: #DFD8C4;
  --ink: #1F1C17;
  --ink-2: #4A453C;
  --ink-3: #8A8372;
  --line: #C9C0A8;
  --line-2: #B8AD8E;

  --focus: #3E5A3A;
  --focus-2: #2A3E27;
  --focus-soft: rgba(62, 90, 58, 0.10);

  --breathe: #C97A5D;
  --breathe-2: #A85E43;
  --breathe-soft: rgba(201, 122, 93, 0.12);

  --move: #9A7B4F;
  --move-soft: rgba(154, 123, 79, 0.12);

  --extra: #6B7A8F;
  --extra-soft: rgba(107, 122, 143, 0.12);

  --hydrate: #5F8A9B;
  --hydrate-soft: rgba(95, 138, 155, 0.12);

  --achievement: #B8934A;
  --achievement-soft: rgba(184, 147, 74, 0.12);

  /* TIPOGRAFÍA */
  --font-display: 'EB Garamond', 'Cormorant Garamond', Georgia, serif;
  --font-ui: 'Inter Tight', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  --size-hero: clamp(96px, 12vw, 180px);
  --size-h1: 40px;
  --size-h2: 28px;
  --size-h3: 20px;
  --size-body: 15px;
  --size-sm: 13px;
  --size-meta: 11px;

  --lh-tight: 1.1;
  --lh-normal: 1.45;
  --lh-relaxed: 1.65;

  --track-meta: 0.14em;
  --track-tag: 0.08em;

  /* ESPACIADO */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --s-7: 48px;
  --s-8: 64px;
  --s-9: 96px;

  /* RADIUS */
  --r-xs: 4px;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 20px;
  --r-pill: 999px;

  /* SHADOWS */
  --sh-soft: 0 1px 2px rgba(31, 28, 23, 0.06), 0 4px 16px rgba(31, 28, 23, 0.04);
  --sh-card: 0 1px 3px rgba(31, 28, 23, 0.05), 0 8px 24px rgba(31, 28, 23, 0.06);
  --sh-modal: 0 8px 40px rgba(31, 28, 23, 0.18);

  /* MISC */
  --dur-quick: 180ms;
  --dur-normal: 320ms;
  --dur-slow: 640ms;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

/* PALETA · Oscuro noche */
[data-palette="oscuro"] {
  --paper: #1A1814;
  --paper-2: #252119;
  --paper-3: #302B21;
  --ink: #EDE5D3;
  --ink-2: #B8AF9A;
  --ink-3: #756D5D;
  --line: #3C3628;
  --line-2: #4E4735;
  --focus: #7A9A6D;
  --focus-2: #98B58B;
  --focus-soft: rgba(122, 154, 109, 0.12);
  --breathe: #D99477;
  --breathe-2: #E8A98F;
  --breathe-soft: rgba(217, 148, 119, 0.14);
}

/* PALETA · Papel envejecido */
[data-palette="envejecido"] {
  --paper: #EDE2C8;
  --paper-2: #E3D6B6;
  --paper-3: #D6C8A3;
  --ink: #2B241A;
  --ink-2: #5A4F3C;
  --ink-3: #8F826A;
  --line: #BEAF8C;
  --focus: #56663E;
  --breathe: #B86A4D;
}

/* TIPOGRAFÍAS ALT */
[data-font="cormorant"] {
  --font-display: 'Cormorant Garamond', Georgia, serif;
}
[data-font="mono"] {
  --font-display: 'JetBrains Mono', ui-monospace, monospace;
  --font-ui: 'JetBrains Mono', ui-monospace, monospace;
}

/* RESET MÍNIMO */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  font-size: var(--size-body);
  line-height: var(--lh-normal);
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  transition: background-color var(--dur-normal) var(--ease), color var(--dur-normal) var(--ease);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, textarea { font-family: inherit; color: inherit; }

/* UTILIDADES */
.pace-display { font-family: var(--font-display); }
.pace-display-italic { font-family: var(--font-display); font-style: italic; }
.pace-meta {
  font-size: var(--size-meta);
  letter-spacing: var(--track-meta);
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.pace-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  font-size: 10px;
  letter-spacing: var(--track-tag);
  text-transform: uppercase;
  border-radius: var(--r-pill);
  border: 1px solid currentColor;
  font-weight: 500;
}

/* SCROLLBAR SUTIL */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; border: 3px solid var(--paper); }
::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

/* FOCUS ACCESIBLE */
:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
  border-radius: var(--r-xs);
}

/* REDUCED MOTION */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

  </style>

/* PACE · i18n helper — useT + detectInitialLang
   Sesión 35 · v0.17.0

   DEBE cargarse DESPUÉS de strings.js y ANTES de state.jsx,
   porque state.jsx llama a detectInitialLang() al evaluar loadState().

function detectInitialLang() {
  const nav = (navigator.language || 'en').slice(0, 2).toLowerCase();
  return nav === 'es' ? 'es' : 'en';
}

/* isDev: true en localhost, 127.0.0.1 o file:// — activa console.warn
   para claves faltantes. En producción (dominio real) es silencioso. */
const _i18nIsDev = (
  ['localhost', '127.0.0.1'].includes(location.hostname) ||
  location.protocol === 'file:'
);

/* useT — hook reactivo que lee state.lang y devuelve las funciones
   de traducción t() y tn() (con variables {key}).

   Depende de usePace (state.jsx) y PACE_STRINGS (strings.js).
   Ambos deben estar cargados antes de que cualquier componente
   que use useT() se monte. */
function useT() {
  const [state] = usePace();
  const lang = state.lang || 'en';

  function t(key) {
    const strings = window.PACE_STRINGS;
    if (!strings) return key;
    if (strings[lang] && strings[lang][key] !== undefined) return strings[lang][key];
    if (strings.en && strings.en[key] !== undefined) {
      if (_i18nIsDev) console.warn(`[i18n] missing ${lang}: ${key}`);
      return strings.en[key];
    }
    if (_i18nIsDev) console.warn(`[i18n] missing key: ${key}`);
    return key;
  }

  function tn(key, vars) {
    let str = t(key);
    if (vars) {
      Object.keys(vars).forEach(k => {
        str = str.split(`{${k}}`).join(String(vars[k]));
      });
    }
    return str;
  }

  return { t, tn, lang };
}

  //   existentes, pero SupportModule ignora su valor.
  supportSeenAt: null,
  supportCopyVariant: 'pastar',

  // Recordatorios — DECISIÓN (v0.11.3): la sección de UI se eliminó del Sidebar
  // para que todo quepa en 1920×1080 sin scroll. El array se conserva en el
  // state para no romper instalaciones existentes (usuarios que ya tengan
  // recordatorios guardados en localStorage) y por si se reintroduce un día
  // la sección (probablemente en un modal dedicado, no en el sidebar).
  // No hay action que lo mute actualmente.
  reminders: [],

  // Fechas (toDateString()) en las que se realizó alguna acción con soundOn=false.
  // Cap de 30 entradas. Alimenta master.silent.day. Sesión 34.
  silentDates: [],

  // Fechas (toDateString()) en que water.today alcanzó water.goal.
  // Cap de 14 entradas. Alimenta hydrate.week.perfect. Sesión 41.
  waterGoalDates: [],

  // Contadores acumulados de sesiones por tipo de rutina de respiración
  // y movilidad. { box, coherent, rounds, atg }. Sesión 41.
  routineCounts: {},

  // Rollover: día de calendario del último uso (toDateString()).
  // Cuando cambia, se resetean cycle / plan / water.today al cargar.
  lastActiveDay: null,
};

let _state = loadState();
const _listeners = new Set();

function loadState() {
  const _detectLang = typeof detectInitialLang === 'function' ? detectInitialLang : () => 'en';
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) {
      return { ...defaultState, lang: _detectLang(), lastActiveDay: new Date().toDateString() };
    }
    const parsed = JSON.parse(raw);
    /* Si el usuario no tiene lang guardado (instalación previa a i18n),
       detectarlo desde navigator.language y persistirlo. */
    if (!parsed.lang) parsed.lang = _detectLang();
    return rolloverIfNeeded({ ...defaultState, ...parsed });
  } catch (e) {
    return { ...defaultState, lang: _detectLang(), lastActiveDay: new Date().toDateString() };
  }
}

/* Rollover diario: si el día de calendario ha cambiado desde la última actividad,
   reseteamos los contadores "de hoy" (ciclo de pomodoros, plan del día, vasos de agua).
   Se llama al cargar el estado y también defensivamente antes de escribir cualquier
   contador "de hoy" desde las actions (completePomodoro, addWaterGlass, etc.) para
   cubrir el caso de que la pestaña siga abierta al cruzar la medianoche. */
function rolloverIfNeeded(state) {
  const today = new Date().toDateString();
  if (state.lastActiveDay === today) return state;
  /* Trigger `first.return` — abrir la app un día distinto al de la
     última actividad. Sólo si había un día previo (no en la primera
     instalación, donde `lastActiveDay` viene null/undefined). El
     desbloqueo se delega a un microtask para no llamar a
     `unlockAchievement` desde dentro del propio loadState (la cola
     de toasts pendientes lo gestiona si el ToastHost aún no montó).
     Sesión 28. */
  if (state.lastActiveDay) {
    setTimeout(() => {
      try { unlockAchievement('first.return'); } catch (e) {}
    }, 0);
  }
  return {
    ...state,
    cycle: 0,
    plan: { muevete: false, respira: false, extra: false, hidratate: false },
    water: { ...state.water, today: 0, lastReset: today },
    lastActiveDay: today,
  };
}

function ensureDayFresh() {
  const next = rolloverIfNeeded(_state);
  if (next !== _state) {
    _state = next;
    persistState();
    _listeners.forEach(l => l());
  }
}

function persistState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(_state)); } catch (e) {}
}

function getState() { return _state; }

function setState(patch) {
  const prev = _state;
  _state = typeof patch === 'function' ? patch(_state) : { ...(_state), ...patch };
  persistState();
  _listeners.forEach(l => l());
  /* Optimización v0.12.1: aplicar tokens visuales sólo cuando palette o
     font cambian realmente. Antes se llamaba a setAttribute en cada tick
     (inocuo pero innecesario, 2 DOM writes por cada setState). */
  if (prev.palette !== _state.palette || prev.font !== _state.font) {
    applyTheme();
  }
}

function subscribe(listener) {
  _listeners.add(listener);
  return () => _listeners.delete(listener);
}

function applyTheme() {
  const root = document.documentElement;
  root.setAttribute('data-palette', _state.palette);
  root.setAttribute('data-font', _state.font);
}

function usePace() {
  const state = useSyncExternalStore(subscribe, getState);
  return [state, setState];
}

/* ============================
   ACCIONES ESPECÍFICAS
   ============================ */

/* Detecta logros derivados del plan/ritual del día.
   Se llama desde cada acción de completar (pomodoro, breathe, move,
   extra, water) DESPUÉS del setState, leyendo `_state` ya actualizado.

   - `first.ritual`  → los 4 módulos del día tocados (respira + mueve +
                       extra + hidratate). El plan ya marca esos 4 flags;
                       basta con que los 4 sean true.
   - `first.plan`    → mismo trigger en código. Decisión de producto:
                       "completar el plan del día" === "tocar los 4 módulos
                       del día". `first.plan` se desbloquea junto a
                       `first.ritual` para que ambos sean cazables sin
                       inventar un segundo umbral artificial. Sesión 28.
   - `master.focus.day` → ya tenemos `addFocusMinutes` con buckets diarios;
                          aprovechamos esta función para chequear las 4h
                          (240 min) del día actual.
*/
function checkPlanAchievements() {
  const s = getState();
  const p = s.plan || {};
  if (p.muevete && p.respira && p.extra && p.hidratate) {
    unlockAchievement('first.ritual');
    unlockAchievement('first.plan');
  }
}

function checkFocusDayAchievement() {
  const s = getState();
  const day = new Date().getDay();
  const todayMin = (s.weeklyStats.focusMinutes || [])[day] || 0;
  if (todayMin >= 240) unlockAchievement('master.focus.day');
}

/* Detectores horarios — sesión 29.
   `master.dawn`  → sesión antes de las 7:00.
   `master.dusk`  → sesión después de las 21:00.
   `morning.5`    → 5 fechas distintas con sesión antes de las 9:00.
   Se llama desde cada acción de completar (breathe / move / extra /
   pomodoro). El registro de fechas para `morning.5` se persiste en el
   state como `morningDates: string[]` (toDateString) con cap de 30.
*/
function checkTimeOfDayAchievements() {
  const now = new Date();
  const h = now.getHours();
  if (h < 7) unlockAchievement('master.dawn');
  if (h >= 21) unlockAchievement('master.dusk');
  if (h < 9) {
    const today = now.toDateString();
    const s = getState();
    const list = Array.isArray(s.morningDates) ? s.morningDates : [];
    if (!list.includes(today)) {
      const next = [...list, today].slice(-30);
      setState({ morningDates: next });
      if (next.length >= 5) unlockAchievement('morning.5');
    }
  }
}

/* Detectores de logros collector — sesión 34.
   Se llama al final de cada unlockAchievement exitoso.
   Cuenta los logros ya en _state (incluido el que se acaba de añadir).
   unlockAchievement es idempotente → la recursión termina de forma natural. */
function checkCollectorAchievements() {
  const count = Object.keys(_state.achievements).length;
  if (count >= 50) unlockAchievement('master.collector.half');
  if (count >= 100) unlockAchievement('master.collector.full');
}

/* Detector master.silent.day — sesión 34.
   Registra hoy como día silencioso si soundOn=false y el usuario hizo algo.
   Se llama desde cada acción de completar. */
function checkSilentDayAchievement() {
  if (_state.soundOn) return;
  const today = new Date().toDateString();
  const list = Array.isArray(_state.silentDates) ? _state.silentDates : [];
  if (!list.includes(today)) {
    setState({ silentDates: [...list, today].slice(-30) });
    unlockAchievement('master.silent.day');
  }
}

/* Mapa de routineId → categoría para contadores de tipo de rutina.
   Solo breathe; atg se maneja en completeExtraSession. Sesión 41. */
const BREATH_ROUTINE_CATEGORIES = {
  'breathe.box.4':         'box',
  'breathe.box.6':         'box',
  'breathe.coherent.55':   'coherent',
  'breathe.coherent.66':   'coherent',
  'breathe.rounds.full':   'rounds',
  'breathe.rounds.express':'rounds',
};

/* hydrate.week.perfect — 7 días consecutivos alcanzando water.goal.
   Ordena waterGoalDates numéricamente y verifica 7 entradas seguidas
   separadas exactamente 1 día (86400000 ms). Sesión 41. */
function checkHydrateWeekPerfect() {
  const dates = (_state.waterGoalDates || [])
    .map(d => new Date(d).getTime())
    .sort((a, b) => a - b);
  if (dates.length < 7) return;
  for (let i = dates.length - 1; i >= dates.length - 6; i--) {
    if (dates[i] - dates[i - 1] !== 86400000) return;
  }
  unlockAchievement('hydrate.week.perfect');
}

/* Contadores por tipo de rutina — sesión 41.
   Lee _state.routineCounts ya actualizado antes de llamar. */
function checkRoutineCountAchievements(category) {
  const c = _state.routineCounts || {};
  if (category === 'box'      && (c.box      || 0) >= 10) unlockAchievement('master.box.10');
  if (category === 'coherent' && (c.coherent || 0) >= 10) unlockAchievement('master.coherent.10');
  if (category === 'rounds'   && (c.rounds   || 0) >= 10) unlockAchievement('master.rounds.10');
  if (category === 'atg'      && (c.atg      || 0) >= 20) unlockAchievement('master.atg.20');
}

/* Detector master.retreat — sesión 34.
   Usa los buckets weeklyStats ya existentes: breathMinutes[day] + moveMinutes[day].
   Extra suma al bucket moveMinutes (decisión activa), así que completeExtraSession
   también llama a este detector. */
function checkRetreatAchievement() {
  const day = new Date().getDay();
  const todayBreath = (_state.weeklyStats.breathMinutes || [])[day] || 0;
  const todayMove = (_state.weeklyStats.moveMinutes || [])[day] || 0;
  if (todayBreath + todayMove >= 120) unlockAchievement('master.retreat');
}

function unlockAchievement(id, note) {
  const s = getState();
  if (s.achievements[id]) return false;
  setState({
    achievements: { ...s.achievements, [id]: { unlockedAt: Date.now(), note } }
  });
  // Notificación flotante
  showToast({ id, type: 'achievement' });
  checkCollectorAchievements();
  return true;
}

function addFocusMinutes(mins) {
  ensureDayFresh();
  /* v0.12.1: calculamos todo dentro del updater y, tras el setState,
     leemos el total oficial desde `_state` (no desde una variable de
     cierre) para disparar logros. Evita el riesgo de que otra acción
     se cuele entre el updater y la evaluación de umbrales. */
  setState(prev => {
    const day = new Date().getDay();
    const week = [...prev.weeklyStats.focusMinutes];
    week[day] += mins;
    return {
      ...prev,
      totalFocusMin: prev.totalFocusMin + mins,
      weeklyStats: { ...prev.weeklyStats, focusMinutes: week },
    };
  });
  const h = _state.totalFocusMin / 60;
  if (h >= 10) unlockAchievement('focus.hours.10');
  if (h >= 50) unlockAchievement('focus.hours.50');
  if (h >= 100) unlockAchievement('focus.hours.100');
  /* Logro de día de foco intenso: 4h en una sola jornada. Se evalúa
     aquí porque `addFocusMinutes` es donde crecen los buckets diarios
     en `weeklyStats.focusMinutes[day]`. Sesión 28. */
  checkFocusDayAchievement();
}

function completePomodoro() {
  ensureDayFresh();
  /* v0.12.1: capturamos el valor de minutos de foco ANTES del updater
     (el modo/minutos puede cambiar por tweak durante el tick); el
     updater sólo incrementa cycle. Luego leemos el nuevo cycle desde
     `_state` para los umbrales de logro. */
  const focusMinsAtCompletion = _state.focusMinutes;
  setState(prev => ({ ...prev, cycle: prev.cycle + 1 }));
  addFocusMinutes(focusMinsAtCompletion);
  unlockAchievement('first.step');
  if (_state.cycle >= 8) unlockAchievement('master.pomodoro.8');
  /* `master.long.focus` — completar un Pomodoro de 45 min sin pausa.
     Se evalúa contra los minutos del bloque que acaba de cerrarse,
     no contra el state.focusMinutes (que puede haberse cambiado por
     tweak antes de que termine el ticker). Sesión 29. */
  if (focusMinsAtCompletion >= 45) unlockAchievement('master.long.focus');
  checkTimeOfDayAchievements();
  checkSilentDayAchievement();
  updateStreak();
}

function completeBreathSession(routineId, durationMin) {
  ensureDayFresh();
  const s = getState();
  const day = new Date().getDay();
  const week = [...s.weeklyStats.breathMinutes];
  week[day] += durationMin;
  setState({
    plan: { ...s.plan, respira: true },
    weeklyStats: { ...s.weeklyStats, breathMinutes: week },
    /* Contador acumulado de sesiones de respiración (sesión 29).
       Crece monótonamente; alimenta breathe.sessions.10/50. */
    breatheSessionsTotal: (s.breatheSessionsTotal || 0) + 1,
  });
  unlockAchievement('first.breath');
  /* Umbrales de constancia por módulo. Leemos `_state` ya actualizado
     para no usar variables de cierre (patrón validado en sesión 18). */
  if (_state.breatheSessionsTotal >= 10) unlockAchievement('breathe.sessions.10');
  if (_state.breatheSessionsTotal >= 50) unlockAchievement('breathe.sessions.50');
  checkPlanAchievements();
  checkTimeOfDayAchievements();
  // Exploración
  const explorationMap = {
    'breathe.box.4': 'explore.box',
    'breathe.box.6': 'explore.box',
    'breathe.478': 'explore.478',
    'breathe.coherent.55': 'explore.coherent',
    'breathe.coherent.66': 'explore.coherent',
    'breathe.rounds.full': 'explore.rounds',
    'breathe.rounds.express': 'explore.rounds',
    'breathe.bellows': 'explore.bhastrika',
    'breathe.nadi.shodhana': 'explore.nadi',
    'breathe.ujjayi': 'explore.ujjayi',
    'breathe.kapalabhati': 'explore.kapalabhati',
    'breathe.physiological': 'explore.physiological',
  };
  if (explorationMap[routineId]) unlockAchievement(explorationMap[routineId]);
  checkRetreatAchievement();
  checkSilentDayAchievement();
  /* Contadores por tipo de rutina — master.box.10 / coherent.10 / rounds.10. */
  const breathCat = BREATH_ROUTINE_CATEGORIES[routineId];
  if (breathCat) {
    const c = _state.routineCounts || {};
    setState({ routineCounts: { ...c, [breathCat]: (c[breathCat] || 0) + 1 } });
    checkRoutineCountAchievements(breathCat);
  }
  updateStreak();
}

function completeMoveSession(routineId, durationMin) {
  ensureDayFresh();
  const s = getState();
  const day = new Date().getDay();
  const week = [...s.weeklyStats.moveMinutes];
  week[day] += durationMin;
  setState({
    plan: { ...s.plan, muevete: true },
    weeklyStats: { ...s.weeklyStats, moveMinutes: week },
    /* Contador acumulado de sesiones Mueve (sesión 29). Solo Mueve,
       Extra tiene su propio camino; el bucket de stats sí los suma. */
    moveSessionsTotal: (s.moveSessionsTotal || 0) + 1,
  });
  unlockAchievement('first.stretch');
  if (_state.moveSessionsTotal >= 25) unlockAchievement('move.sessions.25');
  checkPlanAchievements();
  checkTimeOfDayAchievements();
  checkRetreatAchievement();
  checkSilentDayAchievement();
  updateStreak();
}

function completeExtraSession(routineId, durationMin = 0) {
  ensureDayFresh();
  const s = getState();
  const day = new Date().getDay();
  const week = [...s.weeklyStats.moveMinutes];
  // Los minutos de Extra se agregan al bucket de 'move' en stats (ambos son cuerpo activo),
  // pero el plan del día y los logros sí se separan.
  if (durationMin > 0) week[day] += durationMin;
  setState({
    plan: { ...s.plan, extra: true },
    weeklyStats: { ...s.weeklyStats, moveMinutes: week },
  });
  unlockAchievement('first.extra');
  checkPlanAchievements();
  checkTimeOfDayAchievements();
  // Logros de exploración de movilidad.
  // NOTA (sesión 15): tras el swap de sesión 14, las rutinas de
  // movilidad (move.hips.5, move.shoulders.5, move.atg.knees,
  // move.ancestral, move.neck.3, move.desk.quick) pasaron de
  // MOVE_ROUTINES a EXTRA_ROUTINES y ahora desembocan aquí. Los ids de
  // rutina no se renombran (decisión activa: ids = identificadores
  // estables), así que el map conserva los ids `move.*` aunque viva en
  // completeExtraSession.
  const exploreMap = {
    'move.hips.5': 'explore.hips',
    'move.shoulders.5': 'explore.shoulders',
    'move.atg.knees': 'explore.atg',
    'move.ancestral': 'explore.ancestral',
    'move.neck.3': 'explore.neck',
    'move.desk.quick': 'explore.desk',
  };
  if (exploreMap[routineId]) unlockAchievement(exploreMap[routineId]);
  checkRetreatAchievement();
  checkSilentDayAchievement();
  /* master.atg.20 — contador de sesiones ATG Knees. */
  if (routineId === 'move.atg.knees') {
    const c = _state.routineCounts || {};
    setState({ routineCounts: { ...c, atg: (c.atg || 0) + 1 } });
    checkRoutineCountAchievements('atg');
  }
  updateStreak();
}

function addWaterGlass(delta = 1) {
  ensureDayFresh();
  const s = getState();
  const day = new Date().getDay();
  const week = [...s.weeklyStats.waterGlasses];
  week[day] = Math.max(0, (week[day] || 0) + delta);
  const next = Math.max(0, s.water.today + delta);
  setState({
    water: { ...s.water, today: next },
    plan: { ...s.plan, hidratate: next > 0 ? true : s.plan.hidratate },
    weeklyStats: { ...s.weeklyStats, waterGlasses: week },
  });
  if (delta > 0) {
    unlockAchievement('first.sip');
    checkPlanAchievements();
    checkSilentDayAchievement();
    /* hydrate.week.perfect — registrar hoy si se alcanza la meta por
       primera vez. Leemos _state actualizado (patrón sesión 18). */
    if (_state.water.today >= _state.water.goal) {
      const today = new Date().toDateString();
      const goalDates = Array.isArray(_state.waterGoalDates) ? _state.waterGoalDates : [];
      if (!goalDates.includes(today)) {
        setState({ waterGoalDates: [...goalDates, today].slice(-14) });
        checkHydrateWeekPerfect();
      }
    }
  }
}

function updateStreak() {
  const s = getState();
  const today = new Date().toDateString();
  const last = s.streak.lastActiveDate;
  if (last === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  let current = s.streak.current;
  if (last === yesterday) current += 1;
  else current = 1;
  const longest = Math.max(s.streak.longest, current);
  setState({
    streak: { current, longest, lastActiveDate: today }
  });
  /* `first.day` — primer día de uso. Equivale a la primera vez que
     se llama a updateStreak con éxito, así que current === 1 lo
     captura. unlockAchievement es idempotente. Sesión 28. */
  if (current >= 1) unlockAchievement('first.day');
  if (current >= 3) unlockAchievement('streak.3');
  if (current >= 7) unlockAchievement('streak.7');
  if (current >= 14) unlockAchievement('streak.14');
  if (current >= 30) unlockAchievement('streak.30');
  if (current >= 60) unlockAchievement('streak.60');
  if (current >= 100) unlockAchievement('streak.100');
  if (current >= 365) unlockAchievement('streak.365');
}

/* TOAST NOTIFICATIONS
   Buffer pre-mount: si se dispara un toast antes de que ToastHost monte
   (p.ej. desbloqueo por rollover durante loadState), se encola en
   `_pendingToasts` y se vacía en orden cuando el primer listener se
   registra. Evita que el primer logro de una sesión "recién abierta" se
   pierda silenciosamente. */
const _toastListeners = new Set();
const _pendingToasts = [];
function showToast(toast) {
  const t = { ...toast, _id: Date.now() + Math.random() };
  if (_toastListeners.size === 0) {
    _pendingToasts.push(t);
    return;
  }
  _toastListeners.forEach(l => l(t));
}
function onToast(listener) {
  const wasEmpty = _toastListeners.size === 0;
  _toastListeners.add(listener);
  /* v0.12.1: vaciamos el buffer pendiente en cuanto hay AL MENOS un
     listener (antes la condición era `size === 1`, que fallaba bajo
     StrictMode cuando React monta y desmonta el host dos veces: el
     segundo listener nunca recibía los toasts buffeados). */
  if (wasEmpty && _pendingToasts.length > 0) {
    const drained = _pendingToasts.splice(0);
    // Despachamos en el próximo tick para no interferir con el mount del Host.
    setTimeout(() => { drained.forEach(t => listener(t)); }, 0);
  }
  return () => _toastListeners.delete(listener);
}

// Init theme on load
applyTheme();

function setLang(lang) {
  setState({ lang });
}

Object.assign(window, {
  usePace, getState, setState, subscribe,
  unlockAchievement, completePomodoro,
  completeBreathSession, completeMoveSession, completeExtraSession,
  addWaterGlass, addFocusMinutes, updateStreak,
  ensureDayFresh,
  showToast, onToast,
  setLang,
  PACE_VERSION,
});

</script>

  <script type="text/babel">
/* PACE · Foco · Cuerpo

*/

const { useEffect } = React;

/* ============================================================
   displayItalic — helper para el par inline más repetido del repo.

   Audit v0.12.7 §3.3 detectó ~50 ocurrencias inline de
     fontFamily: 'var(--font-display)', fontStyle: 'italic'
   En sesión 26 (v0.12.8) se extrajo a este helper para que cada
   cambio futuro al token viva en un único sitio. El patrón de uso
   es spread dentro de un style inline, NO className, porque casi
   todos los callsites ya co-locan otros estilos inline (fontSize,
   color, margin, etc.) y romper eso forzaría refactor masivo.

     <h2 style={{ ...displayItalic, fontSize: 22, margin: 0 }}>…</h2>

   La clase CSS equivalente `.pace-display-italic` sigue declarada
   en tokens.css por si un futuro consumidor prefiere la ruta
   className; ambas rutas coexisten sin conflicto.
   ============================================================ */
const displayItalic = {
  fontFamily: 'var(--font-display)',
  fontStyle: 'italic',
};

function Modal({ open, onClose, children, maxWidth = 680, tagLabel, title, subtitle }) {
  const { t } = useT();
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  if (!open) return null;

  return (
    <div
      data-pace-modal-backdrop
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0,
        background: 'rgba(31, 28, 23, 0.28)',
        backdropFilter: 'blur(3px)',
        zIndex: 100,
        display: 'grid',
        placeItems: 'center',
        padding: 24,
        animation: 'pace-fade-in 200ms ease',
      }}
    >
      <div
        data-pace-modal-card
        onClick={(e) => e.stopPropagation()}
        style={{
          background: 'var(--paper)',
          borderRadius: 'var(--r-lg)',
          boxShadow: 'var(--sh-modal)',

    md: { padding: '10px 22px', fontSize: 14, height: 42 },
    lg: { padding: '14px 28px', fontSize: 15, height: 52 },

    primary: {
      background: 'var(--focus)',
      color: 'var(--paper)',
      border: '1px solid var(--focus)',

    secondary: {

      color: 'var(--ink)',
      border: '1px solid var(--line-2)',

    ghost: {
      background: 'transparent',
      color: 'var(--ink-2)',

      background: 'var(--breathe)',
      color: 'var(--paper)',

    <button
      type={type}
      onClick={onClick}

        ...variants[variant],
        borderRadius: 'var(--r-md)',
        fontWeight: 500,
        letterSpacing: 0.2,

  <script type="text/babel">
/* PACE · Foco · Cuerpo
   Copyright © 2026 ezradesign
   Licensed under the Elastic License 2.0 — see LICENSE

   Sonidos sutiles vía Web Audio API — refactor 432 Hz (sesión 38a · v0.20.0).

   Cambios respecto a v0.13.0 (sesión 28):
     - Afinación A=432 Hz (constante BASE_A) + helper note() para nota→Hz.
     - Primitivas componibles: tone, glide, chord, bell, breathNoise.
     - breathNoise: ruido blanco filtrado lowpass (200↔800 Hz) para
       respiración realista — no tonos puros. Parámetro dur sincroniza
       el sonido con la duración real de la fase visual.
     - Catálogo ampliado: pomodoro.start/end, breathe.inhale/exhale,
       breathe.session.start/end.
     - Hold de respiración = silencio intencional (decisión meditativa).
     - Alias legacy (tick, complete, sip, breath) conservados para
       compatibilidad con módulos no migrados.

   API pública (sin cambios):
     playSound(name, ...args) — función plana
     useSound()               → { play(name, ...args) }
*/

const { useCallback: useCallbackSound } = React;

/* === AFINACIÓN 432 Hz === */
const BASE_A = 432;

/* Convierte nombre de nota a Hz con A4=432. Temperamento igual 2^(1/12).
   Ejemplos: note('A4')===432, note('C5')≈513.7, note('G5')≈769.3. */
function note(name) {
  const MAP = {
    C:0, 'C#':1, Db:1, D:2, 'D#':3, Eb:3,
    E:4, F:5, 'F#':6, Gb:6, G:7, 'G#':8, Ab:8,
    A:9, 'A#':10, Bb:10, B:11,
  };
  const m = name.match(/^([A-G][#b]?)(\d)$/);
  if (!m) return BASE_A;
  const semi = MAP[m[1]] !== undefined ? MAP[m[1]] : 9;
  const oct  = parseInt(m[2]);
  return BASE_A * Math.pow(2, ((oct - 4) * 12 + (semi - 9)) / 12);
}

/* === SINGLETON AudioContext === */
let _audioCtx = null;
function getCtx() {
  if (_audioCtx) return _audioCtx;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    _audioCtx = new Ctx();
    return _audioCtx;
  } catch (e) { return null; }
}

function ensureRunning(ctx) {
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch (e) {} }
}

/* === ENVOLVENTE ADSR mínima === */
function envelope(ctx, dest, t0, peak, attack, release) {
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + attack);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + attack + release);
  g.connect(dest);
  return g;
}

/* === PRIMITIVA 1: tone — oscilador puro === */
function tone(ctx, dest, freq, t0, dur, peak, type) {
  if (peak === undefined) peak = 0.06;
  if (type === undefined) type = 'sine';
  const o = ctx.createOscillator();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  const g = envelope(ctx, dest, t0, peak, 0.012, dur);
  o.connect(g);
  o.start(t0);
  o.stop(t0 + dur + 0.05);
}

/* === PRIMITIVA 2: glide — barrido exponencial de frecuencia === */
function glide(ctx, dest, freqStart, freqEnd, t0, dur, peak, type) {
  if (peak === undefined) peak = 0.06;
  if (type === undefined) type = 'sine';
  const o = ctx.createOscillator();
  o.type = type;
  o.frequency.setValueAtTime(freqStart, t0);
  o.frequency.exponentialRampToValueAtTime(freqEnd, t0 + dur);
  const g = envelope(ctx, dest, t0, peak, 0.012, dur);
  o.connect(g);
  o.start(t0);
  o.stop(t0 + dur + 0.05);
}

/* === PRIMITIVA 3: chord — varios osciladores simultáneos === */
function chord(ctx, dest, freqs, t0, dur, peak, type) {
  if (peak === undefined) peak = 0.08;
  if (type === undefined) type = 'sine';
  const perVoice = (peak / freqs.length) * 1.4;
  freqs.forEach(function(freq) { tone(ctx, dest, freq, t0, dur, perVoice, type); });
}

/* === PRIMITIVA 4: bell — campana con overtones (timbre metálico suave) === */
function bell(ctx, dest, freq, t0, dur, peak) {
  if (peak === undefined) peak = 0.10;
  tone(ctx, dest, freq,       t0,        dur,        peak * 0.70, 'sine');
  tone(ctx, dest, freq * 2.8, t0 + 0.01, dur * 0.60, peak * 0.20, 'sine');
  tone(ctx, dest, freq * 5.4, t0 + 0.02, dur * 0.35, peak * 0.10, 'sine');
}

/* === PRIMITIVA 5: breathNoise — ruido blanco filtrado para respiracion ===
   direction 'in':  filtro 200Hz→800Hz  (inhalar: tono sube)
   direction 'out': filtro 800Hz→200Hz  (exhalar: tono baja)
   ADSR: attack 15% + plateau hasta 65% + release 35% de dur.
   Resultado: shhhhh que sube (inhala) o haaaaa que baja (exhala). */
function breathNoise(ctx, dest, direction, t0, dur, peak) {
  if (!dur || dur <= 0) return; /* guard: createBuffer(1,0,sr) lanzaría NotSupportedError */
  if (peak === undefined) peak = 0.06;
  var sr     = ctx.sampleRate;
  var frames = Math.ceil(dur * sr);
  var buf    = ctx.createBuffer(1, frames, sr);
  var data   = buf.getChannelData(0);
  for (var i = 0; i < frames; i++) data[i] = Math.random() * 2 - 1;

  var src = ctx.createBufferSource();
  src.buffer = buf;

  var filt = ctx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.Q.value = 1.5;

  var fLow = 200, fHigh = 800;
  if (direction === 'in') {
    filt.frequency.setValueAtTime(fLow,  t0);
    filt.frequency.linearRampToValueAtTime(fHigh, t0 + dur);
  } else {
    filt.frequency.setValueAtTime(fHigh, t0);
    filt.frequency.linearRampToValueAtTime(fLow,  t0 + dur);
  }

  var g = ctx.createGain();
  g.gain.setValueAtTime(0,         t0);
  g.gain.linearRampToValueAtTime(peak, t0 + dur * 0.15);
  g.gain.setValueAtTime(peak,           t0 + dur * 0.65);
  g.gain.linearRampToValueAtTime(0.0001, t0 + dur);

  src.connect(filt);
  filt.connect(g);
  g.connect(dest);
  src.start(t0);
  src.stop(t0 + dur + 0.05);
}

  /* --- LEGACY ALIASES (compat con módulos no migrados) --- */
  tick: function(ctx, t0) {

  complete: function(ctx, t0) {

  'move.step': function(ctx, t0) {

  'move.end': function(ctx, t0) {

  'hydrate.sip': function(ctx, t0) {
    glide(ctx, ctx.destination, note('G5'), note('D5'), t0, 0.18, 0.07, 'sine');

  'hydrate.goal': function(ctx, t0) {
    tone(ctx, ctx.destination, note('C5'), t0,        0.65, 0.06, 'sine');
    tone(ctx, ctx.destination, note('E5'), t0 + 0.05, 0.55, 0.05, 'sine');
    tone(ctx, ctx.destination, note('G5'), t0 + 0.10, 0.45, 0.04, 'sine');
    tone(ctx, ctx.destination, note('C6'), t0 + 0.15, 0.35, 0.03, 'sine');

  /* --- LOGROS --- */
  'achievement.unlock': function(ctx, t0) {
    bell(ctx, ctx.destination, note('A5'), t0, 0.90, 0.08);
  },
  'achievement.secret': function(ctx, t0) {

/* === API PÚBLICA ===
   playSound(name, ...args): args extra se pasan a la receta
   (ej. dur en breathe.inhale/exhale). */
function playSound(name) {
  var args = Array.prototype.slice.call(arguments, 1);
  try {
    var s = (typeof getState === 'function') ? getState() : null;
    if (!s || !s.soundOn) return;
    var ctx = getCtx();
    if (!ctx) return;
    ensureRunning(ctx);
    var recipe = SOUND_RECIPES[name];
    if (!recipe) return;
    recipe.apply(null, [ctx, ctx.currentTime].concat(args));
  } catch (e) {
    /* Silencio total: el sonido nunca debe romper la app. */
  }
}

function useSound() {
  var play = useCallbackSound(function(name) {
    var args = Array.prototype.slice.call(arguments);
    playSound.apply(null, args);
  }, []);
  return { play: play };
}

/* === DRONE AMBIENTE (capa 2 opt-in) ===

  let osc = null, gainNode = null, lfo = null, lfoGain = null;
  let isPaused = false;

  function shouldPlay() {

      return !!(s && s.soundOn && s.ambientOn);
    } catch(e) { return false; }

    lfoGain.gain.setValueAtTime(0.002, t0);
    lfo.connect(lfoGain);
    lfoGain.connect(gainNode.gain);
    osc.connect(gainNode);
    gainNode.connect(ctx.destination);
    osc.start(t0); lfo.start(t0);
    isPaused = false;
  }

  function stop(fadeMs) {
    if (fadeMs === undefined) fadeMs = 800;
    if (!osc || !gainNode) return;
    const ctx = getCtx(); if (!ctx) return;
    const t0 = ctx.currentTime;
    const fade = Math.max(0.1, fadeMs / 1000);
    try {
      gainNode.gain.cancelScheduledValues(t0);
      gainNode.gain.setValueAtTime(gainNode.gain.value, t0);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, t0 + fade);
    } catch(e) {}
    const oscRef = osc, lfoRef = lfo;
    setTimeout(function() {
      try { oscRef && oscRef.stop(); } catch(e) {}
      try { lfoRef && lfoRef.stop(); } catch(e) {}
    }, (fade + 0.1) * 1000);
    osc = null; lfo = null; gainNode = null; lfoGain = null;
    isPaused = false;
  }

  function pause() {
    if (!gainNode || isPaused) return;
    const ctx = getCtx(); if (!ctx) return;
    const t0 = ctx.currentTime;
    try {
      gainNode.gain.cancelScheduledValues(t0);
      gainNode.gain.setValueAtTime(gainNode.gain.value, t0);
      gainNode.gain.linearRampToValueAtTime(0, t0 + 0.4);
    } catch(e) {}
    isPaused = true;
  }

  function resume() {
    if (!gainNode || !isPaused) return;
    if (!shouldPlay()) { stop(400); return; }
    const ctx = getCtx(); if (!ctx) return;
    const t0 = ctx.currentTime;
    try {
      gainNode.gain.cancelScheduledValues(t0);
      gainNode.gain.setValueAtTime(gainNode.gain.value, t0);
      gainNode.gain.linearRampToValueAtTime(0.02, t0 + 0.6);
    } catch(e) {}
    isPaused = false;
  }

  function isActive() { return osc !== null; }
  return { start: start, stop: stop, pause: pause, resume: resume, isActive: isActive };
})();

</script>

       `pace:open-welcome` (para Tweaks dev o pruebas).

   en esquina superior derecha para cambiar idioma antes de empezar.

const { useEffect: useEffectWEL, useState: useStateWEL, useRef: useRefWEL } = React;

/* ============================================================
   WelcomeModal — la pantalla de bienvenida
   ============================================================ */
function WelcomeModal({ open, onClose }) {
  const [state, set] = usePace();
  const { t } = useT();
  const [draft, setDraft] = useStateWEL('');
  const inputRef = useRefWEL(null);

  // Al abrir: precargar la intención actual si existía.
  // Y enfocar el input después de la animación de entrada del modal
  // (280ms según Primitives.jsx → pace-slide-up).
  useEffectWEL(() => {
    if (!open) return;
    setDraft(state.intention || '');
    const timer = setTimeout(() => {
      if (inputRef.current) inputRef.current.focus();
    }, 320);
    return () => clearTimeout(timer);
  }, [open]);

  if (!open) return null;

  const finish = () => {
    // Guardamos la intención si el usuario escribió algo; sino no tocamos.
    // `firstSeen` se fija SIEMPRE al cerrar (por botón o por X) para que
    // no vuelva a aparecer nunca — es una bienvenida, no un trámite.
    const patch = { firstSeen: Date.now() };
    const trimmed = draft.trim();
    if (trimmed) patch.intention = trimmed.slice(0, 120); // cap defensivo
    set(patch);
    onClose && onClose();
  };

  const skip = () => {
    // "No gracias" también marca firstSeen. Sin intención.
    set({ firstSeen: Date.now() });
    onClose && onClose();
  };

  const toggleLang = () => set({ lang: state.lang === 'es' ? 'en' : 'es' });

  return (
    <Modal open={open} onClose={skip} maxWidth={520}>
      <div style={welcomeStyles.inner}>
        {/* LAYOUT DE 2 COLUMNAS (v0.12.1) — header compacto a la izquierda
            (logo + meta + título) y lede a la derecha. Ahorra ~120px
            verticales respecto al layout apilado anterior y encaja sin
            scroll en pantallas 720p. */}
        <div style={welcomeStyles.header}>
          <div style={welcomeStyles.headerLeft}>
            {/* Toggle pill ES · EN — encima del logo, columna izquierda */}
            <button
              onClick={toggleLang}
              title={t(state.lang === 'es' ? 'welcome.lang.toggle.toEn' : 'welcome.lang.toggle.toEs')}
              style={welcomeStyles.langToggle}
              onMouseEnter={(e) => { e.currentTarget.style.color = 'var(--ink)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.color = 'var(--ink-3)'; }}
            >
              <span style={{ fontWeight: state.lang === 'es' ? 600 : 400 }}>ES</span>
              <span style={{ color: 'var(--line-2)' }}> · </span>
              <span style={{ fontWeight: state.lang === 'en' ? 600 : 400 }}>EN</span>
            </button>
            <div style={welcomeStyles.logoMini}>
              <PaceWordmark variant={state.logoVariant || 'pace'} />
            </div>
            <Meta style={{ marginTop: 10 }}>{t('welcome.greeting')}</Meta>
          </div>
          <div style={welcomeStyles.headerRight}>
            <h2 style={welcomeStyles.title}>
              {t('welcome.tagline')}{' '}
              <span style={{ color: 'var(--ink-3)', fontStyle: 'italic' }}>{t('welcome.tagline.sub')}</span>
            </h2>
            <p style={welcomeStyles.lede}>
              {t('welcome.lede')}
            </p>
          </div>
        </div>

        {/* 3 valores en línea — ya más compactos */}
        <div style={welcomeStyles.values}>
          <WValue label={t('welcome.value.local.label')} sub={t('welcome.value.local.sub')} />
          <span style={welcomeStyles.sep} />
          <WValue label={t('welcome.value.accounts.label')} sub={t('welcome.value.accounts.sub')} />
          <span style={welcomeStyles.sep} />
          <WValue label={t('welcome.value.free.label')} sub={t('welcome.value.free.sub')} />
        </div>

        {/* Campo de intención — opcional, fila horizontal label+input */}
        <div style={welcomeStyles.intentionBlock}>
          <label htmlFor="pace-intention" style={welcomeStyles.intentionLabel}>
            {t('welcome.intention.label')}
            <span style={welcomeStyles.optional}>{t('welcome.intention.optional')}</span>
          </label>
          <input
            id="pace-intention"
            ref={inputRef}
            type="text"
            value={draft}
            onChange={(e) => setDraft(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter') finish(); }}
            placeholder={t('welcome.intention.placeholder')}
            maxLength={120}
            style={welcomeStyles.intentionInput}
          />
        </div>

        {/* Acciones — botón + skip en línea para no añadir altura */}
        <div style={welcomeStyles.actions}>
          <button onClick={skip} style={welcomeStyles.skip}>
            {t('welcome.skip')}
          </button>
          <Button variant="primary" size="md" onClick={finish}>
            {t('welcome.cta')}
          </Button>
        </div>
      </div>
    </Modal>
  );
}

/* Valor individual — compacto: label + sub en una sola columna.
   v0.12.1: tamaños reducidos ligeramente para que la fila de valores
   quepa en ~48px de alto total. */

}

/* ============================================================
   Hook — auto-trigger cuando firstSeen == null
   ------------------------------------------------------------
   Mismo patrón que useSupportAutoTrigger. La demora de 1.2s
   evita que el modal compita con el mount de la app (logo
   parpadeando, toasts de rollover, etc.).
   ============================================================ */
function useFirstTimeWelcome(setOpen) {
  const [state] = usePace();
  useEffectWEL(() => {
    if (state.firstSeen == null) {
      const t = setTimeout(() => setOpen(true), 1200);
      return () => clearTimeout(t);
    }
  }, [state.firstSeen]);
}

  <script type="text/babel">
/* PACE · Sidebar izquierdo — colapsable

   Footer: StatusBar con botón destacado Donar café.

   Historial de lo eliminado (no revivir sin justificación de producto):

*/

const { useState: useStateSB, useMemo: useMemoSB } = React;

/* Inyecta reglas responsive del sidebar una sola vez.
   Patrón ya usado en FocusTimer para spinners de number input.
   Mantiene los inline styles intactos y sólo reescribe el layout
   a partir del breakpoint móvil. */
if (typeof document !== 'undefined' && !document.getElementById('pace-sidebar-responsive-css')) {
  const s = document.createElement('style');
  s.id = 'pace-sidebar-responsive-css';
  s.textContent = `
    @media (max-width: 768px) {
      [data-pace-sidebar] {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        /* Alto del drawer fullscreen · SCROLL ASIMÉTRICO (sesión 24, v0.12.7).
           A diferencia de la home (que usa 100dvh puro para que los 4
           botones quepan siempre sin scroll), el sidebar FUERZA scroll
           latente para que el navegador móvil oculte su barra de URL
           y el contenido real (ritmo + sendero + logros + footer) tenga
           espacio para respirar. Técnica: min-height 1px por encima
           del viewport visible. Ese píxel extra activa el detector de
           scroll del navegador → auto-hide de la barra → el usuario
           recupera ~56-100px que el drawer aprovecha.
             - min-height: calc(100dvh + 1px) con fallback 100vh+1px
               — 1px invisible, no hay artefacto.
             - height: auto — el drawer se dimensiona al contenido,
               no al viewport. Sin límites artificiales.
             - max-height: none — no limitamos arriba. Si el contenido
               es más largo que el viewport, scroll natural.
             - overflow-y: auto — red de seguridad para viewports
               patológicos (landscape muy bajo).
           Coste conocido: pequeño tirón la primera vez que se abre el
           drawer (aparece con barra URL visible, el usuario desliza,
           la barra se recoge, el drawer crece). A partir del segundo
           uso con la barra ya oculta, se abre directamente expandido. */
        min-height: calc(100vh + 1px) !important;
        min-height: calc(100dvh + 1px) !important;
        height: auto !important;
        max-height: none !important;
        z-index: 60 !important;
        padding: 22px 22px !important;
        border-right: none !important;
        overflow-y: auto !important;
      }
      /* Chevron de cerrar: hit target ≥44px en móvil, más notorio */
      [data-pace-sidebar] [data-pace-sidebar-toggle] {
        top: 14px !important;
        right: 14px !important;
        width: 44px !important;
        height: 44px !important;
        opacity: 1 !important;
      }
      /* Logo bar con un poco menos de altura mínima para que quepa
         ritmo + sendero + logros + footer sin scroll en móviles medios.
         Los márgenes negativos se mantienen — el logo respira igual. */
      [data-pace-sidebar] [data-pace-sidebar-logobar] {
        min-height: 84px !important;
      }
    }
  `;
  document.head.appendChild(s);
}

/* ============================================================
   Sendero del día — línea ondulada horizontal que representa
   el arco del día (6h → 22h). Los hitos son pomodoros y sesiones
   completadas hasta ahora; aparecen como puntos sobre la curva.
   ============================================================ */
function SenderoDelDia({ state }) {
  const { t, tn } = useT();
  const now = new Date();
  const hNow = now.getHours() + now.getMinutes() / 60;
  const start = 6;  // 6:00
  const end = 22;   // 22:00
  const fraction = Math.min(1, Math.max(0, (hNow - start) / (end - start)));

  // Hitos del día: pomodoros + sesiones (proxy desde state)
  const hitos = useMemoSB(() => {
    const out = [];
    // Pomodoros: repartimos sus horas ficticiamente por el día hasta hNow
    const cycle = state.cycle || 0;
    for (let i = 0; i < cycle; i++) {
      const t = start + ((i + 1) / (cycle + 1)) * Math.max(0.1, hNow - start);
      out.push({ t, kind: 'focus' });
    }
    // Actividades del plan también cuentan como hitos hoy
    const day = new Date().getDay();
    const ws = state.weeklyStats || {};
    if ((ws.breathMinutes?.[day] || 0) > 0) out.push({ t: hNow - 0.3, kind: 'breathe' });
    if ((ws.moveMinutes?.[day] || 0) > 0) out.push({ t: hNow - 0.55, kind: 'move' });
    if ((ws.waterGlasses?.[day] || 0) > 0) out.push({ t: hNow - 0.15, kind: 'water' });
    // Clamp to path range
    return out
      .map(h => ({ ...h, x: Math.max(0, Math.min(1, (h.t - start) / (end - start))) }))
      .sort((a, b) => a.x - b.x);
  }, [state.cycle, state.weeklyStats]);

  const W = 240;
  const H = 46;
  const pathD = `M 0 ${H * 0.55} Q ${W * 0.2} ${H * 0.15}, ${W * 0.45} ${H * 0.55} T ${W} ${H * 0.55}`;

  const colorOf = (kind) => ({
    focus: 'var(--focus)',
    breathe: 'var(--breathe)',
    move: 'var(--move)',
    water: 'var(--hydrate)',
  })[kind] || 'var(--ink-3)';

  // "Pointer" (posición actual en la onda) — aproximación lineal en el path
  const pointerX = fraction * W;
  // Para la altura aprox del path en x: usar la misma curva cuadrática
  const pathY = (x) => {
    // valores de control para una cuadrática M-Q-T-Q chainless:
    // aquí aproximamos con dos quads empalmados. Bastante preciso para display.
    if (x <= W * 0.45) {
      const t = x / (W * 0.45);
      const y = (1 - t) * (1 - t) * (H * 0.55) + 2 * (1 - t) * t * (H * 0.15) + t * t * (H * 0.55);
      return y;
    } else {
      const t = (x - W * 0.45) / (W * 0.55);
      const y = (1 - t) * (1 - t) * (H * 0.55) + 2 * (1 - t) * t * (H * 0.95) + t * t * (H * 0.55);
      return y;
    }
  };

  return (
    <>
      <div style={sidebarStyles.sectionHeader}>
        <Meta>{t('sidebar.section.trail')}</Meta>
        <span style={sidebarStyles.sectionAside}>{hitos.length} {hitos.length === 1 ? t('sidebar.trail.hito') : t('sidebar.trail.hitos')}</span>
      </div>
      <div style={{ marginTop: 6 }}>
        <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ display: 'block', width: '100%' }}>
          {/* Camino completo (opacidad baja) */}
          <path d={pathD} stroke="var(--line-2)" strokeWidth="1.4" fill="none" strokeLinecap="round" />
          {/* Camino recorrido: clip al punto actual */}
          <defs>
            <clipPath id="sendero-clip">
              <rect x="0" y="0" width={pointerX} height={H} />
            </clipPath>
          </defs>
          <path d={pathD} stroke="var(--focus)" strokeWidth="1.8" fill="none" strokeLinecap="round" clipPath="url(#sendero-clip)" />
          {/* Hitos */}
          {hitos.map((h, i) => {
            const cx = h.x * W;
            const cy = pathY(cx);
            return (
              <g key={i}>
                <circle cx={cx} cy={cy} r="4.5" fill="var(--paper)" stroke={colorOf(h.kind)} strokeWidth="1.6" />
                <circle cx={cx} cy={cy} r="1.8" fill={colorOf(h.kind)} />
              </g>
            );
          })}
          {/* Puntero de "ahora" */}
          <circle cx={pointerX} cy={pathY(pointerX)} r="3" fill="var(--ink)" />
        </svg>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, letterSpacing: '0.1em', color: 'var(--ink-3)', marginTop: 4, textTransform: 'uppercase' }}>
          <span>{t('sidebar.trail.hour.start')}</span>
          <span style={{ ...displayItalic, fontSize: 11, letterSpacing: 0, color: 'var(--ink-2)', textTransform: 'none' }}>{t('sidebar.trail.now')} · {String(now.getHours()).padStart(2,'0')}:{String(now.getMinutes()).padStart(2,'0')}</span>
          <span>{t('sidebar.trail.hour.end')}</span>
        </div>
      </div>
    </>
  );
}

  <script type="text/babel">
/* PACE · Módulo Foco (Pomodoro)
   Temporizador funcional real. 4 estilos visuales de tweaks.
*/

const { useState: useStateFT, useEffect: useEffectFT, useRef: useRefFT } = React;

function FocusTimer({ onFinish }) {
  const [state, set] = usePace();
  const { t } = useT();
  const [running, setRunning] = useStateFT(false);
  const [remainingSec, setRemainingSec] = useStateFT(state.focusMinutes * 60);
  const intervalRef = useRefFT(null);

  // Reset si cambian minutos o modo
  useEffectFT(() => {
    const baseMin = state.focusMode === 'foco' ? state.focusMinutes
                  : state.focusMode === 'pausa' ? 5
                  : 15;
    setRemainingSec(baseMin * 60);
    setRunning(false);
  }, [state.focusMode, state.focusMinutes]);

  useEffectFT(() => {
    if (!running) {
      if (intervalRef.current) { clearInterval(intervalRef.current); intervalRef.current = null; }
      return;
    }
    intervalRef.current = setInterval(() => {
      // Reducer PURO: sólo calcula el siguiente valor. Los side-effects
      // (completePomodoro, onFinish) viven en el useEffect de abajo que
      // observa `justFinished`. Esto evita doble ejecución si React
      // re-invoca el reducer (StrictMode en React 19).
      setRemainingSec(s => {
        if (s <= 1) {
          clearInterval(intervalRef.current);
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
  }, [running]);

  // Efecto de finalización: se dispara cuando el timer llega a 0 estando en
  // marcha. Single-shot gracias al guard `justFinished` que se re-setea
  // en el efecto de reset de modo/minutos.
  useEffectFT(() => {
    if (!running) return;
    if (remainingSec !== 0) return;
    setRunning(false);
    /* Sonido de cierre — campana suave (do+sol+do6) que marca el fin
       del bloque, sea foco o pausa. Respeta state.soundOn (noop si
       está apagado). Sesión 28. */
    try { playSound('pomodoro.end'); } catch (e) {}
    if (state.focusMode === 'foco') {
      completePomodoro();
      onFinish && onFinish();
    }
  }, [remainingSec, running, state.focusMode]);

  // Drone ambiente — efecto paralelo (no toca el ticker ni la lógica de logros)
  useEffectFT(() => {
    if (!window.ambientDrone) return;
    const drone = window.ambientDrone;

    if (state.focusMode !== 'foco') { drone.stop(800); return; }
    if (remainingSec === 0)         { drone.stop(800); return; }

    if (running) {
      if (drone.isActive()) {
        drone.resume();
      } else {
        // activar ambientOn mid-sesión no arranca el drone retroactivamente
        // — solo arranca al inicio de una sesión nueva
        drone.start();
      }
    } else {
      if (drone.isActive()) drone.pause();
    }
  }, [running, state.focusMode, remainingSec]);

  // Apagar soundOn durante sesión → fadeout inmediato
  useEffectFT(() => {
    if (!state.soundOn && window.ambientDrone && window.ambientDrone.isActive()) {
      window.ambientDrone.stop(400);
    }
  }, [state.soundOn]);

  const mins = Math.floor(remainingSec / 60);
  const secs = remainingSec % 60;
  const totalSec = (state.focusMode === 'foco' ? state.focusMinutes : state.focusMode === 'pausa' ? 5 : 15) * 60;
  const progress = 1 - (remainingSec / totalSec);

  const modeLabel = state.focusMode === 'foco' ? t('focus.mode.focus')
                  : state.focusMode === 'pausa' ? t('focus.mode.pause')
                  : t('focus.mode.long');
  const subtitle = state.focusMode === 'foco' ? t('focus.subtitle.focus')
                 : state.focusMode === 'pausa' ? t('focus.subtitle.pause')
                 : t('focus.subtitle.long');

  const reset = () => {
    setRunning(false);
    const baseMin = state.focusMode === 'foco' ? state.focusMinutes : state.focusMode === 'pausa' ? 5 : 15;
    setRemainingSec(baseMin * 60);
  };

  const isAro = state.timerStyle === 'aro';
  const runningLabel = running ? t('focus.pause') : (remainingSec === totalSec ? t('focus.start') : t('focus.continue'));

  /* Dots de ciclo (4 puntitos + etiqueta CICLO).
     En estilo 'aro' viven DENTRO del aro, debajo del botón de comenzar.
     En otros estilos se renderizan en su bloque propio fuera del timer. */
  const cycleDotsEl = (
    <div style={focusStyles.cycleDots}>
      {[0,1,2,3].map(i => (
        <span key={i} style={{
          width: 4, height: 4, borderRadius: '50%',
          background: (state.cycle % 4) > i ? 'var(--focus)' : 'var(--line-2)',
        }} />
      ))}
      <span style={{ fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-3)', marginLeft: 10 }}>{t('focus.cycle')}</span>
    </div>
  );

  /* Bloque de controles + ciclo inyectado DENTRO del aro (layout ref. usuario).
     Para otros estilos se renderiza debajo en un bloque aparte. */
  const controls = (
    <div style={focusStyles.controlsTight}>
      <button
        onClick={() => {
          const next = !running;
          setRunning(next);
          if (next) try { playSound('pomodoro.start'); } catch (e) {}
        }}
        style={running ? focusStyles.startBtnSecondary : focusStyles.startBtnPrimary}
      >
        <span style={{ fontSize: 11, lineHeight: 1 }}>{running ? '❚❚' : '▶'}</span>
        <span>{runningLabel}</span>
      </button>
      <button onClick={reset} style={focusStyles.resetCircle} title={t('focus.restart')} aria-label={t('focus.restart')}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7" />
          <polyline points="3 4 3 10 9 10" />
        </svg>
      </button>
    </div>
  );

  /* Para estilo aro: unimos controles + ciclo en un mismo bloque interior. */
  const innerForAro = (
    <>
      {controls}
      <div style={{ marginTop: 10 }}>{cycleDotsEl}</div>
    </>
  );

  return (
    <div style={focusStyles.root}>
      {/* NOTA: el ModeToggle Foco/Pausa/Larga vive ahora en TopBar
         (centrado arriba), por referencia del usuario (sesión 9). */}

      {/* Selector minutos */}
      {state.focusMode === 'foco' && (
        <MinutesPicker value={state.focusMinutes} onChange={(v) => set({ focusMinutes: v })} />
      )}

      {/* Visualización */}
      <div style={focusStyles.timerWrap}>
        <TimerVisualization
          style={state.timerStyle}
          mins={mins}
          secs={secs}
          progress={progress}
          mode={state.focusMode}
          modeLabel={modeLabel}
          subtitle={subtitle}
          inner={isAro ? innerForAro : null}
        />
      </div>

      {/* Controles + ciclo fuera del aro — solo para estilos no-aro */}
      {!isAro && (
        <>
          <div style={focusStyles.controls}>{controls}</div>
          {cycleDotsEl}
        </>
      )}
    </div>
  );
}

/* NOTA: el antiguo ModeToggle interno (Foco/Pausa/Larga) se eliminó en v0.11.6.
   Los tabs viven ahora en TopBar (app/main.jsx), centrados arriba (v0.11.4). */

/* Presets 15/25/35/45 + "Otro" con input inline (1–180 min).
   La pill "Otro" se expande a un input al hacer click. Al confirmar
   (Enter o blur) aplica el valor y colapsa. Si el value actual no es
   preset, la pill muestra el número en lugar de "Otro" (estado activo).
   Rango 1–180 para cubrir desde pomodoros ultra-cortos hasta sesiones
   deep-work sin volverse absurdo. */
function MinutesPicker({ value, onChange }) {
  const { t } = useT();
  const presets = [15, 25, 35, 45];
  const isCustom = !presets.includes(value);
  const [editing, setEditing] = useStateFT(false);
  const [draft, setDraft] = useStateFT(String(value));
  const inputRef = useRefFT(null);

  useEffectFT(() => {
    if (editing && inputRef.current) {
      inputRef.current.focus();
      inputRef.current.select();
    }
  }, [editing]);

  // Mantén el draft sincronizado si el value externo cambia mientras no edita
  useEffectFT(() => {
    if (!editing) setDraft(String(value));
  }, [value, editing]);

  const commit = () => {
    const n = parseInt(draft, 10);
    if (Number.isFinite(n) && n >= 1 && n <= 180) {
      onChange(n);
    } else {
      setDraft(String(value)); // revert
    }
    setEditing(false);
  };

  const cancel = () => {
    setDraft(String(value));
    setEditing(false);
  };

  const pillBase = {
    padding: '4px 12px',
    minWidth: 34,
    height: 26,
    fontSize: 13,
    fontVariantNumeric: 'tabular-nums',
    borderRadius: 'var(--r-pill)',
    border: '1px solid transparent',
    transition: 'all 180ms',
    display: 'inline-flex',
    alignItems: 'center',
    justifyContent: 'center',
  };

  return (
    <div style={{ display: 'flex', gap: 4, alignItems: 'center', justifyContent: 'center' }}>
      <span style={{
        fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase',
        color: 'var(--ink-3)', marginRight: 10, fontWeight: 500,
      }}>{t('focus.min')}</span>
      {presets.map(m => (
        <button key={m} onClick={() => { onChange(m); setEditing(false); }}
          style={{
            ...pillBase,
            fontWeight: value === m ? 600 : 400,
            color: value === m ? 'var(--ink)' : 'var(--ink-3)',
            background: value === m ? 'var(--paper-3)' : 'transparent',
          }}>{m}</button>
      ))}
      {editing ? (
        <input
          ref={inputRef}
          type="number"
          min={1}
          max={180}
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onBlur={commit}
          onKeyDown={(e) => {
            if (e.key === 'Enter') commit();
            else if (e.key === 'Escape') cancel();
          }}
          style={{
            ...pillBase,
            width: 52,
            textAlign: 'center',
            fontWeight: 600,
            color: 'var(--ink)',
            background: 'var(--paper)',
            border: '1px solid var(--line-2)',
            outline: 'none',
            MozAppearance: 'textfield',
          }}
        />
      ) : isCustom ? (
        <button
          onClick={() => setEditing(true)}
          title={t('focus.minutes.custom.title')}
          style={{
            ...pillBase,
            fontWeight: 600,
            color: 'var(--ink)',
            background: 'var(--paper-3)',
          }}>
          {value}
        </button>
      ) : (
        <button

/* TimerVisualization — sesión 37: circle y numero eliminados (rotos).

function TimerVisualization({ style, mins, secs, progress, mode, modeLabel, subtitle, inner }) {
  if (style === 'barra') return <TimerBar mins={mins} secs={secs} progress={progress} modeLabel={modeLabel} subtitle={subtitle} />;

/* Timer "Aro" (default · ref. usuario).
   Anillo fino + arco de progreso sutil.
   Dentro: etiqueta de modo · número gigante italic serif · divisor fino ·

   Responsive: ocupa el mínimo entre ancho y alto del contenedor. */
function TimerAro({ mins, secs, progress, modeLabel, subtitle, inner }) {
  const R = 47.5;          // radio del anillo (en viewBox 100)
  const C = 2 * Math.PI * R;

  return (
    <div style={focusStyles.aroFrame}>
      <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', transform: 'rotate(-90deg)' }}>
        {/* Aro base — trazo fino cálido */}
        <circle cx="50" cy="50" r={R} fill="none" stroke="var(--line)" strokeWidth="0.35" />
        {/* Arco de progreso (sutil, mismo trazo pero ligeramente más intenso) */}
        <circle cx="50" cy="50" r={R} fill="none"
          stroke="var(--line-2)" strokeWidth="0.5"
          strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={C * (1 - progress)}
          style={{ transition: 'stroke-dashoffset 1s linear' }} />
      </svg>

      {/* Contenido centrado */}
      <div style={focusStyles.aroInner}>
        <div style={focusStyles.modeLabel}>{modeLabel}</div>
        <div style={focusStyles.numberHuge}>
          {String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}

/* TimerNumber y TimerCircle eliminados en v0.19.0 (rotos, sin diseño).

function TimerBar({ mins, secs, progress, modeLabel, subtitle }) {
  return (
    <div style={{ width: 520, textAlign: 'center' }}>

function TimerAnalog({ mins, secs, progress, modeLabel, subtitle }) {

  return (

        {/* Marcas horarias */}
        {Array.from({ length: 60 }).map((_, i) => {
          const a = (i / 60) * 2 * Math.PI - Math.PI / 2;
          const isMajor = i % 5 === 0;
          const r1 = isMajor ? 42 : 44;
          const r2 = 46;
          return <line key={i}
            x1={50 + r1 * Math.cos(a)} y1={50 + r1 * Math.sin(a)}
            x2={50 + r2 * Math.cos(a)} y2={50 + r2 * Math.sin(a)}

        })}

        <line x1="50" y1="50"
          x2={50 + 38 * Math.cos((angle - 90) * Math.PI / 180)}
          y2={50 + 38 * Math.sin((angle - 90) * Math.PI / 180)}
          stroke="var(--focus)" strokeWidth="1.2" strokeLinecap="round" />
        <circle cx="50" cy="50" r="1.2" fill="var(--focus)" />
        {/* Texto */}

  );

/* PACE · Respiración — Visual animado + getSequence
   Extraído de BreatheModule.jsx en sesión 34 (v0.16.0).
*/

function getSequence(routine) {
  if (routine.pattern === 'rounds') {
    return [
      { label: 'Inhala', duration: 2, scale: 1.3 },
      { label: 'Exhala', duration: 2, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'box') {
    const [i, h1, e, h2] = routine.cycle;
    return [
      { label: 'Inhala', duration: i, scale: 1.3 },
      { label: 'Sostén', duration: h1, scale: 1.3 },
      { label: 'Exhala', duration: e, scale: 0.9 },
      { label: 'Sostén', duration: h2, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'coherent') {
    const [i, , e] = routine.cycle;
    return [
      { label: 'Inhala', duration: i, scale: 1.3 },
      { label: 'Exhala', duration: e, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'pattern') {
    const [i, h, e] = routine.cycle;
    return [
      { label: 'Inhala', duration: i, scale: 1.3 },
      { label: 'Sostén', duration: h, scale: 1.3 },
      { label: 'Exhala', duration: e, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'physiological') {
    return [
      { label: 'Inhala', duration: 2, scale: 1.25 },
      { label: 'Inhala más', duration: 1, scale: 1.35 },
      { label: 'Exhala', duration: 5, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'ujjayi') {
    return [
      { label: 'Inhala oceánica', duration: 5, scale: 1.3 },
      { label: 'Exhala oceánica', duration: 5, scale: 0.9 },
    ];
  }
  if (routine.pattern === 'bhastrika' || routine.pattern === 'kapalabhati') {
    return [
      { label: 'Inhala', duration: 1, scale: 1.2 },
      { label: 'Exhala', duration: 1, scale: 0.95 },
    ];
  }
  if (routine.pattern === 'nadi') {
    return [
      { label: 'Inhala izq.', duration: 4, scale: 1.3 },
      { label: 'Sostén', duration: 2, scale: 1.3 },
      { label: 'Exhala dcha.', duration: 4, scale: 0.9 },
      { label: 'Inhala dcha.', duration: 4, scale: 1.3 },
      { label: 'Sostén', duration: 2, scale: 1.3 },
      { label: 'Exhala izq.', duration: 4, scale: 0.9 },
    ];
  }
  return [{ label: 'Respira', duration: 4, scale: 1.2 }];
}

const breathVisualStyles = {
  wrap: {
    position: 'relative',
    width: 260, height: 260,
    display: 'grid', placeItems: 'center',
  },
  core: {
    width: 160, height: 160,
    borderRadius: '50%',
    position: 'relative',
  },
};

function BreathVisual({ style, phase, progress, scale = 1.2 }) {
  const transitionDur = '1800ms';

  if (style === 'flor') {
    return (
      <div style={breathVisualStyles.wrap}>
        <div style={{
          position: 'absolute', inset: -40,
          border: '1px solid var(--breathe)',
          borderRadius: '50%',
          opacity: 0.25,
          transform: `scale(${scale * 0.95})`,
          transition: `transform ${transitionDur} var(--ease)`,
        }} />
        <div style={{
          position: 'absolute', inset: -20,
          border: '1px solid var(--breathe)',
          borderRadius: '50%',
          opacity: 0.4,
          transform: `scale(${scale})`,
          transition: `transform ${transitionDur} var(--ease)`,
        }} />
        <svg viewBox="-100 -100 200 200" style={{
          position: 'absolute', inset: 0, width: '100%', height: '100%',
          transform: `scale(${scale * 0.85}) rotate(${progress * 40}deg)`,
          transition: `transform ${transitionDur} var(--ease)`,
        }}>
          {[0,1,2,3,4,5].map(i => (
            <ellipse key={i} cx="0" cy="-32" rx="14" ry="34"
              fill="var(--breathe-soft)" stroke="var(--breathe)" strokeWidth="0.6"
              transform={`rotate(${i * 60})`} opacity="0.5" />
          ))}
        </svg>
        <div style={{
          width: 80, height: 80,
          borderRadius: '50%',
          background: 'radial-gradient(circle, var(--breathe-soft) 0%, transparent 80%)',
          border: '1.5px solid var(--breathe)',
          transform: `scale(${scale * 0.7})`,
          transition: `transform ${transitionDur} var(--ease)`,
          position: 'relative',
        }} />
      </div>
    );
  }

  if (style === 'ondas') {
    return (
      <div style={breathVisualStyles.wrap}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{
            position: 'absolute', inset: 0,
            border: '1px solid var(--breathe)',
            borderRadius: '50%',
            opacity: 0.15 + i * 0.1,
            transform: `scale(${scale - i * 0.15})`,
            transition: `transform ${transitionDur} var(--ease)`,
          }} />
        ))}
        <div style={{ ...breathVisualStyles.core, background: 'var(--breathe-soft)' }} />
      </div>
    );
  }

  if (style === 'petalo') {
    return (
      <div style={breathVisualStyles.wrap}>
        <svg viewBox="-100 -100 200 200" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', transition: `transform ${transitionDur} var(--ease)`, transform: `scale(${scale})` }}>
          {[0,1,2,3,4,5].map(i => (
            <ellipse key={i} cx="0" cy="-40" rx="20" ry="45"
              fill="var(--breathe-soft)" stroke="var(--breathe)" strokeWidth="0.8"
              transform={`rotate(${i * 60})`} opacity="0.55" />
          ))}
          <circle cx="0" cy="0" r="12" fill="var(--breathe)" opacity="0.25" />
        </svg>
      </div>
    );
  }

  if (style === 'organico') {
    return (
      <div style={breathVisualStyles.wrap}>
        <div style={{
          ...breathVisualStyles.core,
          background: 'radial-gradient(circle, var(--breathe-soft) 0%, transparent 70%)',
          transform: `scale(${scale})`,
          transition: `transform ${transitionDur} var(--ease)`,
          borderRadius: `${42 + Math.sin(progress * Math.PI * 4) * 6}% ${58 - Math.sin(progress * Math.PI * 4) * 6}% ${46 + Math.cos(progress * Math.PI * 3) * 8}% ${54 - Math.cos(progress * Math.PI * 3) * 8}%`,
          border: '1px solid var(--breathe)',
        }} />
      </div>
    );
  }

  // Default: pulso
  return (
    <div style={breathVisualStyles.wrap}>
      <div style={{ position: 'absolute', inset: -30, border: '1px solid var(--line)', borderRadius: '50%', opacity: 0.4 }} />
      <div style={{ position: 'absolute', inset: -60, border: '1px solid var(--line)', borderRadius: '50%', opacity: 0.2 }} />
      <div style={{
        ...breathVisualStyles.core,
        background: 'var(--breathe-soft)',
        border: '1.5px solid var(--breathe)',
        transform: `scale(${scale})`,
        transition: `transform ${transitionDur} var(--ease)`,
      }} />
      <div style={{
        position: 'absolute',
        width: 8, height: 8, borderRadius: '50%',
        background: 'var(--breathe-2)',
        top: '50%', left: '50%',
        transform: `translate(-50%, -50%) rotate(${progress * 360}deg) translateY(-110px)`,
        transition: 'transform 1s linear',
      }} />
    </div>
  );
}

Object.assign(window, { BreathVisual, getSequence });

</script>

}

}
